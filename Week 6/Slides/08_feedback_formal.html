<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 8 — Negative Feedback (Formal)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">10 / 19</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
    <div class="stepper-row" id="stepper">
      <button type="button" class="stepper-btn" id="step-prev">← Prev Step</button>
      <span class="step-indicator" id="step-indicator">Step 1/5</span>
      <button type="button" class="stepper-btn" id="step-next">Next Step →</button>
    </div>
  </div>

  <script type="module">
    import {
      Scene, Rectangle, Circle, Arrow, Line, Text, MathTex, VGroup,
      Write, Create, FadeToColor, FadeIn
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    const PURPLE = IS_LIGHT ? '#6b3fa0' : '#b080d8';
    const FF     = ACCENT;
    const FB     = BLUE;
    const DIM    = IS_LIGHT ? '#a7adb9' : '#5a6578';

    const hexToRgb = (hex) => {
      const m = hex.replace('#', '');
      return [parseInt(m.slice(0, 2), 16), parseInt(m.slice(2, 4), 16), parseInt(m.slice(4, 6), 16)];
    };
    const rgbToHex = ([r, g, b]) =>
      '#' + [r, g, b].map((v) => Math.round(v).toString(16).padStart(2, '0')).join('');
    const fadeBlue = (t) => {
      const [br, bg_, bb] = hexToRgb(BLUE);
      const [kr, kg, kb] = hexToRgb(BG);
      return rgbToHex([kr + (br - kr) * t, kg + (bg_ - kg) * t, kb + (bb - kb) * t]);
    };

    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    const stepIndicator = document.getElementById('step-indicator');
    const prevBtn = document.getElementById('step-prev');
    const nextBtn = document.getElementById('step-next');

    const title = new Text({ text: 'Negative Feedback — Formal Derivation', fontSize: 36, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.45, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }
    scene.add(title);

    const makeDiagramGroup = (mode) => {
      const ffColor = mode === 'feedbackFocus' ? DIM : FF;
      const fbColor = mode === 'feedforwardFocus' ? DIM : FB;
      const neutral = mode === 'feedbackFocus' || mode === 'feedforwardFocus' ? DIM : FG;

      const sigma = new Circle({ radius: 0.34, color: MUTED, strokeWidth: 2, fillOpacity: 0.06 });
      sigma.moveTo([-4.9, 1.65, 0]);
      const sigmaLbl = new Text({ text: 'Σ', fontSize: 20, color: MUTED, fontUrl: FONT_URL });
      sigmaLbl.moveTo([-4.9, 1.65, 0]);

      const Ablock = new Rectangle({ width: 1.45, height: 0.82, color: ffColor, strokeWidth: 2, fillOpacity: 0.06 });
      Ablock.moveTo([-2.6, 1.65, 0]);
      const Alabel = new MathTex({ latex: 'A_{OL}', color: ffColor });

      const bBlock = new Rectangle({ width: 1.15, height: 0.68, color: fbColor, strokeWidth: 2, fillOpacity: 0.06 });
      bBlock.moveTo([-2.6, 0.12, 0]);
      const bLabel = new MathTex({ latex: '\\beta', color: fbColor });

      const inArrow  = new Arrow({ start: [-6.2, 1.65, 0], end: [-5.24, 1.65, 0], color: ffColor, strokeWidth: 2, tipLength: 0.09 });
      const sumToA   = new Arrow({ start: [-4.55, 1.65, 0], end: [-3.36, 1.65, 0], color: ffColor, strokeWidth: 2, tipLength: 0.09 });
      const outArrow = new Arrow({ start: [-1.84, 1.65, 0], end: [-0.35, 1.65, 0], color: ffColor, strokeWidth: 2, tipLength: 0.09 });
      const fbDown   = new Line({ start: [-1.15, 1.65, 0], end: [-1.15, 0.12, 0], color: fbColor, strokeWidth: 2 });
      const fbToBeta = new Arrow({ start: [-1.15, 0.12, 0], end: [-2.02, 0.12, 0], color: fbColor, strokeWidth: 2, tipLength: 0.09 });
      const betaToSumPath = new Line({ start: [-3.18, 0.12, 0], end: [-4.9, 0.12, 0], color: fbColor, strokeWidth: 2 });
      const fbUp = new Arrow({ start: [-4.9, 0.12, 0], end: [-4.9, 1.29, 0], color: fbColor, strokeWidth: 2, tipLength: 0.09 });

      const xLbl = new MathTex({ latex: 'X', color: ffColor });
      const eLbl = new MathTex({ latex: 'E', color: ffColor });
      const yLbl = new MathTex({ latex: 'Y', color: PURPLE });
      const xfLbl = new MathTex({ latex: 'X_F', color: fbColor });
      const plusLbl = new Text({ text: '+', fontSize: 16, color: ffColor, fontUrl: FONT_URL });
      const minusLbl = new Text({ text: '−', fontSize: 16, color: mode === 'feedforwardFocus' ? DIM : RED, fontUrl: FONT_URL });

      const ffTag = new Text({ text: 'Feedforward path', fontSize: 13, color: ffColor, fontUrl: FONT_URL });
      const fbTag = new Text({ text: 'Feedback path', fontSize: 13, color: fbColor, fontUrl: FONT_URL });

      sigmaLbl.loadGlyphs?.();
      plusLbl.loadGlyphs?.();
      minusLbl.loadGlyphs?.();
      ffTag.loadGlyphs?.();
      fbTag.loadGlyphs?.();

      return {
        objects: [
          sigma, sigmaLbl,
          Ablock, Alabel,
          bBlock, bLabel,
          inArrow, sumToA, outArrow,
          fbDown, fbToBeta, betaToSumPath, fbUp,
          xLbl, eLbl, yLbl, xfLbl,
          plusLbl, minusLbl,
          ffTag, fbTag
        ],
        async ready() {
          await Promise.all([
            sigmaLbl.loadGlyphs?.(), plusLbl.loadGlyphs?.(), minusLbl.loadGlyphs?.(),
            ffTag.loadGlyphs?.(), fbTag.loadGlyphs?.(),
            Alabel.waitForRender?.(), bLabel.waitForRender?.(),
            xLbl.waitForRender?.(), yLbl.waitForRender?.(),
            xfLbl.waitForRender?.(), eLbl.waitForRender?.()
          ]);
          Alabel.scale(0.62).moveTo([-2.6, 1.65, 0]);
          bLabel.scale(0.6).moveTo([-2.6, 0.12, 0]);
          xLbl.scale(0.55).moveTo([-6.28, 1.98, 0]);
          eLbl.scale(0.55).moveTo([-4.0, 1.95, 0]);
          yLbl.scale(0.55).moveTo([-0.24, 1.98, 0]);
          xfLbl.scale(0.5).moveTo([-4.45, 0.43, 0]);
          plusLbl.moveTo([-5.2, 1.95, 0]);
          minusLbl.moveTo([-4.66, 1.33, 0]);
          ffTag.moveTo([-2.55, 2.5, 0]);
          fbTag.moveTo([-2.6, -0.45, 0]);
        }
      };
    };

    const diagramStep1 = makeDiagramGroup('balanced');
    const diagramStep2 = makeDiagramGroup('feedforwardFocus');
    const diagramStep3 = makeDiagramGroup('feedbackFocus');
    const diagramStep4 = makeDiagramGroup('balanced');
    const diagramStep5 = makeDiagramGroup('balanced');
    await Promise.all([
      diagramStep1.ready(),
      diagramStep2.ready(),
      diagramStep3.ready(),
      diagramStep4.ready(),
      diagramStep5.ready()
    ]);
    const diagramGroup = {
      1: new VGroup(...diagramStep1.objects),
      2: new VGroup(...diagramStep2.objects),
      3: new VGroup(...diagramStep3.objects),
      4: new VGroup(...diagramStep4.objects),
      5: new VGroup(...diagramStep5.objects)
    };

    const makeEq = async (latex, color, pos, scale = 0.56) => {
      const eq = new MathTex({ latex, color });
      await eq.waitForRender?.();
      eq.scale(scale).moveTo(pos);
      return eq;
    };

    const eqStep2 = [
      await makeEq('E = X - X_F', FG, [2.75, 2.1, 0]),
      await makeEq('Y = A_{OL}\\,E', FF, [2.75, 1.45, 0]),
      await makeEq('Y = A_{OL}(X - X_F)', FF, [2.75, 0.8, 0], 0.62)
    ];
    const eqStep3 = [
      await makeEq('X_F = \\beta Y', FB, [2.75, 2.1, 0]),
      await makeEq('E = X - \\beta Y', FG, [2.75, 1.45, 0]),
      await makeEq('Y = A_{OL}(X - \\beta Y)', FG, [2.75, 0.8, 0], 0.62)
    ];
    const eqStep4 = [
      await makeEq('Y = A_{OL}(X - \\beta Y)', FG, [2.75, 2.25, 0], 0.6),
      await makeEq('Y + A_{OL}\\beta Y = A_{OL}X', FG, [2.75, 1.35, 0], 0.6),
      await makeEq('Y(1 + A_{OL}\\beta) = A_{OL}X', FG, [2.75, 0.45, 0], 0.6),
      await makeEq('A_{CL}=\\frac{Y}{X}=\\frac{A_{OL}}{1 + A_{OL}\\beta}', PURPLE, [2.75, -0.58, 0], 0.7)
    ];
    const step4HighlightBox = new Rectangle({
      width: 5.35,
      height: 1.08,
      color: PURPLE,
      strokeWidth: 2,
      fillOpacity: 0.04
    });
    step4HighlightBox.moveTo([2.75, -0.58, 0]);

    const eqFlowStep2 = [
      await makeEq('E = X - X_F', FG, [2.75, 1.35, 0], 0.62),
      await makeEq('Y = A_{OL}E = A_{OL}(X - X_F)', FF, [2.75, 1.35, 0], 0.62)
    ];
    const eqFlowStep3 = [
      await makeEq('X_F = \\beta Y', FB, [2.75, 1.35, 0], 0.62),
      await makeEq('E = X - \\beta Y', FG, [2.75, 1.35, 0], 0.62),
      await makeEq('Y = A_{OL}(X - \\beta Y)', FG, [2.75, 1.35, 0], 0.62)
    ];
    const eqFlowStep4 = [
      await makeEq('Y = A_{OL}(X - \\beta Y)', FG, [2.75, 1.35, 0], 0.62),
      await makeEq('Y + A_{OL}\\beta Y = A_{OL}X', FG, [2.75, 1.35, 0], 0.62),
      await makeEq('Y(1 + A_{OL}\\beta) = A_{OL}X', FG, [2.75, 1.35, 0], 0.62),
      await makeEq('A_{CL}=\\frac{Y}{X}=\\frac{A_{OL}}{1 + A_{OL}\\beta}', ACCENT, [2.75, 1.35, 0], 0.68)
    ];
    const eqStep5 = [
      await makeEq('A_{CL}=\\frac{A_{OL}}{1 + A_{OL}\\beta}', PURPLE, [-3.26, -1.60, 0], 0.52),
      await makeEq('\\text{If }A_{OL}\\to\\infty,\\quad A_{CL}\\to\\frac{1}{\\beta}', PURPLE, [-3.26, -2.37, 0], 0.4),
      await makeEq('\\text{If }\\beta\\to0,\\quad A_{CL}\\to A_{OL}', PURPLE, [-3.26, -3.08, 0], 0.4)
    ];

    const x0 = 1.05;
    const x1 = 5.55;
    const y0 = -2.6;
    const y1 = 0.9;
    const graphFrame = new Rectangle({
      width: x1 - x0,
      height: y1 - y0,
      color: MUTED2,
      strokeWidth: 1.2,
      fillOpacity: 0.03
    });
    graphFrame.moveTo([(x0 + x1) / 2, (y0 + y1) / 2, 0]);

    // xGridGroup is static (vertical lines at x-tick positions).
    // yGridLines is dynamic (horizontal lines at y-tick positions — repositioned during rescale).
    // Both are built AFTER mapX/mapY exist; see the dedicated block below.
    let yGridLines = [];
    let xGridGroup = null;

    const graphAxes = [
      new Line({ start: [x0, y0, 0], end: [x1, y0, 0], color: MUTED, strokeWidth: 2.4 }),
      new Line({ start: [x0, y0, 0], end: [x0, y1, 0], color: MUTED, strokeWidth: 2.4 })
    ];
    const xLab = new MathTex({ latex: '\\log_{10}\\!\\left(A_{OL}\\right)', color: MUTED });
    const yLab = new MathTex({ latex: '\\log_{10}\\!\\left(A_{CL}\\right)', color: MUTED });
    await Promise.all([xLab.waitForRender?.(), yLab.waitForRender?.()]);
    xLab.scale(0.49).moveTo([(x0 + x1) / 2, y0 - 0.46, 0]);
    yLab.scale(0.49).rotate(Math.PI / 2).moveTo([x0 - 0.68, (y0 + y1) / 2, 0]);

    const X_LOG_MAX = 4.0;
    const Y_LOG_MIN = -1.0;
    const Y_LOG_MAX = 4.0;
    const Y_LOG_MAX_INITIAL = 2.0;
    const mapX = (aol) => {
      const t = (Math.log10(aol) - 0) / (X_LOG_MAX - 0);
      return x0 + t * (x1 - x0);
    };
    const makeMapY = (logMax) => (acl) => {
      const logVal = Math.log10(Math.max(Math.pow(10, Y_LOG_MIN), acl));
      const t = (logVal - Y_LOG_MIN) / (logMax - Y_LOG_MIN);
      return y0 + t * (y1 - y0);
    };
    const mapYFinal = makeMapY(Y_LOG_MAX);
    const mapYInitial = makeMapY(Y_LOG_MAX_INITIAL);
    const mapYExpanded = mapYFinal;

    const xTickMarks = [];
    const xTickLabels = [];
    const xTickVals = [1, 10, 100, 1000, 10000];
    for (const v of xTickVals) {
      const xt = mapX(v);
      xTickMarks.push(new Line({ start: [xt, y0, 0], end: [xt, y0 - 0.09, 0], color: MUTED, strokeWidth: 1.6 }));
      const lbl = new MathTex({ latex: `10^{${Math.round(Math.log10(v))}}`, color: MUTED });
      await lbl.waitForRender?.();
      lbl.scale(0.34).moveTo([xt, y0 - 0.20, 0]);
      xTickLabels.push(lbl);
    }

    const yTickMarksBase = [];
    const yTickLabelsBase = [];
    const yTickValsBase = [0.1, 1, 10, 100, 1000, 10000];
    for (const v of yTickValsBase) {
      const yt = mapYFinal(v);
      yTickMarksBase.push(new Line({ start: [x0 - 0.09, yt, 0], end: [x0, yt, 0], color: MUTED, strokeWidth: 1.6 }));
      const lbl = new MathTex({ latex: `10^{${Math.round(Math.log10(v))}}`, color: MUTED });
      await lbl.waitForRender?.();
      lbl.scale(0.34).moveTo([x0 - 0.25, yt, 0]);
      yTickLabelsBase.push(lbl);
    }

    // Horizontal grid lines — one per y-tick value, built at final positions then moveTo'd to initial.
    for (const v of yTickValsBase) {
      const yt = mapYFinal(v);
      yGridLines.push(new Line({ start: [x0, yt, 0], end: [x1, yt, 0], color: MUTED2, strokeWidth: 0.8 }));
    }
    // Vertical grid lines — static at x-tick positions.
    {
      const xGridArr = [];
      for (const v of xTickVals) {
        const xg = mapX(v);
        xGridArr.push(new Line({ start: [xg, y0, 0], end: [xg, y1, 0], color: MUTED2, strokeWidth: 0.8 }));
      }
      xGridGroup = new VGroup(...xGridArr);
    }

    // Track the currently-applied y logMax so we can translate the tick marks,
    // labels, and horizontal grid lines as a group with `shift` (Line.moveTo is
    // unreliable for two-endpoint geometry in manim-web, so we use deltas).
    // Elements were constructed at mapYFinal, hence the initial value.
    let currentYScaleLogMax = Y_LOG_MAX;
    const repositionYScale = (newLogMax) => {
      if (newLogMax === currentYScaleLogMax) return;
      const oldMapY = makeMapY(currentYScaleLogMax);
      const newMapY = makeMapY(newLogMax);
      for (let i = 0; i < yTickValsBase.length; i++) {
        const v = yTickValsBase[i];
        const dy = newMapY(v) - oldMapY(v);
        if (dy !== 0) {
          yTickMarksBase[i].shift([0, dy, 0]);
          yTickLabelsBase[i].shift([0, dy, 0]);
          yGridLines[i].shift([0, dy, 0]);
        }
      }
      currentYScaleLogMax = newLogMax;
    };
    repositionYScale(Y_LOG_MAX_INITIAL);

    const dashedHorizontal = (yVal, color, strokeWidth = 1.4, seg = 0.14, gap = 0.10) => {
      const parts = [];
      for (let x = x0; x < x1 - 1e-6; x += seg + gap) {
        const endX = Math.min(x + seg, x1);
        parts.push(new Line({ start: [x, yVal, 0], end: [endX, yVal, 0], color, strokeWidth }));
      }
      return new VGroup(...parts);
    };

    const makeCurveBundle = async (betas, colors, mapY, fontSize = 11, includeLabels = true) => {
      const betaLabels = [];
      const curveLines = [];
      const asymLines = [];
      for (let b = 0; b < betas.length; b++) {
        const beta = betas[b];
        const color = colors[b % colors.length];
        const segs = [];
        const points = 48;
        let prev = null;
        for (let i = 0; i <= points; i++) {
          const aol = Math.pow(10, (X_LOG_MAX * i) / points);
          const acl = aol / (1 + aol * beta);
          const p = [mapX(aol), mapY(acl), 0];
          if (prev) segs.push(new Line({ start: prev, end: p, color, strokeWidth: 2.8 }));
          prev = p;
        }
        curveLines.push(new VGroup(...segs));
        const limitGain = 1 / beta;
        const limitY = mapY(limitGain);
        asymLines.push(dashedHorizontal(limitY, color, 1.4, 0.12, 0.08));
        if (includeLabels) {
          const lbl = new Text({ text: `β=${beta}`, fontSize, color, fontUrl: FONT_URL });
          await lbl.loadGlyphs?.();
          const labelY = Math.min(y1 - 0.10, Math.max(y0 + 0.12, limitY + 0.12));
          lbl.moveTo([x1 - 0.62, labelY, 0]);
          betaLabels.push(lbl);
        }
      }
      return { betaLabels, curveLines, asymLines };
    };

    const baseBetas = [1.0, 0.5, 0.2];
    const baseColors = [fadeBlue(1.0), fadeBlue(0.92), fadeBlue(0.84)];
    const baseBundle = await makeCurveBundle(baseBetas, baseColors, mapYInitial, 12, true);

    // Build a fresh VGroup of base curve lines at an arbitrary mapY — used by the rescale animation.
    const buildBaseCurveVGroups = (mapY) => {
      const vgroups = [];
      for (let b = 0; b < baseBetas.length; b++) {
        const beta = baseBetas[b];
        const color = baseColors[b];
        const segs = [];
        const points = 48;
        let prev = null;
        for (let i = 0; i <= points; i++) {
          const aol = Math.pow(10, (X_LOG_MAX * i) / points);
          const acl = aol / (1 + aol * beta);
          const p = [mapX(aol), mapY(acl), 0];
          if (prev) segs.push(new Line({ start: prev, end: p, color, strokeWidth: 2.8 }));
          prev = p;
        }
        vgroups.push(new VGroup(...segs));
      }
      return vgroups;
    };

    // Log-spaced betas from 10^-1 down to 10^-5 — dense enough that the faded family
    // visually meets the β → 0 diagonal at A_OL = 10^4.
    const smallerBetas = [];
    const smallerBetaCount = 32;
    for (let i = 0; i < smallerBetaCount; i++) {
      smallerBetas.push(Math.pow(10, -1 - (4 * i) / (smallerBetaCount - 1)));
    }
    const smallerColors = smallerBetas.map((_, i, arr) => {
      const t = 0.72 - (i / (arr.length - 1)) * 0.55;
      return fadeBlue(t);
    });
    const smallerBundle = await makeCurveBundle(smallerBetas, smallerColors, mapYFinal, 10, false);

    const limitSegs = [];
    const limitSamples = 120;
    const limitSampled = [];
    for (let i = 0; i <= limitSamples; i++) {
      const aol = Math.pow(10, (X_LOG_MAX * i) / limitSamples);
      limitSampled.push([mapX(aol), mapYExpanded(aol), 0]);
    }
    const limitDashLen = 3;
    const limitGapLen = 2;
    for (let i = 0; i < limitSampled.length - 1; ) {
      const dashEnd = Math.min(i + limitDashLen, limitSampled.length - 1);
      for (let j = i; j < dashEnd; j++) {
        limitSegs.push(new Line({ start: limitSampled[j], end: limitSampled[j + 1], color: BLUE, strokeWidth: 2.8 }));
      }
      i = dashEnd + limitGapLen;
    }
    const limitCurve = new VGroup(...limitSegs);

    // Tip must land on the β → 0 diagonal in the rescaled plot. With
    // X_LOG_MAX = Y_LOG_MAX = 4, the line passes through (mapX(10^v), mapY(10^v)).
    // At x = 5.10 that corresponds to v ≈ 3.6 and y ≈ 0.62.
    const limitArrowP0 = [4.95, 1.40, 0];
    const limitArrowP1 = [4.84, 1.05, 0];
    const limitArrowP2 = [5.10, 0.62, 0];
    const bezierPt = (t) => [
      (1 - t) * (1 - t) * limitArrowP0[0] + 2 * (1 - t) * t * limitArrowP1[0] + t * t * limitArrowP2[0],
      (1 - t) * (1 - t) * limitArrowP0[1] + 2 * (1 - t) * t * limitArrowP1[1] + t * t * limitArrowP2[1],
      0
    ];
    const limitArrowSegs = [];
    const limitArrowSamples = 22;
    let limitArrowPrev = bezierPt(0);
    for (let i = 1; i < limitArrowSamples; i++) {
      const cur = bezierPt(i / limitArrowSamples);
      limitArrowSegs.push(new Line({ start: limitArrowPrev, end: cur, color: MUTED, strokeWidth: 1.6 }));
      limitArrowPrev = cur;
    }
    const limitArrowTip = new Arrow({
      start: limitArrowPrev,
      end: bezierPt(1),
      color: MUTED,
      strokeWidth: 1.6,
      tipLength: 0.14
    });
    const limitArrow = new VGroup(...limitArrowSegs, limitArrowTip);

    const limitNoteLbl = new MathTex({ latex: '\\text{Limit as } \\beta \\to 0', color: MUTED });
    await limitNoteLbl.waitForRender?.();
    limitNoteLbl.scale(0.44).moveTo([4.95, 1.60, 0]);

    const aclHighlightBox = new Rectangle({
      width: 2.85,
      height: 0.82,
      color: PURPLE,
      strokeWidth: 2,
      fillOpacity: 0.05
    });
    aclHighlightBox.moveTo([-3.26, -1.60, 0]);

    const aclArrowP0 = [-1.75, -1.60, 0];
    const aclArrowC1 = [0.00, -1.60, 0];
    const aclArrowC2 = [-1.60, -0.85, 0];
    const aclArrowP3 = [0.15, -0.85, 0];
    const cubicBezierPt = (t) => {
      const u = 1 - t;
      return [
        u * u * u * aclArrowP0[0] + 3 * u * u * t * aclArrowC1[0] + 3 * u * t * t * aclArrowC2[0] + t * t * t * aclArrowP3[0],
        u * u * u * aclArrowP0[1] + 3 * u * u * t * aclArrowC1[1] + 3 * u * t * t * aclArrowC2[1] + t * t * t * aclArrowP3[1],
        0
      ];
    };
    const aclArrowSegs = [];
    const aclArrowSamples = 12;
    let aclArrowPrev = cubicBezierPt(0);
    for (let i = 1; i < aclArrowSamples; i++) {
      const cur = cubicBezierPt(i / aclArrowSamples);
      aclArrowSegs.push(new Line({ start: aclArrowPrev, end: cur, color: PURPLE, strokeWidth: 2.2 }));
      aclArrowPrev = cur;
    }
    const aclArrowTip = new Arrow({
      start: aclArrowPrev,
      end: cubicBezierPt(1),
      color: PURPLE,
      strokeWidth: 2.2,
      tipLength: 0.16
    });
    const aclArrow = new VGroup(...aclArrowSegs, aclArrowTip);

    const stepTitles = {
      1: 'Step 1/5',
      2: 'Step 2/5',
      3: 'Step 3/5',
      4: 'Step 4/5',
      5: 'Step 5/5'
    };

    const stepSubtitle = {
      1: new MathTex({ latex: '\\text{Step 1: First we will look at the full negative-feedback block diagram and identify the feedforward and feedback paths.}', color: MUTED }),
      2: new MathTex({ latex: '\\text{Step 2: Isolate feedforward behavior and derive } Y \\text{ in terms of } E \\text{ and } A_{OL}.', color: MUTED }),
      3: new MathTex({ latex: '\\text{Step 3: Isolate feedback behavior and derive the returned-signal relation } X_F = \\beta Y.', color: MUTED }),
      4: new MathTex({ latex: '\\text{Step 4: Substitute feedback into the forward equation and simplify to the closed-loop form.}', color: MUTED }),
      5: new MathTex({ latex: '\\text{Step 5: Evaluate } \\lim_{A_{OL}\\to\\infty} \\text{ and } \\lim_{\\beta\\to 0} \\text{ to interpret closed-loop gain physically.}', color: MUTED })
    };
    await Promise.all(Object.values(stepSubtitle).map((txt) => txt.waitForRender?.()));
    Object.values(stepSubtitle).forEach((txt) => {
      txt.scale(0.44);
      txt.moveTo([-4.7, 2.72, 0]);
      if (typeof txt.getLeft === 'function') {
        txt.shift([TITLE_LEFT_X - txt.getLeft()[0], 0, 0]);
      }
    });

    // Track which y-scale indices are currently in the scene (ticks/labels/grid) so the rescale
    // animation can add/remove them as logMax grows past each decade.
    const visibleYScaleIndices = new Set();
    const setYScaleVisibility = (logMax) => {
      for (let i = 0; i < yTickValsBase.length; i++) {
        const shouldShow = Math.log10(yTickValsBase[i]) <= logMax + 0.001;
        const isShown = visibleYScaleIndices.has(i);
        if (shouldShow && !isShown) {
          scene.add(yTickMarksBase[i], yTickLabelsBase[i], yGridLines[i]);
          visibleYScaleIndices.add(i);
        } else if (!shouldShow && isShown) {
          scene.remove(yTickMarksBase[i], yTickLabelsBase[i], yGridLines[i]);
          visibleYScaleIndices.delete(i);
        }
      }
    };
    const removeAllYScale = () => {
      for (const i of visibleYScaleIndices) {
        scene.remove(yTickMarksBase[i], yTickLabelsBase[i], yGridLines[i]);
      }
      visibleYScaleIndices.clear();
    };

    // Current base curve VGroups — swapped during the rescale animation.
    let currentBaseCurveVGroups = baseBundle.curveLines;

    const allDynamic = [
      ...Object.values(stepSubtitle),
      diagramGroup[1], diagramGroup[2], diagramGroup[3], diagramGroup[4], diagramGroup[5],
      ...eqStep2, ...eqStep3, ...eqStep4, ...eqStep5,
      step4HighlightBox,
      graphFrame, xGridGroup, ...graphAxes,
      ...xTickMarks, ...xTickLabels,
      xLab, yLab,
      aclHighlightBox, aclArrow,
      ...baseBundle.asymLines, ...baseBundle.betaLabels,
      ...smallerBundle.curveLines,
      limitCurve, limitArrow, limitNoteLbl
    ];

    // Move the block diagram down slightly in every step.
    Object.values(diagramGroup).forEach((grp) => grp.shift([0, -0.40, 0]));

    let currentStep = 1;
    let isRendering = false;
    let queuedStep = null;
    let renderToken = 0;

    const updateStepperUi = () => {
      stepIndicator.textContent = stepTitles[currentStep];
      prevBtn.disabled = currentStep === 1;
      nextBtn.disabled = currentStep === 5;
    };

    const resetDynamic = () => {
      scene.remove(...allDynamic);
      scene.remove(...currentBaseCurveVGroups);
      removeAllYScale();
      scene.add(stepSubtitle[currentStep]);
    };

    const renderStep = async (animate = true, token = renderToken) => {
      if (isRendering) return;
      isRendering = true;
      try {
        const shouldAbort = () => token !== renderToken;
        resetDynamic();
        scene.add(diagramGroup[currentStep]);

        const showStepEquations = async (eqs) => {
          for (const eq of eqs) {
            if (shouldAbort()) return;
            if (animate) {
              scene.remove(eq);
              await scene.play(new Write(eq, { duration: 1.0 }));
              if (shouldAbort()) return;
              await scene.wait(0.35);
              if (shouldAbort()) return;
            } else {
              scene.add(eq);
            }
          }
        };

        if (currentStep === 1) return;

        if (currentStep === 2) {
          await showStepEquations(eqStep2);
          return;
        }

        if (currentStep === 3) {
          await showStepEquations(eqStep3);
          return;
        }

        if (currentStep === 4) {
          await showStepEquations(eqStep4);
          if (shouldAbort()) return;
          if (animate) {
            await scene.play(new Create(step4HighlightBox, { duration: 0.75 }));
            if (shouldAbort()) return;
          } else {
            scene.add(step4HighlightBox);
          }
          return;
        }

        if (currentStep === 5) {
          for (const eq of eqStep5) {
            if (shouldAbort()) return;
            if (animate) {
              await scene.play(new Write(eq, { duration: 0.85 }));
              if (shouldAbort()) return;
              await scene.wait(0.2);
              if (shouldAbort()) return;
            } else {
              scene.add(eq);
            }
          }
          // Ensure the plot starts at the initial y-scale on every animated entry.
          // baseBundle was built with mapYInitial so asymptote lines already match;
          // β labels need reset because we mutate them on the rescale path.
          repositionYScale(Y_LOG_MAX_INITIAL);
          for (let b = 0; b < baseBetas.length; b++) {
            const beta = baseBetas[b];
            const limitY = mapYInitial(1 / beta);
            const labelY = Math.min(y1 - 0.10, Math.max(y0 + 0.12, limitY + 0.12));
            baseBundle.betaLabels[b].moveTo([x1 - 0.62, labelY, 0]);
          }
          currentBaseCurveVGroups = baseBundle.curveLines;

          if (animate) {
            await scene.play(new Create(aclHighlightBox, { duration: 0.55 }));
            if (shouldAbort()) return;
            for (let i = 0; i < aclArrowSegs.length; i++) {
              if (shouldAbort()) return;
              await scene.play(new Create(aclArrowSegs[i], { duration: 0.014 }));
            }
            if (shouldAbort()) return;
            await scene.play(new Create(aclArrowTip, { duration: 0.05 }));
            if (shouldAbort()) return;
            await scene.wait(0.35);
            // Draw the plot frame, static x-grid, and axes.
            await scene.play(
              new Create(graphFrame, { duration: 0.35 }),
              new Create(xGridGroup, { duration: 0.45 }),
              new Create(graphAxes[0], { duration: 0.8 }),
              new Create(graphAxes[1], { duration: 0.8 })
            );
            if (shouldAbort()) return;
            // Show x-ticks + x-label + y-label, and the INITIAL y-scale ticks/labels/grid (0.1 … 100).
            setYScaleVisibility(Y_LOG_MAX_INITIAL);
            await scene.play(
              ...xTickMarks.map((t) => new Create(t, { duration: 0.25 })),
              ...xTickLabels.map((t) => new Write(t, { duration: 0.3 })),
              new Write(xLab, { duration: 1.3 }),
              new Write(yLab, { duration: 1.3 })
            );
            if (shouldAbort()) return;
            // Base curves + asymptotes + β labels at the initial scale.
            for (let i = 0; i < baseBundle.curveLines.length; i++) {
              if (shouldAbort()) return;
              await scene.play(
                new Create(baseBundle.asymLines[i], { duration: 0.45 }),
                new Create(baseBundle.curveLines[i], { duration: 0.9 }),
                new Write(baseBundle.betaLabels[i], { duration: 0.35 })
              );
              if (shouldAbort()) return;
            }
            await scene.wait(0.35);
            if (shouldAbort()) return;
            // Asymptotes disappear before the rescale.
            scene.remove(...baseBundle.asymLines);

            // Smooth y-axis rescale: logMax 2.0 → 4.0.
            const rescaleFrames = 18;
            const rescaleTotalDur = 1.4;
            const frameWait = rescaleTotalDur / rescaleFrames;
            for (let f = 1; f <= rescaleFrames; f++) {
              if (shouldAbort()) return;
              const alpha = f / rescaleFrames;
              const logMax = Y_LOG_MAX_INITIAL + (Y_LOG_MAX - Y_LOG_MAX_INITIAL) * alpha;
              const mapY = makeMapY(logMax);
              // Reposition ticks, labels, y-grid lines in place.
              repositionYScale(logMax);
              setYScaleVisibility(logMax);
              // Reposition base β labels to track their asymptotes at the new scale.
              for (let b = 0; b < baseBetas.length; b++) {
                const beta = baseBetas[b];
                const limitY = mapY(1 / beta);
                const labelY = Math.min(y1 - 0.10, Math.max(y0 + 0.12, limitY + 0.12));
                baseBundle.betaLabels[b].moveTo([x1 - 0.62, labelY, 0]);
              }
              // Swap base curves: remove old, build new at interpolated scale.
              scene.remove(...currentBaseCurveVGroups);
              currentBaseCurveVGroups = buildBaseCurveVGroups(mapY);
              scene.add(...currentBaseCurveVGroups);
              await scene.wait(frameWait);
            }
            if (shouldAbort()) return;

            // Draw the family; durations decay geometrically so the high-β curves
            // feel deliberate and the tail toward β → 0 whips in.
            {
              const durStart = 0.22;
              const durEnd = 0.028;
              const n = smallerBundle.curveLines.length;
              for (let i = 0; i < n; i++) {
                if (shouldAbort()) return;
                const t = n === 1 ? 1 : i / (n - 1);
                const dur = durStart * Math.pow(durEnd / durStart, t);
                await scene.play(new Create(smallerBundle.curveLines[i], { duration: dur }));
                if (shouldAbort()) return;
              }
            }
            await scene.play(new Create(limitCurve, { duration: 0.9 }));
            if (shouldAbort()) return;
            await scene.play(
              new Create(limitArrow, { duration: 0.6 }),
              new Write(limitNoteLbl, { duration: 0.55 })
            );
          } else {
            // Non-animated fallback: jump straight to the final state.
            repositionYScale(Y_LOG_MAX);
            setYScaleVisibility(Y_LOG_MAX);
            for (let b = 0; b < baseBetas.length; b++) {
              const beta = baseBetas[b];
              const limitY = mapYFinal(1 / beta);
              const labelY = Math.min(y1 - 0.10, Math.max(y0 + 0.12, limitY + 0.12));
              baseBundle.betaLabels[b].moveTo([x1 - 0.62, labelY, 0]);
            }
            scene.remove(...currentBaseCurveVGroups);
            currentBaseCurveVGroups = buildBaseCurveVGroups(mapYFinal);
            scene.add(
              graphFrame, xGridGroup, ...graphAxes, ...xTickMarks, ...xTickLabels,
              xLab, yLab,
              aclHighlightBox, aclArrow,
              ...currentBaseCurveVGroups, ...baseBundle.betaLabels,
              ...smallerBundle.curveLines,
              limitCurve, limitArrow, limitNoteLbl
            );
          }
        }
      } finally {
        isRendering = false;
      }

      if (queuedStep !== null) {
        const next = queuedStep;
        queuedStep = null;
        if (next !== currentStep) {
          currentStep = next;
          updateStepperUi();
        }
        await renderStep(false, renderToken);
      }
    };

    const setStep = async (targetStep) => {
      const step = Math.max(1, Math.min(5, targetStep));
      if (isRendering) {
        queuedStep = step;
        renderToken += 1;
        return;
      }
      if (step === currentStep) return;
      currentStep = step;
      updateStepperUi();
      renderToken += 1;
      await renderStep(true, renderToken);
    };

    prevBtn.addEventListener('click', () => setStep(currentStep - 1));
    nextBtn.addEventListener('click', () => setStep(currentStep + 1));

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
        e.preventDefault();
        setStep(currentStep + 1);
      }
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault();
        setStep(currentStep - 1);
      }
    });

    updateStepperUi();
    renderToken += 1;
    await renderStep(false, renderToken);
  </script>
</body>
</html>
