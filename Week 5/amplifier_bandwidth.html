<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMEN90033: Amplifier Bandwidth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #1a1a1e;
            --bg-panel: #222226;
            --bg-card: #2a2a2f;
            --border: rgba(255,255,255,0.08);
            --accent: #6aaa8e;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --text-muted: #606060;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 0.55rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 3px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--text-dim); text-decoration: none;
            font-size: 11px; font-weight: 500; transition: all 0.15s;
        }
        .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.18); }

        h1 { font-size: 0.85rem; font-weight: 600; letter-spacing: -0.01em; }
        .header-sub { font-size: 0.65rem; color: var(--text-dim); margin-top: 1px; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: calc(100vh - 42px);
            gap: 0;
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 0.4rem 0.75rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            flex-shrink: 0;
        }
        .panel-header strong { color: var(--text); font-weight: 500; font-size: 0.75rem; }

        .panel-body {
            flex: 1;
            position: relative;
            min-height: 0;
        }
        .panel-body canvas { display: block; width: 100%; height: 100%; }

        /* Controls panel */
        .controls-panel {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            overflow-y: auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .ctrl-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.45rem 0.55rem;
        }

        .ctrl-title {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.3rem;
        }
        .ctrl-row:last-child { margin-bottom: 0; }

        .ctrl-row label {
            font-size: 0.68rem;
            color: var(--text-dim);
            min-width: 55px;
            flex-shrink: 0;
        }

        .ctrl-row input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 3px;
            border-radius: 2px;
            outline: none;
        }
        .ctrl-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        .ctrl-val {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            color: #fff;
            min-width: 56px;
            width: 80px;
            text-align: right;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            padding: 2px 6px;
        }

        .btn-group {
            display: flex;
            gap: 3px;
        }
        .toggle-btn {
            flex: 1;
            padding: 5px 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            font-weight: 500;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .toggle-btn.active {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.18);
            color: #fff;
        }

        /* Equations panel */
        .eq-panel {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            overflow-y: auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .eq-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.45rem 0.55rem;
        }

        .eq-title {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .equation {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.82rem;
            color: #fff;
            line-height: 1.8;
            padding: 0.3rem 0;
        }

        .equation .dim {
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .equation .highlight {
            color: var(--accent);
            transition: color 0.3s;
        }

        .regime-label {
            display: inline-block;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 3px;
            background: rgba(106,170,142,0.15);
            color: var(--accent);
            border: 1px solid rgba(106,170,142,0.3);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: var(--text-dim);
            padding: 0.15rem 0;
        }
        .info-row .val {
            font-family: 'IBM Plex Mono', monospace;
            color: #fff;
        }

        .derived-readout {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            color: var(--accent);
            text-align: center;
            padding: 0.4rem;
            background: rgba(106,170,142,0.08);
            border: 1px solid rgba(106,170,142,0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="../index.html" class="back-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
                <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
            </svg>
            Back
        </a>
        <div>
            <h1>Amplifier Bandwidth</h1>
            <div class="header-sub">BMEN90033 · Week 5</div>
        </div>
    </div>
</header>

<div class="main-layout">
    <!-- Top-left: Animated RC Circuit -->
    <div class="panel">
        <div class="panel-header"><strong>RC Circuit Model</strong><span id="circuit-freq-label">—</span></div>
        <div class="panel-body"><canvas id="circuit-canvas"></canvas></div>
    </div>
    <!-- Top-right: Bode Plot -->
    <div class="panel">
        <div class="panel-header"><strong>Bode Magnitude Plot</strong><span id="bode-gain-label">—</span></div>
        <div class="panel-body"><canvas id="bode-canvas"></canvas></div>
    </div>
    <!-- Bottom-left: Controls -->
    <div class="controls-panel" id="controls-panel">
        <div class="ctrl-section">
            <div class="ctrl-title">Component Values</div>
            <div class="ctrl-row">
                <label>R</label>
                <input type="range" id="r-slider" min="0" max="1" step="0.001" value="0.5">
                <span class="ctrl-val" id="r-val">10 k&#8486;</span>
            </div>
            <div class="ctrl-row">
                <label>C</label>
                <input type="range" id="c-slider" min="0" max="1" step="0.001" value="0.5">
                <span class="ctrl-val" id="c-val">1.0 nF</span>
            </div>
        </div>

        <div class="ctrl-section">
            <div class="ctrl-title">Amplifier</div>
            <div class="ctrl-row">
                <label>A<sub>v</sub></label>
                <input type="range" id="av-slider" min="0" max="1" step="0.001" value="0.667">
                <span class="ctrl-val" id="av-val">100 (40 dB)</span>
            </div>
        </div>

        <div class="ctrl-section">
            <div class="ctrl-title">Test Signal</div>
            <div class="ctrl-row">
                <label>&#969;</label>
                <input type="range" id="freq-slider" min="0" max="1" step="0.001" value="0.5">
                <span class="ctrl-val" id="freq-val">100 krad/s</span>
            </div>
            <div class="info-row">
                <span>Frequency</span>
                <span class="val" id="freq-hz-val">15.9 kHz</span>
            </div>
        </div>

        <div class="derived-readout" id="omega0-readout">
            &#969;<sub>0</sub> = 1/RC = 100 krad/s
        </div>

        <div class="ctrl-section">
            <div class="ctrl-title">Presets</div>
            <div class="btn-group">
                <button class="toggle-btn" id="preset-audio">Audio Amp</button>
                <button class="toggle-btn" id="preset-rf">RF Stage</button>
            </div>
        </div>
    </div>
    <!-- Bottom-right: Equations -->
    <div class="eq-panel" id="eq-panel">
        <!-- Equations content goes here -->
    </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
let R = 10000;          // Ohms (default 10k)
let C = 1e-9;           // Farads (default 1nF)
let Av = 100;           // mid-band gain (linear)
let testFreq = 1e5;     // rad/s

function omega0() { return 1 / (R * C); }
function gainAt(w) { return Av / Math.sqrt(1 + (w / omega0()) ** 2); }
function gainDb(w) { return 20 * Math.log10(gainAt(w)); }

// ── Canvas references ──────────────────────────────────
let circuitCanvas, circuitCtx;
let bodeCanvas, bodeCtx;

// ── Resize helper ──────────────────────────────────────
function sizeCanvas(canvas) {
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { w: rect.width, h: rect.height, ctx };
}

// ── Drawing helpers ───────────────────────────────────
function drawSineWave(ctx, x, y, width, amp, gainFrac, phaseShift, wt, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    for (let i = 0; i <= width; i++) {
        const t = (i / width) * Math.PI * 2;
        const px = x + i;
        const py = y - Math.sin(t + wt + phaseShift) * amp * gainFrac;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.globalAlpha = 1.0;

    // Label amplitude percentage
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.6;
    ctx.font = '9px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText((gainFrac * 100).toFixed(0) + '%', x + width / 2, y + amp + 12);
    ctx.globalAlpha = 1.0;
}

function drawSignalPulses(ctx, x1, x2, y, wt, gainFrac, color) {
    ctx.globalAlpha = 0.4 * gainFrac + 0.1;
    const len = x2 - x1;
    const numPulses = 3;
    for (let i = 0; i < numPulses; i++) {
        const phase = (wt * 0.5 + i * (Math.PI * 2 / numPulses)) % (Math.PI * 2);
        const t = phase / (Math.PI * 2);
        const px = x1 + t * len;
        const radius = 3 * gainFrac + 1;
        ctx.beginPath();
        ctx.arc(px, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
    }
    ctx.globalAlpha = 1.0;
}

// ── Circuit diagram ──────────────────────────────────
function drawCircuit() {
    const { w: W, h: H, ctx } = sizeCanvas(circuitCanvas);
    ctx.clearRect(0, 0, W, H);

    const pad = 40;
    const midY = H / 2;
    const gndY = H * 0.75;
    const xSrc = pad + 20;
    const xAmp = W * 0.28;
    const xR1 = W * 0.45;
    const xR2 = W * 0.62;
    const xOut = W * 0.72;
    const xEnd = W - pad - 20;

    const w0 = omega0();
    const gainFrac = 1 / Math.sqrt(1 + (testFreq / w0) ** 2);
    const phase = -Math.atan(testFreq / w0);
    const wt = animTime * testFreq;

    // ── Wires ──
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    // Input wire: xSrc -> amp
    ctx.beginPath(); ctx.moveTo(xSrc, midY); ctx.lineTo(xAmp - 20, midY); ctx.stroke();
    // Amp output -> resistor
    ctx.beginPath(); ctx.moveTo(xAmp + 20, midY); ctx.lineTo(xR1, midY); ctx.stroke();
    // After resistor -> end
    ctx.beginPath(); ctx.moveTo(xR2, midY); ctx.lineTo(xEnd, midY); ctx.stroke();
    // Output node down to capacitor/ground
    ctx.beginPath(); ctx.moveTo(xOut, midY); ctx.lineTo(xOut, gndY - 20); ctx.stroke();

    // ── Ground symbol ──
    const gndTop = gndY - 10;
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(xOut - 10, gndTop); ctx.lineTo(xOut + 10, gndTop); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(xOut - 6, gndTop + 5); ctx.lineTo(xOut + 6, gndTop + 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(xOut - 3, gndTop + 10); ctx.lineTo(xOut + 3, gndTop + 10); ctx.stroke();

    // ── Input source (circle with sine) ──
    const srcX = xSrc - 14;
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(srcX, midY, 12, 0, Math.PI * 2);
    ctx.stroke();
    // Tiny sine inside
    ctx.strokeStyle = '#ffcc44';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i <= 8; i++) {
        const t = (i / 8) * Math.PI * 2;
        const px = srcX - 7 + (i / 8) * 14;
        const py = midY - Math.sin(t) * 4;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
    // Label
    ctx.fillStyle = '#ffcc44';
    ctx.font = '11px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('V\u1D62\u2099', srcX, midY - 18);

    // ── Amplifier triangle ──
    ctx.beginPath();
    ctx.moveTo(xAmp - 20, midY - 20);
    ctx.lineTo(xAmp + 20, midY);
    ctx.lineTo(xAmp - 20, midY + 20);
    ctx.closePath();
    ctx.fillStyle = 'rgba(106,170,142,0.15)';
    ctx.fill();
    ctx.strokeStyle = '#6aaa8e';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Label
    ctx.fillStyle = '#6aaa8e';
    ctx.font = '12px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('A\u1D65', xAmp - 4, midY + 5);

    // ── Resistor (zig-zag) ──
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(xR1, midY);
    const rLen = xR2 - xR1;
    const zags = 6;
    const zagW = rLen / zags;
    const zagAmp = 8;
    for (let i = 0; i < zags; i++) {
        const x0 = xR1 + i * zagW;
        ctx.lineTo(x0 + zagW * 0.25, midY - zagAmp);
        ctx.lineTo(x0 + zagW * 0.75, midY + zagAmp);
        ctx.lineTo(x0 + zagW, midY);
    }
    ctx.stroke();
    // Labels
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '11px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('R', (xR1 + xR2) / 2, midY - zagAmp - 6);
    ctx.font = '9px IBM Plex Mono, monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(fmtR(R), (xR1 + xR2) / 2, midY + zagAmp + 14);

    // ── Capacitor (two plates) ──
    const capY = gndY - 20;
    const capGap = 6;
    const capW = 16;
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(xOut - capW / 2, capY - capGap / 2);
    ctx.lineTo(xOut + capW / 2, capY - capGap / 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(xOut - capW / 2, capY + capGap / 2);
    ctx.lineTo(xOut + capW / 2, capY + capGap / 2);
    ctx.stroke();
    // Labels
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '11px IBM Plex Mono, monospace';
    ctx.textAlign = 'left';
    ctx.fillText('C', xOut + capW / 2 + 4, capY + 4);
    ctx.font = '9px IBM Plex Mono, monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(fmtC(C), xOut + capW / 2 + 4, capY + 16);

    // ── Vout label and output dot ──
    ctx.fillStyle = '#6aaa8e';
    ctx.font = '11px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Vout', xEnd, midY - 12);
    // Output dot at xOut
    ctx.beginPath();
    ctx.arc(xOut, midY, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#6aaa8e';
    ctx.fill();

    // ── Animated sine waves ──
    const sineW = 30;
    const sineAmp = 14;
    // Input sine
    drawSineWave(ctx, xSrc + 6, midY - 28, sineW, sineAmp, 1.0, 0, wt, '#ffcc44');
    // Output sine (attenuated + phase shifted)
    drawSineWave(ctx, xOut - sineW / 2, midY - 28, sineW, sineAmp, gainFrac, phase, wt, '#6aaa8e');

    // ── Animated signal pulses ──
    // Amp to resistor (full amplitude, yellow)
    drawSignalPulses(ctx, xAmp + 20, xR1, midY, wt, 1.0, '#ffcc44');
    // Resistor to end (attenuated, green)
    drawSignalPulses(ctx, xR2, xEnd, midY, wt, gainFrac, '#6aaa8e');

    // ── Update frequency label ──
    const freqLabel = document.getElementById('circuit-freq-label');
    if (freqLabel) {
        freqLabel.textContent = '\u03C9 = ' + fmtFreq(testFreq);
    }
}
function drawBode() {
    const { w, h, ctx } = sizeCanvas(bodeCanvas);

    const pad = { top: 30, right: 30, bottom: 45, left: 60 };
    const plotW = w - pad.left - pad.right;
    const plotH = h - pad.top - pad.bottom;

    // Frequency range: 3 decades below to 3 decades above omega_0
    const w0 = omega0();
    const logCenter = Math.log10(w0);
    const logMin = logCenter - 3;
    const logMax = logCenter + 3;

    // dB range
    const avDb = 20 * Math.log10(Av);
    const dbMax = Math.ceil((avDb + 10) / 10) * 10;
    const dbMin = dbMax - 80;

    // Helper closures: data -> pixel
    function xPx(freq) {
        return pad.left + (Math.log10(freq) - logMin) / (logMax - logMin) * plotW;
    }
    function yPx(db) {
        return pad.top + (dbMax - db) / (dbMax - dbMin) * plotH;
    }

    // ── Grid lines ──
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);

    // Vertical grid at each decade
    for (let d = Math.ceil(logMin); d <= Math.floor(logMax); d++) {
        const x = xPx(Math.pow(10, d));
        ctx.beginPath();
        ctx.moveTo(x, pad.top);
        ctx.lineTo(x, pad.top + plotH);
        ctx.stroke();
    }

    // Horizontal grid every 10 dB
    for (let db = dbMin; db <= dbMax; db += 10) {
        const y = yPx(db);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + plotW, y);
        ctx.stroke();
    }

    // ── Mid-band gain dashed line ──
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.setLineDash([6, 4]);
    ctx.lineWidth = 1;
    const yMid = yPx(avDb);
    ctx.beginPath();
    ctx.moveTo(pad.left, yMid);
    ctx.lineTo(pad.left + plotW, yMid);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = "11px 'IBM Plex Mono', monospace";
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText('Mid-band: ' + avDb.toFixed(1) + ' dB', pad.left + plotW - 4, yMid - 3);

    // ── omega_0 vertical dashed line ──
    const xW0 = xPx(w0);
    ctx.strokeStyle = '#6aaa8e';
    ctx.setLineDash([6, 4]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(xW0, pad.top);
    ctx.lineTo(xW0, pad.top + plotH);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#6aaa8e';
    ctx.font = "11px 'IBM Plex Mono', monospace";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('\u03C9\u2080 = ' + fmtFreq(w0), xW0, pad.top - 4);

    // ── -20 dB/decade asymptotic slope (dotted) ──
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.setLineDash([3, 3]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(xW0, yPx(avDb));
    // Extend right to edge: slope is -20 dB/decade
    const decadesRight = logMax - logCenter;
    const endDb = avDb - 20 * decadesRight;
    ctx.lineTo(pad.left + plotW, yPx(endDb));
    ctx.stroke();
    ctx.setLineDash([]);

    // ── Main gain curve ──
    ctx.strokeStyle = '#6aaa8e';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath();
    const N = 400;
    for (let i = 0; i <= N; i++) {
        const logW = logMin + (logMax - logMin) * i / N;
        const freq = Math.pow(10, logW);
        const db = gainDb(freq);
        const x = xPx(freq);
        const y = yPx(db);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // ── -3 dB point dot at omega_0 ──
    const db3 = avDb - 3;
    ctx.fillStyle = '#6aaa8e';
    ctx.beginPath();
    ctx.arc(xW0, yPx(db3), 4, 0, 2 * Math.PI);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.font = "10px 'IBM Plex Mono', monospace";
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('-3 dB', xW0 + 7, yPx(db3));

    // ── Test frequency marker ──
    const testDb = gainDb(testFreq);
    const xTest = xPx(testFreq);
    const yTest = yPx(testDb);

    // Vertical dashed line to x-axis
    ctx.strokeStyle = '#ffcc44';
    ctx.setLineDash([6, 4]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(xTest, yTest);
    ctx.lineTo(xTest, pad.top + plotH);
    ctx.stroke();
    ctx.setLineDash([]);

    // Yellow dot
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.arc(xTest, yTest, 6, 0, 2 * Math.PI);
    ctx.fill();

    // Gain readout label — flip alignment based on position
    const inLeftHalf = xTest < pad.left + plotW / 2;
    ctx.fillStyle = '#ffcc44';
    ctx.font = "11px 'IBM Plex Mono', monospace";
    ctx.textAlign = inLeftHalf ? 'left' : 'right';
    ctx.textBaseline = 'bottom';
    const labelOffset = inLeftHalf ? 9 : -9;
    ctx.fillText(testDb.toFixed(1) + ' dB', xTest + labelOffset, yTest - 7);

    // ── X-axis tick labels (decade powers) ──
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = "10px 'IBM Plex Mono', monospace";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (let d = Math.ceil(logMin); d <= Math.floor(logMax); d++) {
        const x = xPx(Math.pow(10, d));
        ctx.fillText('10' + (d < 0 ? '\u207B' : '') + superscriptDigits(Math.abs(d)), x, pad.top + plotH + 5);
    }

    // ── Y-axis tick labels (dB values) ──
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = "10px 'IBM Plex Mono', monospace";
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let db = dbMin; db <= dbMax; db += 10) {
        ctx.fillText(db + '', pad.left - 6, yPx(db));
    }

    // ── Axis titles ──
    // X-axis
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = "12px 'IBM Plex Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('Frequency (rad/s)', pad.left + plotW / 2, pad.top + plotH + 25);

    // Y-axis (rotated)
    ctx.save();
    ctx.translate(14, pad.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = "12px 'IBM Plex Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Gain (dB)', 0, 0);
    ctx.restore();

    // ── Update header label ──
    const bodeLabel = document.getElementById('bode-gain-label');
    if (bodeLabel) {
        bodeLabel.textContent = 'Gain @ \u03C9 = ' + fmtFreq(testFreq) + ': ' + testDb.toFixed(1) + ' dB';
    }
}

// Helper: convert digits to Unicode superscript
function superscriptDigits(n) {
    const sup = ['\u2070', '\u00B9', '\u00B2', '\u00B3', '\u2074', '\u2075', '\u2076', '\u2077', '\u2078', '\u2079'];
    return String(n).split('').map(d => sup[parseInt(d)]).join('');
}

// ── Log-scale slider helpers ───────────────────────────
function logMap(t, min, max) {
    return min * Math.pow(max / min, t);
}
function logUnmap(val, min, max) {
    return Math.log(val / min) / Math.log(max / min);
}

// Slider ranges
const R_MIN = 100, R_MAX = 100000;
const C_MIN = 1e-12, C_MAX = 100e-9;
const AV_MIN = 1, AV_MAX = 1000;
const FREQ_MIN = 1, FREQ_MAX = 1e9;

// ── Formatting helpers ─────────────────────────────────
function fmtR(val) {
    if (val >= 1e6) return (val / 1e6).toPrecision(3) + ' M\u2126';
    if (val >= 1e3) return (val / 1e3).toPrecision(3) + ' k\u2126';
    return val.toPrecision(3) + ' \u2126';
}

function fmtC(val) {
    if (val >= 1e-6) return (val * 1e6).toPrecision(3) + ' \u00B5F';
    if (val >= 1e-9) return (val * 1e9).toPrecision(3) + ' nF';
    return (val * 1e12).toPrecision(3) + ' pF';
}

function fmtFreq(val) {
    if (val >= 1e9) return (val / 1e9).toPrecision(3) + ' Grad/s';
    if (val >= 1e6) return (val / 1e6).toPrecision(3) + ' Mrad/s';
    if (val >= 1e3) return (val / 1e3).toPrecision(3) + ' krad/s';
    return val.toPrecision(3) + ' rad/s';
}

function fmtHz(wVal) {
    const hz = wVal / (2 * Math.PI);
    if (hz >= 1e9) return (hz / 1e9).toPrecision(3) + ' GHz';
    if (hz >= 1e6) return (hz / 1e6).toPrecision(3) + ' MHz';
    if (hz >= 1e3) return (hz / 1e3).toPrecision(3) + ' kHz';
    return hz.toPrecision(3) + ' Hz';
}

function fmtAv(val) {
    const db = 20 * Math.log10(val);
    return val.toPrecision(3) + ' (' + db.toFixed(1) + ' dB)';
}

// ── Init ───────────────────────────────────────────────
function init() {
    circuitCanvas = document.getElementById('circuit-canvas');
    bodeCanvas = document.getElementById('bode-canvas');
    circuitCtx = circuitCanvas.getContext('2d');
    bodeCtx = bodeCanvas.getContext('2d');

    window.addEventListener('resize', () => {
        drawBode();
        drawCircuit();
    });

    const rSlider = document.getElementById('r-slider');
    const cSlider = document.getElementById('c-slider');
    const avSlider = document.getElementById('av-slider');
    const freqSlider = document.getElementById('freq-slider');

    function updateFromSliders() {
        R = logMap(parseFloat(rSlider.value), R_MIN, R_MAX);
        C = logMap(parseFloat(cSlider.value), C_MIN, C_MAX);
        Av = logMap(parseFloat(avSlider.value), AV_MIN, AV_MAX);
        testFreq = logMap(parseFloat(freqSlider.value), FREQ_MIN, FREQ_MAX);
        updateReadouts();
    }

    function updateReadouts() {
        document.getElementById('r-val').textContent = fmtR(R);
        document.getElementById('c-val').textContent = fmtC(C);
        document.getElementById('av-val').textContent = fmtAv(Av);
        document.getElementById('freq-val').textContent = fmtFreq(testFreq);
        document.getElementById('freq-hz-val').textContent = fmtHz(testFreq);
        document.getElementById('omega0-readout').innerHTML =
            '\u03C9<sub>0</sub> = 1/RC = ' + fmtFreq(omega0());
    }

    rSlider.addEventListener('input', updateFromSliders);
    cSlider.addEventListener('input', updateFromSliders);
    avSlider.addEventListener('input', updateFromSliders);
    freqSlider.addEventListener('input', updateFromSliders);

    // Preset buttons
    document.getElementById('preset-audio').addEventListener('click', () => {
        R = 10000; C = 10e-9; Av = 100; testFreq = omega0();
        rSlider.value = logUnmap(R, R_MIN, R_MAX);
        cSlider.value = logUnmap(C, C_MIN, C_MAX);
        avSlider.value = logUnmap(Av, AV_MIN, AV_MAX);
        freqSlider.value = logUnmap(testFreq, FREQ_MIN, FREQ_MAX);
        updateReadouts();
    });

    document.getElementById('preset-rf').addEventListener('click', () => {
        R = 500; C = 5e-12; Av = 20; testFreq = omega0();
        rSlider.value = logUnmap(R, R_MIN, R_MAX);
        cSlider.value = logUnmap(C, C_MIN, C_MAX);
        avSlider.value = logUnmap(Av, AV_MIN, AV_MAX);
        freqSlider.value = logUnmap(testFreq, FREQ_MIN, FREQ_MAX);
        updateReadouts();
    });

    updateReadouts();

    requestAnimationFrame(animate);
}

let animTime = 0;
let lastTime = 0;
function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    if (dt < 0.1) {
        animTime += dt;
    }
    drawBode();
    drawCircuit();
    requestAnimationFrame(animate);
}

document.addEventListener('DOMContentLoaded', init);
</script>
