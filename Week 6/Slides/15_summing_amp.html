<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 15 — Summing Amplifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">16 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
  </div>

  <script type="module">
    import {
      Scene, Polygon, Rectangle, Line, Circle, Text, MathTex, VGroup, Dot,
      Create, Write, FadeIn, MoveAlongPath,
      UP, DOWN, LEFT, RIGHT, WHITE, linear
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ── Title ──
    const title = new Text({ text: 'Summing Amplifier', fontSize: 40, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    // ── Bullet list (bottom) ──
    const bullets = [
      'Output = inverted, weighted sum of the inputs',
      'Each summing coefficient is set by its feed-in resistor (R_A, R_B)',
      'R_F provides negative feedback and sets the master gain',
      'Inputs V_A, V_B feed the inverting input (summing junction)'
    ];
    const bulletObjs = [];
    for (let i = 0; i < bullets.length; i++) {
      const b = new Text({ text: '•  ' + bullets[i], fontSize: 12, color: MUTED, fontUrl: FONT_URL });
      await b.loadGlyphs?.();
      b.moveTo([0, -2.65 - i * 0.32, 0]);
      bulletObjs.push(b);
    }

    // ── Circuit (upper area) ──
    const cy = 1.6;
    const tri = new Polygon({
      vertices: [[0, cy - 1.2, 0], [0, cy + 1.2, 0], [1.6, cy, 0]],
      color: ACCENT, strokeWidth: 2, fillOpacity: 0
    });
    const pSym = new Text({ text: '+', fontSize: 16, color: ACCENT, fontUrl: FONT_URL }).moveTo([0.35, cy - 0.4, 0]);
    const mSym = new Text({ text: '−', fontSize: 16, color: RED,    fontUrl: FONT_URL }).moveTo([0.35, cy + 0.4, 0]);
    const gndP = new Line({ start: [0, cy - 0.5, 0], end: [-0.9, cy - 0.5, 0], color: FG });
    const gndA = new Line({ start: [-0.9, cy - 0.5, 0], end: [-0.9, cy - 1.3, 0], color: FG });
    const gndM = new Line({ start: [-1.1, cy - 1.3, 0], end: [-0.7, cy - 1.3, 0], color: FG, strokeWidth: 3 });

    // Two inputs feeding summing node at (0, cy+0.5)
    const vAIn = new Line({ start: [-5, cy + 1.3, 0], end: [0, cy + 0.5, 0], color: FG });
    const vBIn = new Line({ start: [-5, cy - 0.1, 0], end: [0, cy + 0.5, 0], color: FG });
    const RA = new Rectangle({ width: 0.6, height: 0.25, color: ACCENT, strokeWidth: 2 });
    RA.rotate(Math.atan2((cy + 0.5) - (cy + 1.3), 0 + 5));
    RA.moveTo([-2.5, cy + 0.95, 0]);
    const RB = new Rectangle({ width: 0.6, height: 0.25, color: ACCENT, strokeWidth: 2 });
    RB.rotate(Math.atan2((cy + 0.5) - (cy - 0.1), 0 + 5));
    RB.moveTo([-2.5, cy + 0.2, 0]);

    const RAlbl = new MathTex({ latex: 'R_{A}', color: ACCENT });
    const RBlbl = new MathTex({ latex: 'R_{B}', color: ACCENT });
    const vAlbl = new MathTex({ latex: 'V_{A}', color: BLUE });
    const vBlbl = new MathTex({ latex: 'V_{B}', color: MAG });
    const iAlbl = new MathTex({ latex: 'i_{A}', color: BLUE });
    const iBlbl = new MathTex({ latex: 'i_{B}', color: MAG });
    const ilbl  = new MathTex({ latex: 'i', color: YELLOW });
    const vnvp  = new MathTex({ latex: 'v_n = v_p = 0', color: MUTED });
    await Promise.all([RAlbl.waitForRender?.(), RBlbl.waitForRender?.(), vAlbl.waitForRender?.(), vBlbl.waitForRender?.(),
                        iAlbl.waitForRender?.(), iBlbl.waitForRender?.(), ilbl.waitForRender?.(), vnvp.waitForRender?.()]);
    RAlbl.scale(0.45).nextTo(RA, UP, 0.08);
    RBlbl.scale(0.45).nextTo(RB, DOWN, 0.08);
    vAlbl.scale(0.5).nextTo([-5, cy + 1.3, 0], LEFT, 0.08);
    vBlbl.scale(0.5).nextTo([-5, cy - 0.1, 0], LEFT, 0.08);
    iAlbl.scale(0.4).moveTo([-1.2, cy + 1.2, 0]);
    iBlbl.scale(0.4).moveTo([-1.2, cy - 0.05, 0]);
    ilbl.scale(0.4).moveTo([0.9, cy + 1.25, 0]);
    vnvp.scale(0.4).moveTo([-0.5, cy + 0.7, 0]);

    // R_F feedback
    const fbA = new Line({ start: [0, cy + 0.5, 0], end: [0, cy + 1.6, 0], color: FG });
    const fbB = new Line({ start: [0, cy + 1.6, 0], end: [2.3, cy + 1.6, 0], color: FG });
    const fbC = new Line({ start: [2.3, cy + 1.6, 0], end: [2.3, cy, 0], color: FG });
    const RF = new Rectangle({ width: 0.75, height: 0.25, color: YELLOW, strokeWidth: 2 });
    RF.moveTo([1.15, cy + 1.6, 0]);
    const RFlbl = new MathTex({ latex: 'R_{F}', color: YELLOW });
    await RFlbl.waitForRender?.();
    RFlbl.scale(0.5).nextTo(RF, UP, 0.08);

    const outWire = new Line({ start: [1.6, cy, 0], end: [3.6, cy, 0], color: FG });
    const voLbl = new MathTex({ latex: 'V_{o}', color: YELLOW });
    await voLbl.waitForRender?.();
    voLbl.scale(0.55).nextTo([3.6, cy, 0], RIGHT, 0.08);

    const eqn = new MathTex({ latex: 'V_o = -R_F\\sum\\dfrac{V_n}{R_n}', color: YELLOW });
    await eqn.waitForRender?.();
    eqn.scale(0.7).moveTo([5.0, cy - 1.2, 0]);

    const appNote = new Text({ text: 'Application: audio mixer', fontSize: 11, color: ACCENT, fontUrl: FONT_URL });
    await appNote.loadGlyphs?.();
    appNote.moveTo([5.0, cy - 1.7, 0]);

    // Sequence
    await scene.play(new Write(title, { duration: 0.6 }));
    await scene.play(
      new Create(tri), new Write(pSym), new Write(mSym),
      new Create(gndP), new Create(gndA), new Create(gndM)
    );
    await scene.play(
      new Create(vAIn), new Create(vBIn),
      new Create(RA), new Create(RB),
      new Write(RAlbl), new Write(RBlbl),
      new Write(vAlbl), new Write(vBlbl),
      new Write(iAlbl), new Write(iBlbl)
    );
    await scene.play(
      new Create(fbA), new Create(fbB), new Create(fbC),
      new Create(RF), new Write(RFlbl),
      new Create(outWire), new Write(voLbl),
      new Write(ilbl)
    );
    await scene.play(new FadeIn(vnvp));

    const dotA = new Dot({ point: [-5, cy + 1.3, 0], color: BLUE, radius: 0.09 });
    const dotB = new Dot({ point: [-5, cy - 0.1, 0], color: MAG, radius: 0.09 });
    scene.add(dotA, dotB);
    const pathA = new Line({ start: [-5, cy + 1.3, 0], end: [0, cy + 0.5, 0] });
    const pathB = new Line({ start: [-5, cy - 0.1, 0], end: [0, cy + 0.5, 0] });
    await scene.play(
      new MoveAlongPath(dotA, { path: pathA, duration: 1.2, rateFunc: linear }),
      new MoveAlongPath(dotB, { path: pathB, duration: 1.2, rateFunc: linear })
    );

    await scene.play(new Write(eqn));
    await scene.play(new FadeIn(appNote));

    for (const b of bulletObjs) {
      await scene.play(new FadeIn(b, { duration: 0.2 }));
    }
    await scene.wait(1.5);
  </script>
</body>
</html>
