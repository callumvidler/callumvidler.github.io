<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 13 — Resistor Choice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">14 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
  </div>

  <div class="quiz-row" id="quiz">
    <button class="quiz-btn" data-k="low">1 Ω / 10 Ω</button>
    <button class="quiz-btn" data-k="mid">1 kΩ / 10 kΩ</button>
    <button class="quiz-btn" data-k="high">1 MΩ / 10 MΩ</button>
  </div>

  <script type="module">
    import {
      Scene, Polygon, Rectangle, Line, Circle, Text, MathTex, VGroup, Dot,
      Create, Write, FadeIn, FadeOut, FadeToColor,
      UP, DOWN, LEFT, RIGHT, WHITE
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ── Title ──
    const title = new Text({ text: 'Resistor Choice', fontSize: 40, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    // ── Setup / question text ──
    const setup = new Text({ text: "Let's build a circuit with a specified gain  A_v = -R₂ / R₁", fontSize: 14, color: MUTED, fontUrl: FONT_URL });
    await setup.loadGlyphs?.();
    setup.moveTo([0, 2.95, 0]);

    const question = new Text({ text: 'How do we choose: 1Ω/10Ω, 1kΩ/10kΩ, or 1MΩ/10MΩ?', fontSize: 14, color: YELLOW, fontUrl: FONT_URL });
    await question.loadGlyphs?.();
    question.moveTo([0, 2.55, 0]);

    // ── Options list (right side) ──
    const options = [
      '☐  Choose low values to reduce excessive thermal noise',
      '☐  Choose high values to avoid large currents',
      '☐  The resistor choice is arbitrary'
    ];
    const optObjs = [];
    for (let i = 0; i < options.length; i++) {
      const o = new Text({ text: options[i], fontSize: 12, color: MUTED, fontUrl: FONT_URL });
      await o.loadGlyphs?.();
      o.moveTo([3.5, 1.5 - i * 0.45, 0]);
      optObjs.push(o);
    }

    // ── Inverting amp circuit (left-centre) ──
    const cx = -2.8;
    const triangle = new Polygon({
      vertices: [[cx, -1.4, 0], [cx, 1.4, 0], [cx + 1.8, 0, 0]],
      color: ACCENT, strokeWidth: 2, fillOpacity: 0
    });
    const inWire = new Line({ start: [cx - 4.0, 0.65, 0], end: [cx, 0.65, 0], color: FG });
    const R1 = new Rectangle({ width: 0.75, height: 0.28, color: ACCENT, strokeWidth: 2 });
    R1.moveTo([cx - 1.4, 0.65, 0]);
    const R1Lbl = new MathTex({ latex: 'R_{1}', color: ACCENT });
    const gndP = new Line({ start: [cx, -0.65, 0], end: [cx - 0.8, -0.65, 0], color: FG });
    const gndP2 = new Line({ start: [cx - 0.8, -0.65, 0], end: [cx - 0.8, -1.3, 0], color: FG });
    const gndMark = new Line({ start: [cx - 1.0, -1.3, 0], end: [cx - 0.6, -1.3, 0], color: FG, strokeWidth: 3 });
    const fb1 = new Line({ start: [cx, 0.65, 0], end: [cx, 1.65, 0], color: FG });
    const fb2 = new Line({ start: [cx, 1.65, 0], end: [cx + 2.5, 1.65, 0], color: FG });
    const fb3 = new Line({ start: [cx + 2.5, 1.65, 0], end: [cx + 2.5, 0, 0], color: FG });
    const R2 = new Rectangle({ width: 0.75, height: 0.28, color: ACCENT, strokeWidth: 2 });
    R2.moveTo([cx + 1.25, 1.65, 0]);
    const R2Lbl = new MathTex({ latex: 'R_{2}', color: ACCENT });
    const outW = new Line({ start: [cx + 1.8, 0, 0], end: [cx + 3.8, 0, 0], color: FG });
    const vinLbl = new MathTex({ latex: 'V_{IN}', color: FG });
    const voutLbl = new MathTex({ latex: 'V_{OUT}', color: YELLOW });

    await Promise.all([R1Lbl.waitForRender?.(), R2Lbl.waitForRender?.(), vinLbl.waitForRender?.(), voutLbl.waitForRender?.()]);
    R1Lbl.scale(0.5).nextTo(R1, UP, 0.08);
    R2Lbl.scale(0.5).nextTo(R2, UP, 0.08);
    vinLbl.scale(0.55).nextTo([cx - 4.0, 0.65, 0], LEFT, 0.08);
    voutLbl.scale(0.55).nextTo([cx + 3.8, 0, 0], RIGHT, 0.08);

    // ── Sequence ──
    await scene.play(new Write(title, { duration: 0.6 }));
    await scene.play(new FadeIn(setup));
    await scene.play(new FadeIn(question));
    await scene.play(
      new Create(triangle),
      new Create(inWire), new Create(R1), new Write(R1Lbl),
      new Create(gndP), new Create(gndP2), new Create(gndMark),
      new Create(fb1), new Create(fb2), new Create(fb3),
      new Create(R2), new Write(R2Lbl),
      new Create(outW),
      new Write(vinLbl), new Write(voutLbl)
    );
    for (const o of optObjs) {
      await scene.play(new FadeIn(o, { duration: 0.25 }));
    }

    // ── State captions ──
    const stateText = new Text({ text: 'Pick an option from the buttons below…', fontSize: 14, color: MUTED, fontUrl: FONT_URL });
    await stateText.loadGlyphs?.();
    stateText.moveTo([0, -2.9, 0]);
    scene.add(stateText);

    // Current flow dot and parasitic cap
    const currentDot = new Dot({ point: [cx - 4.0, 0.65, 0], color: RED, radius: 0.1 });
    const capPlate1 = new Line({ start: [cx - 1.3, 0.3, 0], end: [cx - 0.8, 0.3, 0], color: MAG, strokeWidth: 3 });
    const capPlate2 = new Line({ start: [cx - 1.25, 0.1, 0], end: [cx - 0.85, 0.1, 0], color: MAG, strokeWidth: 3 });
    const capGndW = new Line({ start: [cx - 1.05, 0.1, 0], end: [cx - 1.05, -0.4, 0], color: FG });
    const capLbl = new Text({ text: 'C_stray', fontSize: 11, color: MAG, fontUrl: FONT_URL });

    let showing = null;
    const clearPrev = () => {
      if (!showing) return;
      for (const o of showing.objs) scene.remove(o);
      showing = null;
    };

    const showLow = async () => {
      clearPrev();
      scene.add(currentDot);
      scene.remove(stateText);
      const msg = new Text({ text: 'High current → heat → thermal noise', fontSize: 14, color: RED, fontUrl: FONT_URL });
      await msg.loadGlyphs?.();
      msg.moveTo([0, -2.9, 0]);
      scene.add(msg);
      showing = { objs: [currentDot, msg] };
    };
    const showMid = async () => {
      clearPrev();
      scene.remove(stateText);
      const msg = new Text({ text: '✓  Safe mid-range. Low noise, low draw.', fontSize: 14, color: ACCENT, fontUrl: FONT_URL });
      await msg.loadGlyphs?.();
      msg.moveTo([0, -2.9, 0]);
      scene.add(msg);
      showing = { objs: [msg] };
    };
    const showHigh = async () => {
      clearPrev();
      scene.remove(stateText);
      await capLbl.loadGlyphs?.();
      capLbl.moveTo([cx - 0.75, -0.55, 0]);
      scene.add(capPlate1, capPlate2, capGndW, capLbl);
      const msg = new Text({ text: 'Stray capacitance dominates → low-pass filter', fontSize: 14, color: MAG, fontUrl: FONT_URL });
      await msg.loadGlyphs?.();
      msg.moveTo([0, -2.9, 0]);
      scene.add(msg);
      showing = { objs: [capPlate1, capPlate2, capGndW, capLbl, msg] };
    };

    document.querySelectorAll('#quiz .quiz-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        document.querySelectorAll('#quiz .quiz-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const k = btn.dataset.k;
        if (k === 'low') await showLow();
        else if (k === 'mid') await showMid();
        else await showHigh();
      });
    });

    await scene.wait(1);
  </script>
</body>
</html>
