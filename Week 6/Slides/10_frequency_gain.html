<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 10 — Frequency Response, Feedback, and GBP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">11 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
  </div>

  <script type="module">
    import {
      Scene, Line, MathTex, Text, Arrow, Rectangle,
      Create, Write, FadeIn,
      UP, DOWN, LEFT, RIGHT, WHITE
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ── Title ──
    const title = new Text({ text: 'Frequency Response, Feedback, and GBP', fontSize: 36, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    // ── Bullet list (left side) ──
    const bulletsOpenLoop = [
      'Open-loop gain a(f) follows a dominant-pole low-pass model',
      'After f_3dB,OL, the open-loop slope is −20 dB / decade'
    ];
    const bulletsFeedback = [
      'Feedback sets midband closed-loop gain near 1/β',
      'Lower closed-loop gain gives wider closed-loop bandwidth',
      'At unity gain (0 dB), f_unity is the op-amp GBP'
    ];
    const bulletObjsOpen = [];
    for (let i = 0; i < bulletsOpenLoop.length; i++) {
      const b = new Text({ text: '•  ' + bulletsOpenLoop[i], fontSize: 11, color: MUTED, fontUrl: FONT_URL });
      await b.loadGlyphs?.();
      b.moveTo([-5.4, 2.55 - i * 0.4, 0]);
      bulletObjsOpen.push(b);
    }
    const bulletObjsFb = [];
    for (let i = 0; i < bulletsFeedback.length; i++) {
      const b = new Text({ text: '•  ' + bulletsFeedback[i], fontSize: 11, color: MUTED, fontUrl: FONT_URL });
      await b.loadGlyphs?.();
      b.moveTo([-5.4, 1.65 - i * 0.4, 0]);
      bulletObjsFb.push(b);
    }

    // ── Equation panel (top-right) ──
    const eqnBox = new Rectangle({ width: 4.3, height: 1.25, color: ACCENT, strokeWidth: 2, fillOpacity: 0.08 });
    eqnBox.moveTo([3.65, 2.9, 0]);
    const eqn = new MathTex({ latex: 'A_{CL}(f)=\\dfrac{a(f)}{1+a(f)\\beta}', color: ACCENT });
    await eqn.waitForRender?.();
    eqn.scale(0.5).moveTo([3.65, 3.05, 0]);
    const eqnApprox = new Text({ text: 'If |aβ| >> 1, then A_CL ≈ 1/β', fontSize: 10, color: ACCENT, fontUrl: FONT_URL });
    await eqnApprox.loadGlyphs?.();
    eqnApprox.moveTo([3.65, 2.66, 0]);

    // ── Bode plot (right side) ──
    const x0 = 0.6, x1 = 6.0, y0 = -2.3, y1 = 2.8;
    const xAxis = new Line({ start: [x0, y0, 0], end: [x1, y0, 0], color: MUTED });
    const yAxis = new Line({ start: [x0, y0, 0], end: [x0, y1, 0], color: MUTED });
    const xL = new Text({ text: 'log f (Hz)', fontSize: 11, color: FG, fontUrl: FONT_URL });
    const yL = new Text({ text: 'Gain (dB)', fontSize: 11, color: FG, fontUrl: FONT_URL });
    await Promise.all([xL.loadGlyphs?.(), yL.loadGlyphs?.()]);
    xL.moveTo([x1 + 0.3, y0, 0]);
    yL.moveTo([x0 + 1.5, y1 + 0.25, 0]);

    // dc gain A_o label
    const dcGainLbl = new Text({ text: 'Open-loop dc gain A_OL', fontSize: 10, color: BLUE, fontUrl: FONT_URL });
    await dcGainLbl.loadGlyphs?.();
    dcGainLbl.moveTo([x0 + 0.5, y1 - 0.2, 0]);
    const betaZeroLbl = new Text({ text: 'β = 0 (no feedback) => A_CL = a(f)', fontSize: 9, color: BLUE, fontUrl: FONT_URL });
    await betaZeroLbl.loadGlyphs?.();
    betaZeroLbl.moveTo([x0 + 2.25, y1 - 0.32, 0]);

    // ── Smooth single-pole Bode curves ──
    // Open-loop: |a(f)|_dB = A_OL_dB − 10 log10(1 + (f/f_p)^2)
    // Closed-loop: same single-pole shape with corner at f_CL = f_p · (1 + A_OL β)
    const openFlatEndX = 1.4;                         // x-coord of f_3dB,OL (pole)
    const unityX       = x1 - 0.3;                    // x-coord of f_unity (GBP)
    const dcDB         = 100;                         // open-loop dc gain for axis calibration
    const clDB         = 60;                          // closed-loop midband gain
    const yDC          = y1 - 0.4;                    // y for dcDB
    const y0dB         = y0;                          // y for 0 dB
    const dBtoY        = (dB) => y0dB + (dB / dcDB) * (yDC - y0dB);
    const xPerDec      = (unityX - openFlatEndX) / (dcDB / 20);   // = 5 decades pole→unity
    const openDBfn     = (r) => dcDB - 10 * Math.log10(1 + Math.pow(10, 2 * r));
    const rCL          = (dcDB - clDB) / 20;          // decades from pole to closed-loop corner
    const clDBfn       = (r) => clDB  - 10 * Math.log10(1 + Math.pow(10, 2 * (r - rCL)));
    const fBetaX       = openFlatEndX + rCL * xPerDec;
    const yCL          = dBtoY(clDB);

    const buildCurve = (fn, color) => {
      const segs = [];
      const N    = 80;
      const rMin = (x0 - openFlatEndX) / xPerDec;
      const rMax = (x1 - openFlatEndX) / xPerDec;
      let prev = null;
      for (let i = 0; i <= N; i++) {
        const r  = rMin + (rMax - rMin) * i / N;
        const px = openFlatEndX + r * xPerDec;
        const py = dBtoY(fn(r));
        if (py < y0 + 0.02 || px > x1 - 0.05) { prev = null; continue; }
        if (prev) segs.push(new Line({ start: [prev[0], prev[1], 0], end: [px, py, 0], color, strokeWidth: 2.5 }));
        prev = [px, py];
      }
      return segs;
    };
    const openSegs = buildCurve(openDBfn, BLUE);
    const clSegs   = buildCurve(clDBfn,   ACCENT);

    const openLbl = new Text({ text: 'Open-loop |a(f)|', fontSize: 10, color: BLUE, fontUrl: FONT_URL });
    await openLbl.loadGlyphs?.();
    openLbl.moveTo([x0 + 1.0, y1 - 0.05, 0]);

    // 3 dB indicator at open corner
    const threeDB1 = new Text({ text: '−3 dB from midband', fontSize: 9, color: YELLOW, fontUrl: FONT_URL });
    await threeDB1.loadGlyphs?.();
    threeDB1.moveTo([openFlatEndX + 0.4, y1 - 0.55, 0]);
    const clLbl = new Text({ text: 'Closed-loop |A_CL(f)|', fontSize: 10, color: ACCENT, fontUrl: FONT_URL });
    await clLbl.loadGlyphs?.();
    clLbl.moveTo([x0 + 1.1, yCL + 0.2, 0]);
    const betaLvlLbl = new Text({ text: 'Midband level ≈ 20 log(1/β)', fontSize: 9, color: ACCENT, fontUrl: FONT_URL });
    await betaLvlLbl.loadGlyphs?.();
    betaLvlLbl.moveTo([x0 + 1.95, yCL - 0.2, 0]);

    const threeDB2 = new Text({ text: '−3 dB from closed-loop midband', fontSize: 8.8, color: YELLOW, fontUrl: FONT_URL });
    await threeDB2.loadGlyphs?.();
    threeDB2.moveTo([fBetaX + 0.65, yCL - 0.15, 0]);

    // Slope label
    const slopeLbl = new Text({ text: '−20 dB/decade', fontSize: 10, color: MUTED, fontUrl: FONT_URL });
    await slopeLbl.loadGlyphs?.();
    slopeLbl.moveTo([x1 - 1.4, y0 + 0.8, 0]);

    // Open-loop bandwidth annotation
    const obwLbl = new Text({ text: 'Open-loop bandwidth', fontSize: 9, color: BLUE, fontUrl: FONT_URL });
    await obwLbl.loadGlyphs?.();
    obwLbl.moveTo([openFlatEndX, y0 + 0.25, 0]);

    // Frequency markers
    const marks = [
      { x: openFlatEndX, label: 'f_{3dB,OL}' },
      { x: fBetaX,       label: 'f_{\\beta}\\,(|a\\beta|=1)' },
      { x: x1 - 0.3,     label: 'f_{unity}\\approx GBP' }
    ];
    const markObjs = [];
    for (const m of marks) {
      const arrow = new Arrow({ start: [m.x, y0 - 0.5, 0], end: [m.x, y0 - 0.1, 0], color: ACCENT });
      const lab = new MathTex({ latex: m.label, color: ACCENT });
      await lab.waitForRender?.();
      lab.scale(0.35).moveTo([m.x, y0 - 0.75, 0]);
      markObjs.push({ arrow, lab });
    }

    // ── Numeric example + checks (bottom-left) ──
    const ex1 = new Text({ text: 'Example: GBP = 1 MHz and A_CL = 100', fontSize: 10, color: CYAN, fontUrl: FONT_URL });
    const ex2 = new Text({ text: 'Then BW_CL ≈ GBP / A_CL ≈ 10 kHz', fontSize: 10, color: CYAN, fontUrl: FONT_URL });
    await Promise.all([ex1.loadGlyphs?.(), ex2.loadGlyphs?.()]);
    ex1.moveTo([-3.95, -1.55, 0]);
    ex2.moveTo([-3.95, -1.9, 0]);

    const q1 = new Text({ text: 'Check 1: If gain increases 10x, bandwidth changes by?', fontSize: 9, color: MUTED2, fontUrl: FONT_URL });
    const q2 = new Text({ text: 'Check 2: Point to f_beta where |aβ| = 1.', fontSize: 9, color: MUTED2, fontUrl: FONT_URL });
    const q3 = new Text({ text: 'Check 3: If A_CL = 10 and GBP = 1 MHz, BW ≈ ?', fontSize: 9, color: MUTED2, fontUrl: FONT_URL });
    await Promise.all([q1.loadGlyphs?.(), q2.loadGlyphs?.(), q3.loadGlyphs?.()]);
    q1.moveTo([-3.5, -2.45, 0]);
    q2.moveTo([-3.5, -2.72, 0]);
    q3.moveTo([-3.5, -2.99, 0]);

    // ── Sequence ──
    await scene.play(new Write(title, { duration: 0.6 }));
    await scene.play(new Create(xAxis), new Create(yAxis), new Write(xL), new Write(yL));
    for (const b of bulletObjsOpen) {
      await scene.play(new FadeIn(b, { duration: 0.2 }));
    }
    await scene.play(new FadeIn(dcGainLbl), new FadeIn(betaZeroLbl));
    await scene.play(...openSegs.map(s => new Create(s)), new FadeIn(openLbl), new FadeIn(threeDB1));
    await scene.play(new FadeIn(slopeLbl), new FadeIn(obwLbl));
    await scene.play(new Create(markObjs[0].arrow), new Write(markObjs[0].lab));
    await scene.play(new Create(eqnBox), new Write(eqn), new FadeIn(eqnApprox));
    for (const b of bulletObjsFb) {
      await scene.play(new FadeIn(b, { duration: 0.2 }));
    }
    await scene.play(...clSegs.map(s => new Create(s)), new FadeIn(clLbl), new FadeIn(threeDB2), new FadeIn(betaLvlLbl));
    await scene.play(new Create(markObjs[1].arrow), new Write(markObjs[1].lab));
    await scene.play(new Create(markObjs[2].arrow), new Write(markObjs[2].lab));
    await scene.play(new FadeIn(ex1), new FadeIn(ex2));
    await scene.play(new FadeIn(q1), new FadeIn(q2), new FadeIn(q3));
    await scene.wait(2.4);
  </script>
</body>
</html>
