<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 14 — Input Offset Voltage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
  <style>
    /* ───────── SVG overlay (V_out bar) ───────── */
    #trace-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease-out;
    }
    #trace-overlay .bar-rail {
      fill: none;
      stroke: #6a6a72;
      stroke-width: 1.5;
    }
    [data-theme="dark"] #trace-overlay .bar-rail { stroke: #8892a4; }
    #trace-overlay .tick {
      stroke: #6a6a72;
      stroke-width: 1.4;
    }
    [data-theme="dark"] #trace-overlay .tick { stroke: #8892a4; }
    #trace-overlay .axis-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-style: italic;
      fill: #6a6a72;
      font-size: 18px;
    }
    [data-theme="dark"] #trace-overlay .axis-label { fill: #8892a4; }
    #trace-overlay .tick-label {
      font-family: 'IBM Plex Mono', monospace;
      fill: #6a6a72;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    [data-theme="dark"] #trace-overlay .tick-label { fill: #8892a4; }
    #trace-overlay .vout-bar {
      fill: #3d8b6e;
      transition: fill 0.15s;
    }
    [data-theme="dark"] #trace-overlay .vout-bar { fill: #6aaa8e; }
    #trace-overlay .vout-bar.sat { fill: #c74034; }
    [data-theme="dark"] #trace-overlay .vout-bar.sat { fill: #e06050; }
    #trace-overlay .readout {
      font-family: 'IBM Plex Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 18px;
      fill: #1a1a1e;
    }
    [data-theme="dark"] #trace-overlay .readout { fill: #e2e8f0; }
    #trace-overlay .sat-tag { fill: #c74034; }
    [data-theme="dark"] #trace-overlay .sat-tag { fill: #e06050; }

    /* Phase gating of overlay */
    #stage[data-stage="1"] #trace-overlay { opacity: 0; }
    #stage[data-stage="2"] #trace-overlay,
    #stage[data-stage="3"] #trace-overlay { opacity: 1; }

    /* ───────── Control panel (sliders) ───────── */
    #ctrl-panel {
      position: absolute;
      left: 56%;
      bottom: 12%;
      width: 34%;
      padding: 10px 14px 11px 14px;
      background: rgba(125, 125, 135, 0.09);
      border: 1px solid rgba(125, 125, 135, 0.28);
      border-radius: 7px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      color: inherit;
      opacity: 0;
      transition: opacity 0.5s ease-out;
      box-sizing: border-box;
      z-index: 6;
    }
    #ctrl-panel .slider-row {
      display: grid;
      grid-template-columns: 38px 1fr 64px;
      align-items: center;
      gap: 10px;
      margin: 3px 0;
    }
    #ctrl-panel .lbl {
      font-weight: 600;
      font-size: 12px;
      font-style: italic;
      color: #3d8b6e;
    }
    [data-theme="dark"] #ctrl-panel .lbl,
    [data-theme="dark"] #ctrl-panel .formula-line {
      color: #6aaa8e;
    }
    #ctrl-panel .val {
      text-align: right;
      font-variant-numeric: tabular-nums;
      opacity: 0.85;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }
    #ctrl-panel input[type=range] {
      width: 100%;
      accent-color: #3d8b6e;
      margin: 0;
    }
    [data-theme="dark"] #ctrl-panel input[type=range] { accent-color: #6aaa8e; }
    #ctrl-panel .formula-line {
      margin-top: 6px;
      padding-top: 5px;
      border-top: 1px solid rgba(125, 125, 135, 0.22);
      font-size: 11px;
      font-weight: 500;
      color: #3d8b6e;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-style: italic;
    }

    #stage[data-stage="2"] #ctrl-panel { opacity: 1; pointer-events: auto; }
    #stage[data-stage="3"] #ctrl-panel { opacity: 0.35; pointer-events: none; }

    /* ───────── Phase headline (top-right of stage) ───────── */
    .phase-headline {
      position: absolute;
      top: 16px;
      right: 18px;
      z-index: 5;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--slide-text-dim);
      pointer-events: none;
    }
    .phase-headline .ph-num {
      color: var(--slide-accent);
      font-weight: 600;
      margin-right: 8px;
    }

    /* ───────── Active stepper button ───────── */
    .stepper-btn.active {
      color: var(--slide-accent);
      border-color: var(--slide-accent);
      background: rgba(106, 170, 142, 0.12);
    }
  </style>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">15 / 22</span>
  </header>

  <div id="stage" class="manim-stage" data-stage="1">
    <div class="stage-fallback">Loading manim-web scene…</div>

    <div class="phase-headline" id="phase-headline">
      <span class="ph-num">01</span><span id="phase-title">Cause — transistor mismatch</span>
    </div>

    <svg id="trace-overlay" viewBox="0 0 1280 720" preserveAspectRatio="none">
      <text class="axis-label" x="900" y="416" text-anchor="middle">V<tspan dy="4" font-size="13">out</tspan></text>
      <rect class="bar-rail" x="720" y="438" width="360" height="22" rx="3"/>
      <line class="tick" x1="720"  y1="436" x2="720"  y2="468"/>
      <line class="tick" x1="900"  y1="436" x2="900"  y2="468"/>
      <line class="tick" x1="1080" y1="436" x2="1080" y2="468"/>
      <text class="tick-label" x="720"  y="488" text-anchor="middle">−12 V</text>
      <text class="tick-label" x="900"  y="488" text-anchor="middle">0</text>
      <text class="tick-label" x="1080" y="488" text-anchor="middle">+12 V</text>
      <rect id="vout-bar" class="vout-bar" x="900" y="440" width="0" height="18" rx="2"/>
      <text class="readout" id="vout-readout" x="900" y="526" text-anchor="middle">V<tspan dy="3" font-size="13">out</tspan><tspan dy="-3"> = +0.0 mV</tspan></text>
    </svg>

    <div id="ctrl-panel">
      <div class="slider-row">
        <span class="lbl">V<sub>os</sub></span>
        <input type="range" id="vos-slider" min="-5" max="5" step="0.1" value="2">
        <span class="val" id="vos-val">+2.0 mV</span>
      </div>
      <div class="slider-row">
        <span class="lbl">Gain</span>
        <input type="range" id="gain-slider" min="1" max="101" step="1" value="11">
        <span class="val" id="gain-val">11×</span>
      </div>
      <div class="formula-line">V<sub>out</sub> = V<sub>os</sub> · (1 + R₂ / R₁)</div>
    </div>

    <div class="stepper-row">
      <button class="stepper-btn active" data-phase="1">1 · Cause</button>
      <button class="stepper-btn" data-phase="2">2 · Model</button>
      <button class="stepper-btn" data-phase="3">3 · Trim</button>
    </div>
  </div>

  <script type="module">
    import {
      Scene, Polygon, Rectangle, Line, Circle, Dot, Text, MathTex,
      Create, Write, FadeIn, FadeOut, Rotate
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ─────────────────────────────────────────────────────────────────
    // Title (persistent across all phases)
    // ─────────────────────────────────────────────────────────────────
    const title = new Text({ text: 'DC Imperfection: Input Offset Voltage', fontSize: 34, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    // =================================================================
    // PHASE 1 — Cause: BJT diff pair zoom-in + faded op-amp outline
    // =================================================================
    const p1Frame = new Rectangle({ width: 3.8, height: 3.3, color: MUTED2, strokeWidth: 1, fillOpacity: 0 });
    p1Frame.moveTo([-3.85, 0.25, 0]);

    const p1FrameLbl = new Text({ text: 'input differential pair', fontSize: 10, color: MUTED, fontUrl: FONT_URL });
    await p1FrameLbl.loadGlyphs?.();
    p1FrameLbl.moveTo([-3.85, 1.75, 0]);

    // Shared V_CC rail at the top of the zoom frame
    const p1Rail = new Line({ start: [-5.3, 1.35, 0], end: [-2.4, 1.35, 0], color: MUTED, strokeWidth: 1.4 });
    const p1RailLbl = new MathTex({ latex: 'V_{CC}', color: MUTED });
    await p1RailLbl.waitForRender?.();
    p1RailLbl.scale(0.42).moveTo([-2.15, 1.35, 0]);

    // ─── Q1 (left, non-inverting side) ───
    const Q1X = -4.9, Q1Y = 0.55;
    const q1Base  = new Line({ start: [Q1X - 0.55, Q1Y, 0],        end: [Q1X - 0.1, Q1Y, 0],            color: ACCENT, strokeWidth: 1.8 });
    const q1Strap = new Line({ start: [Q1X - 0.1,  Q1Y - 0.28, 0], end: [Q1X - 0.1,  Q1Y + 0.28, 0],    color: ACCENT, strokeWidth: 2.2 });
    const q1Coll  = new Line({ start: [Q1X - 0.1,  Q1Y + 0.18, 0], end: [Q1X + 0.22, Q1Y + 0.7, 0],     color: ACCENT, strokeWidth: 1.8 });
    const q1Emit  = new Line({ start: [Q1X - 0.1,  Q1Y - 0.18, 0], end: [Q1X + 0.22, Q1Y - 0.7, 0],     color: ACCENT, strokeWidth: 1.8 });
    const q1CollUp = new Line({ start: [Q1X + 0.22, Q1Y + 0.7, 0], end: [Q1X + 0.22, 1.35, 0],          color: ACCENT, strokeWidth: 1.6 });
    const q1Lbl = new MathTex({ latex: 'Q_{1}', color: MUTED });
    await q1Lbl.waitForRender?.();
    q1Lbl.scale(0.45).moveTo([Q1X + 0.5, Q1Y + 0.22, 0]);
    const q1InLead = new Line({ start: [Q1X - 0.9, Q1Y, 0], end: [Q1X - 0.55, Q1Y, 0], color: ACCENT, strokeWidth: 1.8 });
    const q1InLbl = new MathTex({ latex: 'v_{+}', color: ACCENT });
    await q1InLbl.waitForRender?.();
    q1InLbl.scale(0.5).moveTo([Q1X - 1.12, Q1Y, 0]);

    // ─── Q2 (right, inverting side — mirrored) ───
    const Q2X = -2.8, Q2Y = 0.55;
    const q2Base  = new Line({ start: [Q2X + 0.55, Q2Y, 0],        end: [Q2X + 0.1, Q2Y, 0],            color: RED, strokeWidth: 1.8 });
    const q2Strap = new Line({ start: [Q2X + 0.1,  Q2Y - 0.28, 0], end: [Q2X + 0.1,  Q2Y + 0.28, 0],    color: RED, strokeWidth: 2.2 });
    const q2Coll  = new Line({ start: [Q2X + 0.1,  Q2Y + 0.18, 0], end: [Q2X - 0.22, Q2Y + 0.7, 0],     color: RED, strokeWidth: 1.8 });
    const q2Emit  = new Line({ start: [Q2X + 0.1,  Q2Y - 0.18, 0], end: [Q2X - 0.22, Q2Y - 0.7, 0],     color: RED, strokeWidth: 1.8 });
    const q2CollUp = new Line({ start: [Q2X - 0.22, Q2Y + 0.7, 0], end: [Q2X - 0.22, 1.35, 0],          color: RED, strokeWidth: 1.6 });
    const q2Lbl = new MathTex({ latex: 'Q_{2}', color: MUTED });
    await q2Lbl.waitForRender?.();
    q2Lbl.scale(0.45).moveTo([Q2X - 0.5, Q2Y + 0.22, 0]);
    const q2InLead = new Line({ start: [Q2X + 0.9, Q2Y, 0], end: [Q2X + 0.55, Q2Y, 0], color: RED, strokeWidth: 1.8 });
    const q2InLbl = new MathTex({ latex: 'v_{-}', color: RED });
    await q2InLbl.waitForRender?.();
    q2InLbl.scale(0.5).moveTo([Q2X + 1.12, Q2Y, 0]);

    // ─── Joined emitters + tail current source ───
    const emitJoin = new Line({ start: [Q1X + 0.22, Q1Y - 0.7, 0], end: [Q2X - 0.22, Q2Y - 0.7, 0], color: MUTED, strokeWidth: 1.8 });
    const tailWire = new Line({ start: [-3.85, Q1Y - 0.7, 0], end: [-3.85, -0.45, 0], color: MUTED, strokeWidth: 1.8 });
    const tailSrc = new Circle({ radius: 0.18, color: YELLOW, strokeWidth: 1.8, fillOpacity: 0.08 });
    tailSrc.moveTo([-3.85, -0.63, 0]);
    const tailArrowMain = new Line({ start: [-3.85, -0.78, 0], end: [-3.85, -0.48, 0], color: YELLOW, strokeWidth: 1.8 });
    const tailArrowL    = new Line({ start: [-3.85, -0.48, 0], end: [-3.93, -0.57, 0], color: YELLOW, strokeWidth: 1.8 });
    const tailArrowR    = new Line({ start: [-3.85, -0.48, 0], end: [-3.77, -0.57, 0], color: YELLOW, strokeWidth: 1.8 });
    const tailLbl = new MathTex({ latex: 'I_{EE}', color: YELLOW });
    await tailLbl.waitForRender?.();
    tailLbl.scale(0.42).moveTo([-3.38, -0.63, 0]);
    const tailGndWire = new Line({ start: [-3.85, -0.81, 0], end: [-3.85, -1.05, 0], color: MUTED, strokeWidth: 1.8 });
    const p1GndA = new Line({ start: [-4.05, -1.05, 0], end: [-3.65, -1.05, 0], color: MUTED, strokeWidth: 2.6 });
    const p1GndB = new Line({ start: [-3.99, -1.17, 0], end: [-3.71, -1.17, 0], color: MUTED, strokeWidth: 1.8 });
    const p1GndC = new Line({ start: [-3.93, -1.27, 0], end: [-3.77, -1.27, 0], color: MUTED, strokeWidth: 1.2 });

    // Mismatch indicator (red halo on Q2)
    const mismatch = new Circle({ radius: 0.24, color: RED, strokeWidth: 2, fillOpacity: 0.22 });
    mismatch.moveTo([Q2X, Q2Y, 0]);

    // Caption + typical values
    const p1Caption = new Text({
      text: 'Manufacturing tolerances → V_BE(Q1) ≠ V_BE(Q2) by a few mV.',
      fontSize: 13, color: MUTED, fontUrl: FONT_URL
    });
    await p1Caption.loadGlyphs?.();
    p1Caption.moveTo([-2.3, -2.15, 0]);

    const p1Caption2 = new Text({
      text: 'Equal input voltages no longer produce equal collector currents.',
      fontSize: 13, color: MUTED, fontUrl: FONT_URL
    });
    await p1Caption2.loadGlyphs?.();
    p1Caption2.moveTo([-2.3, -2.5, 0]);

    const p1TypVals = new MathTex({
      latex: '\\text{LM741: } V_{os} \\approx 1\\,\\text{mV (typ)},\\; 6\\,\\text{mV (max)}',
      color: YELLOW
    });
    await p1TypVals.waitForRender?.();
    p1TypVals.scale(0.55).moveTo([-2.3, -3.0, 0]);

    // Faded op-amp outline (right side) — scale anchor
    const FADED_CX = 3.4, FADED_CY = 0.25;
    const fadedTri = new Polygon({
      vertices: [[FADED_CX - 1.0, FADED_CY - 1.55, 0], [FADED_CX - 1.0, FADED_CY + 1.55, 0], [FADED_CX + 1.1, FADED_CY, 0]],
      color: MUTED2, strokeWidth: 1.4, fillOpacity: 0.04
    });
    const fadedPlus  = new Text({ text: '+', fontSize: 18, color: MUTED, fontUrl: FONT_URL });
    const fadedMinus = new Text({ text: '−', fontSize: 18, color: MUTED, fontUrl: FONT_URL });
    await Promise.all([fadedPlus.loadGlyphs?.(), fadedMinus.loadGlyphs?.()]);
    fadedPlus.moveTo([FADED_CX - 0.7, FADED_CY + 0.6, 0]);
    fadedMinus.moveTo([FADED_CX - 0.7, FADED_CY - 0.6, 0]);
    const fadedLbl = new Text({ text: 'the op-amp', fontSize: 11, color: MUTED2, fontUrl: FONT_URL });
    await fadedLbl.loadGlyphs?.();
    fadedLbl.moveTo([FADED_CX, FADED_CY + 1.9, 0]);

    // Connector: zoom frame → faded op-amp
    const p1Conn1 = new Line({ start: [-1.95, 0.25, 0], end: [0.6, 0.25, 0], color: MUTED2, strokeWidth: 1 });
    const p1Conn2 = new Line({ start: [0.6, 0.25, 0], end: [FADED_CX - 1.0, FADED_CY, 0], color: MUTED2, strokeWidth: 1 });
    const livesInsideLbl = new Text({ text: 'lives inside →', fontSize: 11, color: MUTED2, fontUrl: FONT_URL });
    await livesInsideLbl.loadGlyphs?.();
    livesInsideLbl.moveTo([-0.55, 0.6, 0]);

    const phase1Objs = [
      p1Frame, p1FrameLbl, p1Rail, p1RailLbl,
      q1InLead, q1InLbl, q1Base, q1Strap, q1Coll, q1Emit, q1CollUp, q1Lbl,
      q2InLead, q2InLbl, q2Base, q2Strap, q2Coll, q2Emit, q2CollUp, q2Lbl,
      emitJoin, tailWire, tailSrc, tailArrowMain, tailArrowL, tailArrowR, tailLbl,
      tailGndWire, p1GndA, p1GndB, p1GndC,
      mismatch,
      p1Caption, p1Caption2, p1TypVals,
      fadedTri, fadedPlus, fadedMinus, fadedLbl,
      p1Conn1, p1Conn2, livesInsideLbl
    ];

    // =================================================================
    // PHASE 2 — Model: op-amp + V_os source + R1/R2 feedback
    // =================================================================
    // Layout constants cloned from slide 06 (06_noninv.html lines 206–218)
    const CX = -3.3, CY = 1.5;
    const TRI_HALF_H = 0.9;
    const TRI_IN_X   = CX - 0.9;     // -4.2
    const TRI_APEX_X = CX + 0.8;     // -2.5
    const LEFT_COL_X = -4.6;
    const TAP_X      = -1.4;
    const OUT_X      = -0.2;
    const plusY      = 1.85;
    const minusY     = 1.15;
    const JUNC_Y     = 0.0;
    const GND_Y      = -1.4;

    // Op-amp triangle (matches slide 06)
    const p2Tri = new Polygon({
      vertices: [
        [TRI_IN_X,   CY - TRI_HALF_H, 0],
        [TRI_IN_X,   CY + TRI_HALF_H, 0],
        [TRI_APEX_X, CY,              0]
      ],
      color: ACCENT, strokeWidth: 1.8, fillOpacity: 0.1
    });
    const p2Plus  = new Text({ text: '+', fontSize: 18, color: ACCENT, fontUrl: FONT_URL });
    const p2Minus = new Text({ text: '−', fontSize: 18, color: RED,    fontUrl: FONT_URL });
    await Promise.all([p2Plus.loadGlyphs?.(), p2Minus.loadGlyphs?.()]);
    p2Plus.moveTo([TRI_IN_X + 0.3, plusY,  0]);
    p2Minus.moveTo([TRI_IN_X + 0.3, minusY, 0]);

    // Ground (at +input, left of V_os battery)
    const p2GndStub = new Line({ start: [-5.75, plusY, 0], end: [-5.75, plusY - 0.35, 0], color: FG, strokeWidth: 1.8 });
    const p2Gnd1 = new Line({ start: [-5.95, plusY - 0.35, 0], end: [-5.55, plusY - 0.35, 0], color: FG, strokeWidth: 2.8 });
    const p2Gnd2 = new Line({ start: [-5.89, plusY - 0.47, 0], end: [-5.61, plusY - 0.47, 0], color: FG, strokeWidth: 2 });
    const p2Gnd3 = new Line({ start: [-5.83, plusY - 0.57, 0], end: [-5.67, plusY - 0.57, 0], color: FG, strokeWidth: 1.2 });

    // V_os battery — two parallel vertical bars (− left, + right, so output at + input is +V_os)
    const p2WireGndToBat = new Line({ start: [-5.75, plusY, 0], end: [-5.22, plusY, 0], color: FG, strokeWidth: 1.8 });
    const p2VosShort     = new Line({ start: [-5.22, plusY - 0.14, 0], end: [-5.22, plusY + 0.14, 0], color: RED, strokeWidth: 2.2 });
    const p2VosLong      = new Line({ start: [-5.02, plusY - 0.28, 0], end: [-5.02, plusY + 0.28, 0], color: RED, strokeWidth: 2.6 });
    const p2VosMinusSign = new MathTex({ latex: '-', color: RED });
    const p2VosPlusSign  = new MathTex({ latex: '+', color: RED });
    await p2VosMinusSign.waitForRender?.();
    await p2VosPlusSign.waitForRender?.();
    p2VosMinusSign.scale(0.5).moveTo([-5.32, plusY + 0.42, 0]);
    p2VosPlusSign.scale(0.5).moveTo([-4.92, plusY + 0.42, 0]);
    const p2VosLbl = new MathTex({ latex: 'V_{os}', color: RED });
    await p2VosLbl.waitForRender?.();
    p2VosLbl.scale(0.6).moveTo([-5.12, plusY + 0.78, 0]);
    const p2WireBatToPlus = new Line({ start: [-5.02, plusY, 0], end: [TRI_IN_X, plusY, 0], color: FG, strokeWidth: 1.8 });

    // Output wire
    const p2OutWire = new Line({ start: [TRI_APEX_X, CY, 0], end: [OUT_X, CY, 0], color: FG, strokeWidth: 1.8 });
    const p2VoutLbl = new MathTex({ latex: 'V_{out}', color: YELLOW });
    await p2VoutLbl.waitForRender?.();
    p2VoutLbl.scale(0.65).moveTo([OUT_X + 0.5, CY, 0]);

    // R2 feedback resistor (cloned from slide 06 lines 255–262)
    const R2_W = 1.0, R2_H = 0.34;
    const R2_CX = (TAP_X + LEFT_COL_X) / 2;
    const p2R2 = new Rectangle({ width: R2_W, height: R2_H, color: ACCENT, strokeWidth: 2, fillOpacity: 0.22 });
    p2R2.moveTo([R2_CX, JUNC_Y, 0]);
    const p2R2Lbl = new MathTex({ latex: 'R_{2}', color: ACCENT });
    await p2R2Lbl.waitForRender?.();
    p2R2Lbl.scale(0.58).moveTo([R2_CX, JUNC_Y + R2_H / 2 + 0.2, 0]);

    // Feedback wiring
    const p2fb1    = new Line({ start: [TAP_X, CY, 0],                  end: [TAP_X, JUNC_Y, 0],                color: FG, strokeWidth: 1.8 });
    const p2fb2R   = new Line({ start: [TAP_X, JUNC_Y, 0],              end: [R2_CX + R2_W / 2, JUNC_Y, 0],     color: FG, strokeWidth: 1.8 });
    const p2fb2L   = new Line({ start: [R2_CX - R2_W / 2, JUNC_Y, 0],   end: [LEFT_COL_X, JUNC_Y, 0],           color: FG, strokeWidth: 1.8 });
    const p2fb3    = new Line({ start: [LEFT_COL_X, JUNC_Y, 0],         end: [LEFT_COL_X, minusY, 0],           color: FG, strokeWidth: 1.8 });
    const p2fbStub = new Line({ start: [LEFT_COL_X, minusY, 0],         end: [TRI_IN_X, minusY, 0],             color: FG, strokeWidth: 1.8 });
    const p2TapDot = new Dot({ point: [TAP_X, CY, 0], color: FG, radius: 0.06 });

    // R1 column
    const R1_CY = (JUNC_Y + GND_Y) / 2;
    const p2r1Top = new Line({ start: [LEFT_COL_X, JUNC_Y,       0], end: [LEFT_COL_X, R1_CY + 0.45, 0], color: FG, strokeWidth: 1.8 });
    const p2r1Bot = new Line({ start: [LEFT_COL_X, R1_CY - 0.45, 0], end: [LEFT_COL_X, GND_Y,        0], color: FG, strokeWidth: 1.8 });
    const p2R1 = new Rectangle({ width: 0.34, height: 0.9, color: ACCENT, strokeWidth: 2, fillOpacity: 0.22 });
    p2R1.moveTo([LEFT_COL_X, R1_CY, 0]);
    const p2R1Lbl = new MathTex({ latex: 'R_{1}', color: ACCENT });
    await p2R1Lbl.waitForRender?.();
    p2R1Lbl.scale(0.58).moveTo([LEFT_COL_X - 0.35, R1_CY, 0]);
    const p2JuncDot = new Dot({ point: [LEFT_COL_X, JUNC_Y, 0], color: FG, radius: 0.06 });

    // R1 ground (cloned from slide 06 lines 284–286)
    const p2R1Gnd1 = new Line({ start: [LEFT_COL_X - 0.35, GND_Y,        0], end: [LEFT_COL_X + 0.35, GND_Y,        0], color: FG, strokeWidth: 2.8 });
    const p2R1Gnd2 = new Line({ start: [LEFT_COL_X - 0.22, GND_Y - 0.15, 0], end: [LEFT_COL_X + 0.22, GND_Y - 0.15, 0], color: FG, strokeWidth: 2 });
    const p2R1Gnd3 = new Line({ start: [LEFT_COL_X - 0.10, GND_Y - 0.28, 0], end: [LEFT_COL_X + 0.10, GND_Y - 0.28, 0], color: FG, strokeWidth: 1.2 });

    // Equation (below the schematic)
    const p2Eqn = new MathTex({ latex: 'V_{out} = V_{os}\\,(1 + R_{2}/R_{1})', color: RED });
    await p2Eqn.waitForRender?.();
    p2Eqn.scale(0.72).moveTo([-3.0, -2.35, 0]);

    // Insight caption pointing at the equation
    const p2Insight = new Text({
      text: 'Tiny input offset × closed-loop gain → large DC error at the output',
      fontSize: 12, color: MUTED, fontUrl: FONT_URL
    });
    await p2Insight.loadGlyphs?.();
    p2Insight.moveTo([-3.0, -3.0, 0]);

    const phase2Objs = [
      p2Tri, p2Plus, p2Minus,
      p2GndStub, p2Gnd1, p2Gnd2, p2Gnd3,
      p2WireGndToBat, p2VosShort, p2VosLong, p2VosMinusSign, p2VosPlusSign, p2VosLbl, p2WireBatToPlus,
      p2OutWire, p2VoutLbl,
      p2fb1, p2fb2R, p2fb2L, p2fb3, p2fbStub, p2TapDot,
      p2r1Top, p2r1Bot, p2R1, p2R1Lbl, p2JuncDot,
      p2R1Gnd1, p2R1Gnd2, p2R1Gnd3,
      p2R2, p2R2Lbl,
      p2Eqn, p2Insight
    ];

    // =================================================================
    // PHASE 3 — Trim: LM741 DIP + 10 k potentiometer on pins 1 & 5
    // =================================================================
    // Compact DIP (cloned from slide 04 lines 166–212), positioned right-of-center
    const SMALL_CX = 3.6, SMALL_CY = 0.6;
    const SMALL_W = 1.6, SMALL_H = 2.6;

    const dipBody = new Rectangle({ width: SMALL_W, height: SMALL_H, color: MUTED, strokeWidth: 1.5, fillOpacity: 0.06 });
    dipBody.moveTo([SMALL_CX, SMALL_CY, 0]);

    const smallL = SMALL_CX - SMALL_W / 2;  // 2.8
    const smallR = SMALL_CX + SMALL_W / 2;  // 4.4
    const pinOffsets = [0.95, 0.32, -0.28, -0.92];  // top → bottom
    const dipPinSpec = [
      { n: 1, xy: [smallL, SMALL_CY + pinOffsets[0], 0], color: CYAN   },
      { n: 2, xy: [smallL, SMALL_CY + pinOffsets[1], 0], color: RED    },
      { n: 3, xy: [smallL, SMALL_CY + pinOffsets[2], 0], color: ACCENT },
      { n: 4, xy: [smallL, SMALL_CY + pinOffsets[3], 0], color: MAG    },
      { n: 5, xy: [smallR, SMALL_CY + pinOffsets[3], 0], color: CYAN   },
      { n: 6, xy: [smallR, SMALL_CY + pinOffsets[2], 0], color: BLUE   },
      { n: 7, xy: [smallR, SMALL_CY + pinOffsets[1], 0], color: YELLOW },
      { n: 8, xy: [smallR, SMALL_CY + pinOffsets[0], 0], color: MUTED  }
    ];

    const dipLeads = [];
    const dipDots = [];
    const dipNums = [];
    for (const p of dipPinSpec) {
      const side = p.xy[0] < SMALL_CX ? -1 : 1;
      dipLeads.push(new Line({
        start: [p.xy[0], p.xy[1], 0],
        end:   [p.xy[0] + 0.22 * side, p.xy[1], 0],
        color: MUTED, strokeWidth: 1.4
      }));
      const dot = new Circle({ radius: 0.085, color: p.color, strokeWidth: 1.6, fillOpacity: 1 });
      dot.moveTo(p.xy);
      dipDots.push(dot);
      const num = new MathTex({ latex: String(p.n), color: FG });
      await num.waitForRender?.();
      num.scale(0.44).moveTo([p.xy[0] + (side < 0 ? 0.22 : -0.22), p.xy[1], 0]);
      dipNums.push(num);
    }

    // Dot notch indicator — small circle inside the DIP top area (replaces the
    // arc-based notch from slide 4 to keep the import surface small)
    const dipDotMark = new Circle({ radius: 0.06, color: MUTED, strokeWidth: 1.4, fillOpacity: 1 });
    dipDotMark.moveTo([SMALL_CX - 0.55, SMALL_CY + SMALL_H / 2 - 0.2, 0]);

    // Cyan halos on pins 1 and 5 (matches slide 04 lines 342–345)
    const halo1 = new Circle({ radius: 0.17, color: CYAN, strokeWidth: 2, fillOpacity: 0 });
    halo1.moveTo(dipPinSpec[0].xy);
    const halo5 = new Circle({ radius: 0.17, color: CYAN, strokeWidth: 2, fillOpacity: 0 });
    halo5.moveTo(dipPinSpec[4].xy);

    // 10 kΩ potentiometer — circle + rotating wiper arrow, below the DIP
    const POT_CX = 3.6, POT_CY = -1.75;
    const potBody = new Circle({ radius: 0.38, color: YELLOW, strokeWidth: 2, fillOpacity: 0.08 });
    potBody.moveTo([POT_CX, POT_CY, 0]);
    const potArrow = new Line({
      start: [POT_CX, POT_CY, 0],
      end:   [POT_CX - 0.3, POT_CY + 0.22, 0],
      color: YELLOW, strokeWidth: 2.4
    });
    const potLbl = new MathTex({ latex: '10\\,\\text{k}\\Omega', color: YELLOW });
    await potLbl.waitForRender?.();
    potLbl.scale(0.48).moveTo([POT_CX - 1.0, POT_CY, 0]);

    // Wires from pin 1 (top-left) and pin 5 (bottom-right) external leads to the pot
    const pin1x = smallL - 0.22, pin1y = SMALL_CY + pinOffsets[0];
    const pin5x = smallR + 0.22, pin5y = SMALL_CY + pinOffsets[3];
    const pot1w1 = new Line({ start: [pin1x, pin1y, 0], end: [pin1x, POT_CY + 0.38, 0], color: YELLOW, strokeWidth: 1.5 });
    const pot1w2 = new Line({ start: [pin1x, POT_CY + 0.38, 0], end: [POT_CX - 0.38, POT_CY + 0.38, 0], color: YELLOW, strokeWidth: 1.5 });
    const pot1w3 = new Line({ start: [POT_CX - 0.38, POT_CY + 0.38, 0], end: [POT_CX - 0.38, POT_CY, 0], color: YELLOW, strokeWidth: 1.5 });
    const pot5w1 = new Line({ start: [pin5x, pin5y, 0], end: [pin5x, POT_CY + 0.38, 0], color: YELLOW, strokeWidth: 1.5 });
    const pot5w2 = new Line({ start: [pin5x, POT_CY + 0.38, 0], end: [POT_CX + 0.38, POT_CY + 0.38, 0], color: YELLOW, strokeWidth: 1.5 });
    const pot5w3 = new Line({ start: [POT_CX + 0.38, POT_CY + 0.38, 0], end: [POT_CX + 0.38, POT_CY, 0], color: YELLOW, strokeWidth: 1.5 });

    // Wiper tail → V− rail
    const potWiperWire = new Line({ start: [POT_CX, POT_CY - 0.38, 0], end: [POT_CX, POT_CY - 0.72, 0], color: MAG, strokeWidth: 1.8 });
    const vMinusRail = new Line({ start: [POT_CX - 0.3, POT_CY - 0.72, 0], end: [POT_CX + 0.3, POT_CY - 0.72, 0], color: MAG, strokeWidth: 2.4 });
    const vMinusLbl = new MathTex({ latex: 'V^{-}', color: MAG });
    await vMinusLbl.waitForRender?.();
    vMinusLbl.scale(0.5).moveTo([POT_CX + 0.58, POT_CY - 0.72, 0]);

    // Trim caption (cross-reference to slide 4)
    const trimCap1 = new Text({ text: 'Offset-null pins 1 & 5 trim V_os → 0', fontSize: 13, color: MUTED, fontUrl: FONT_URL });
    await trimCap1.loadGlyphs?.();
    trimCap1.moveTo([POT_CX, -2.78, 0]);
    const trimCap2 = new Text({ text: '(see slide 4 for the transfer-curve view)', fontSize: 11, color: CYAN, fontUrl: FONT_URL });
    await trimCap2.loadGlyphs?.();
    trimCap2.moveTo([POT_CX, -3.12, 0]);

    // Left-side: dimmed note telling students phase 2 schematic still applies
    const p3NoteLbl = new Text({ text: 'The Vos source is trimmed externally:', fontSize: 12, color: MUTED2, fontUrl: FONT_URL });
    await p3NoteLbl.loadGlyphs?.();
    p3NoteLbl.moveTo([-3.3, -2.78, 0]);

    const phase3Objs = [
      dipBody, dipDotMark,
      ...dipLeads, ...dipDots, ...dipNums,
      halo1, halo5,
      pot1w1, pot1w2, pot1w3, pot5w1, pot5w2, pot5w3,
      potBody, potArrow, potLbl,
      potWiperWire, vMinusRail, vMinusLbl,
      trimCap1, trimCap2, p3NoteLbl
    ];

    // =================================================================
    // Orchestration
    // =================================================================
    const headlines = {
      1: ['01', 'Cause — transistor mismatch'],
      2: ['02', 'Model — Vos as a series input source'],
      3: ['03', 'Trim — LM741 offset-null pins 1 & 5']
    };
    const phMap = { 1: phase1Objs, 2: phase2Objs, 3: phase3Objs };
    let currentPhase = 1;
    let switching = false;

    const vosSlider = document.getElementById('vos-slider');
    const gainSlider = document.getElementById('gain-slider');
    const vosVal = document.getElementById('vos-val');
    const gainVal = document.getElementById('gain-val');
    const voutReadout = document.getElementById('vout-readout');
    const voutBar = document.getElementById('vout-bar');
    const phNum = document.querySelector('#phase-headline .ph-num');
    const phTitle = document.getElementById('phase-title');

    const BAR_CENTER = 900;
    const BAR_HALF = 180;
    const V_SAT_MV = 12000;

    function updateBar() {
      const vos = parseFloat(vosSlider.value);
      const gain = parseFloat(gainSlider.value);
      const voutMv = vos * gain;
      const clamped = Math.max(-V_SAT_MV, Math.min(V_SAT_MV, voutMv));
      const sat = Math.abs(voutMv) >= V_SAT_MV;
      const w = Math.abs(clamped) / V_SAT_MV * BAR_HALF;
      if (clamped >= 0) {
        voutBar.setAttribute('x', BAR_CENTER);
        voutBar.setAttribute('width', w.toFixed(2));
      } else {
        voutBar.setAttribute('x', (BAR_CENTER - w).toFixed(2));
        voutBar.setAttribute('width', w.toFixed(2));
      }
      voutBar.classList.toggle('sat', sat);

      const vosSign = vos >= 0 ? '+' : '−';
      vosVal.textContent = vosSign + Math.abs(vos).toFixed(1) + ' mV';
      gainVal.textContent = gain.toFixed(0) + '×';

      let disp;
      if (Math.abs(voutMv) >= 1000) disp = (Math.abs(voutMv) / 1000).toFixed(2) + ' V';
      else disp = Math.abs(voutMv).toFixed(1) + ' mV';
      const voutSign = voutMv >= 0 ? '+' : '−';
      const satMarkup = sat ? '<tspan class="sat-tag">  (sat)</tspan>' : '';
      voutReadout.innerHTML =
        'V<tspan dy="3" font-size="13">out</tspan>' +
        '<tspan dy="-3"> = ' + voutSign + disp + '</tspan>' +
        satMarkup;
    }
    vosSlider.addEventListener('input', updateBar);
    gainSlider.addEventListener('input', updateBar);
    updateBar();

    function setActiveUI(n) {
      document.querySelectorAll('.stepper-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.phase === String(n));
      });
      phNum.textContent = headlines[n][0];
      phTitle.textContent = headlines[n][1];
      stage.setAttribute('data-stage', String(n));
    }

    function tweenBarToZero(durationMs) {
      const startTime = performance.now();
      const startVos = parseFloat(vosSlider.value);
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const eased = 1 - Math.pow(1 - t, 3);
        vosSlider.value = (startVos * (1 - eased)).toFixed(2);
        updateBar();
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    async function switchPhase(n) {
      if (switching || n === currentPhase) return;
      switching = true;
      const oldObjs = phMap[currentPhase];
      const newObjs = phMap[n];
      setActiveUI(n);

      const anims = [];
      for (const o of oldObjs) anims.push(new FadeOut(o, { duration: 0.45 }));
      for (const o of newObjs) anims.push(new FadeIn(o,  { duration: 0.45 }));
      await scene.play(...anims);
      currentPhase = n;

      if (n === 3) {
        tweenBarToZero(1100);
        await scene.play(new Rotate(potArrow, { angle: -Math.PI / 2, duration: 1.0, aboutPoint: [POT_CX, POT_CY, 0] }));
      }
      switching = false;
    }

    document.querySelectorAll('.stepper-btn').forEach(btn => {
      btn.addEventListener('click', () => switchPhase(parseInt(btn.dataset.phase, 10)));
    });

    // =================================================================
    // Initial reveal — phase 1
    // =================================================================
    await scene.play(new Write(title, { duration: 0.6 }));

    await scene.play(
      new Create(p1Frame, { duration: 0.5 }),
      new FadeIn(p1FrameLbl),
      new Create(p1Rail),
      new Write(p1RailLbl),
      new FadeIn(fadedTri),
      new FadeIn(fadedPlus),
      new FadeIn(fadedMinus),
      new FadeIn(fadedLbl)
    );

    await scene.play(
      new Create(q1InLead), new Write(q1InLbl),
      new Create(q1Base), new Create(q1Strap), new Create(q1Coll), new Create(q1Emit), new Create(q1CollUp),
      new Write(q1Lbl),
      new Create(q2InLead), new Write(q2InLbl),
      new Create(q2Base), new Create(q2Strap), new Create(q2Coll), new Create(q2Emit), new Create(q2CollUp),
      new Write(q2Lbl),
      new Create(emitJoin), new Create(tailWire),
      new Create(tailSrc),
      new Create(tailArrowMain), new Create(tailArrowL), new Create(tailArrowR),
      new Write(tailLbl),
      new Create(tailGndWire), new Create(p1GndA), new Create(p1GndB), new Create(p1GndC)
    );

    await scene.play(
      new Create(p1Conn1), new Create(p1Conn2), new FadeIn(livesInsideLbl)
    );

    await scene.play(
      new FadeIn(p1Caption), new FadeIn(p1Caption2), new Write(p1TypVals)
    );

    // Mismatch pulse — fade in, out, in, out, and leave visible
    await scene.play(new FadeIn(mismatch, { duration: 0.35 }));
    await scene.play(new FadeOut(mismatch, { duration: 0.35 }));
    await scene.play(new FadeIn(mismatch, { duration: 0.35 }));
    await scene.play(new FadeOut(mismatch, { duration: 0.35 }));
    await scene.play(new FadeIn(mismatch, { duration: 0.4 }));
  </script>
</body>
</html>
