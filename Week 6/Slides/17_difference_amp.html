<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 16: Difference Amplifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { }
      var pick = (qt === 'dark' || qt === 'light') ? qt
        : (ss === 'dark' || ss === 'light') ? ss
          : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
  <style>
    /* ── Section 2 RHS panel container ── */
    .ecg-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: calc(100% - 50px);
      z-index: 4;
      display: none;
      flex-direction: column;
    }

    .ecg-panel.visible {
      display: flex;
    }

    /* ── ECG canvas (top ~60%) ── */
    #ecgCanvas {
      width: 100%;
      flex: 3;
      display: block;
    }

    /* ── FFT canvas (bottom ~40%) ── */
    #fftCanvas {
      width: 100%;
      flex: 2;
      display: block;
      border-top: 1px solid var(--slide-border);
    }

    /* ── Tolerance toolbar ── */
    .ecg-toolbar {
      width: 100%;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--slide-surface);
      border-top: 1px solid var(--slide-border);
      flex-shrink: 0;
    }

    .ecg-toolbar-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--slide-text-dim);
      margin-right: 4px;
    }

    .ecg-toolbar .quiz-btn {
      min-width: 56px;
      text-align: center;
    }

    /* ── Slider controls row ── */
    .ecg-sliders {
      width: 100%;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 6px 16px;
      background: var(--slide-surface);
      border-top: 1px solid var(--slide-border);
      flex-shrink: 0;
    }

    .ecg-slider-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ecg-slider-group label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--slide-text-dim);
      white-space: nowrap;
    }

    .ecg-slider-group input[type="range"] {
      width: 90px;
      accent-color: var(--slide-accent);
    }

    .ecg-slider-group .slider-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--slide-text);
      min-width: 42px;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>

<body class="slide">
  <header class="slide-header">
    <span class="slide-num">16 / 19</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>

    <!-- Section 2 RHS: ECG + FFT + toolbar -->
    <div class="ecg-panel" id="ecgPanel">
      <canvas id="ecgCanvas"></canvas>
      <canvas id="fftCanvas"></canvas>
      <div class="ecg-sliders" id="sliderRow">
        <div class="ecg-slider-group">
          <label>HR</label>
          <input type="range" id="hrSlider" min="40" max="160" value="70" step="1">
          <span class="slider-val" id="hrVal">70 bpm</span>
        </div>
        <div class="ecg-slider-group">
          <label>HRV</label>
          <input type="range" id="hrvSlider" min="0" max="50" value="10" step="1">
          <span class="slider-val" id="hrvVal">10%</span>
        </div>
      </div>
      <div class="ecg-toolbar" id="tolRow">
        <span class="ecg-toolbar-label">Resistor Tolerance</span>
        <button type="button" class="quiz-btn active" data-tol="0">Ideal</button>
        <button type="button" class="quiz-btn" data-tol="0.001">±0.1%</button>
        <button type="button" class="quiz-btn" data-tol="0.01">±1%</button>
        <button type="button" class="quiz-btn" data-tol="0.05">±5%</button>
      </div>
    </div>

    <div class="stepper-row" id="stepper">
      <button type="button" class="stepper-btn" id="sec-prev" disabled>← Prev Section</button>
      <span class="step-indicator" id="sec-indicator">Section 1 · Rejection</span>
      <button type="button" class="stepper-btn" id="sec-next">Next Section →</button>
    </div>
  </div>

  <script type="module">
    import {
      Scene, Polygon, Rectangle, Line, Circle, Dot, Text, MathTex,
      Create, Write, FadeIn,
      UP, DOWN, LEFT, RIGHT
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ── Title ──
    const title = new Text({ text: 'Difference Amplifier', fontSize: 40, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    if (typeof title.getLeft === 'function') {
      title.shift([-6.2 - title.getLeft()[0], 0, 0]);
    }

    // ── Layout constants (matches 06/06b style) ──
    const CX = -2.5, CY = 0.7;
    const TRI_HALF_H = 0.9;
    const TRI_IN_X = CX - 0.9;   // -3.4
    const TRI_APEX_X = CX + 0.8;  // -1.7
    const minusY = CY + 0.35;     // 1.05 (− inverting, top)
    const plusY = CY - 0.35;     // 0.35 (+ non-inv, bottom)
    const VIN_X = -6.0;
    const NODE_X = -4.3;
    const TAP_X = -0.9;
    const OUT_X = 0.0;
    const FB_Y = 2.3;
    const VB_Y = -0.6;
    const GND_Y = -1.5;
    const R_W = 1.0, R_H = 0.34;

    // ── Op-amp triangle (06/06b style: MUTED2, filled) ──
    const tri = new Polygon({
      vertices: [
        [TRI_IN_X, CY - TRI_HALF_H, 0],
        [TRI_IN_X, CY + TRI_HALF_H, 0],
        [TRI_APEX_X, CY, 0]
      ],
      color: MUTED2, strokeWidth: 1.7, fillOpacity: 0.13
    });
    const mSym = new Text({ text: '−', fontSize: 18, color: RED, fontUrl: FONT_URL });
    const pSym = new Text({ text: '+', fontSize: 18, color: ACCENT, fontUrl: FONT_URL });
    await Promise.all([mSym.loadGlyphs?.(), pSym.loadGlyphs?.()]);
    mSym.moveTo([TRI_IN_X + 0.3, minusY, 0]);
    pSym.moveTo([TRI_IN_X + 0.3, plusY, 0]);

    // ── V_a input (top row, at minusY) – voltage source circle ──
    const VS_R = 0.22;
    const vaCircle = new Circle({ radius: VS_R, color: FG, strokeWidth: 1.8, fillOpacity: 0 }).moveTo([VIN_X, minusY, 0]);
    const vaPlus = new Text({ text: '+', fontSize: 12, color: FG, fontUrl: FONT_URL });
    const vaMinus = new Text({ text: '−', fontSize: 12, color: FG, fontUrl: FONT_URL });
    await Promise.all([vaPlus.loadGlyphs?.(), vaMinus.loadGlyphs?.()]);
    vaPlus.moveTo([VIN_X, minusY + 0.09, 0]);
    vaMinus.moveTo([VIN_X, minusY - 0.09, 0]);
    const Va = new MathTex({ latex: 'v_{a}', color: FG });
    await Va.waitForRender?.();
    Va.scale(0.7).nextTo([VIN_X, minusY, 0], LEFT, 0.28);

    // R_a on the V_a → v_n wire
    const RA_CX = (VIN_X + NODE_X) / 2;
    const inWaL = new Line({ start: [VIN_X + VS_R, minusY, 0], end: [RA_CX - R_W / 2, minusY, 0], color: FG, strokeWidth: 1.8 });
    const Ra = new Rectangle({ width: R_W, height: R_H, color: BLUE, strokeWidth: 2, fillOpacity: 0.22 });
    Ra.moveTo([RA_CX, minusY, 0]);
    const RaL = new MathTex({ latex: 'R_{a}', color: BLUE });
    await RaL.waitForRender?.();
    RaL.scale(0.6).moveTo([RA_CX, minusY + R_H / 2 + 0.18, 0]);
    const inWaR = new Line({ start: [RA_CX + R_W / 2, minusY, 0], end: [NODE_X, minusY, 0], color: FG, strokeWidth: 1.8 });
    const vnDot = new Dot({ point: [NODE_X, minusY, 0], color: FG, radius: 0.06 });
    const inStubA = new Line({ start: [NODE_X, minusY, 0], end: [TRI_IN_X, minusY, 0], color: FG, strokeWidth: 1.8 });

    // v_n label
    const vnLbl = new MathTex({ latex: 'v_{n}', color: CYAN });
    await vnLbl.waitForRender?.();
    vnLbl.scale(0.5).moveTo([NODE_X + 0.3, minusY - 0.1, 0]);

    // ── V_b input (below, at VB_Y, routes up to plusY through R_c) – voltage source circle ──
    const vbCircle = new Circle({ radius: VS_R, color: FG, strokeWidth: 1.8, fillOpacity: 0 }).moveTo([VIN_X, VB_Y, 0]);
    const vbPlus = new Text({ text: '+', fontSize: 12, color: FG, fontUrl: FONT_URL });
    const vbMinus = new Text({ text: '−', fontSize: 12, color: FG, fontUrl: FONT_URL });
    await Promise.all([vbPlus.loadGlyphs?.(), vbMinus.loadGlyphs?.()]);
    vbPlus.moveTo([VIN_X, VB_Y + 0.09, 0]);
    vbMinus.moveTo([VIN_X, VB_Y - 0.09, 0]);
    const Vb = new MathTex({ latex: 'v_{b}', color: FG });
    await Vb.waitForRender?.();
    Vb.scale(0.7).nextTo([VIN_X, VB_Y, 0], LEFT, 0.28);

    // Wire from V_b up to plusY level
    const vbUp = new Line({ start: [VIN_X, VB_Y + VS_R, 0], end: [VIN_X, plusY, 0], color: FG, strokeWidth: 1.8 });

    // R_c on the V_b → v_p wire (horizontal at plusY)
    const RC_CX = (VIN_X + NODE_X) / 2;
    const inWcL = new Line({ start: [VIN_X, plusY, 0], end: [RC_CX - R_W / 2, plusY, 0], color: FG, strokeWidth: 1.8 });
    const Rc = new Rectangle({ width: R_W, height: R_H, color: BLUE, strokeWidth: 2, fillOpacity: 0.22 });
    Rc.moveTo([RC_CX, plusY, 0]);
    const RcL = new MathTex({ latex: 'R_{c}', color: BLUE });
    await RcL.waitForRender?.();
    RcL.scale(0.6).moveTo([RC_CX, plusY + R_H / 2 + 0.18, 0]);
    const inWcR = new Line({ start: [RC_CX + R_W / 2, plusY, 0], end: [NODE_X, plusY, 0], color: FG, strokeWidth: 1.8 });
    const vpDot = new Dot({ point: [NODE_X, plusY, 0], color: FG, radius: 0.06 });
    const inStubC = new Line({ start: [NODE_X, plusY, 0], end: [TRI_IN_X, plusY, 0], color: FG, strokeWidth: 1.8 });

    // v_p label
    const vpLbl = new MathTex({ latex: 'v_{p}', color: CYAN });
    await vpLbl.waitForRender?.();
    vpLbl.scale(0.5).moveTo([NODE_X + 0.3, plusY - 0.2, 0]);

    // ── R_d from v_p down to ground ──
    const RD_CY = (plusY + GND_Y) / 2;
    const rdWireTop = new Line({ start: [NODE_X, plusY, 0], end: [NODE_X, RD_CY + 0.45, 0], color: FG, strokeWidth: 1.8 });
    const Rd = new Rectangle({ width: 0.34, height: 0.9, color: MAG, strokeWidth: 2, fillOpacity: 0.22 });
    Rd.moveTo([NODE_X, RD_CY, 0]);
    const RdL = new MathTex({ latex: 'R_{d}', color: MAG });
    await RdL.waitForRender?.();
    RdL.scale(0.6).nextTo(Rd, RIGHT, 0.12);
    const rdWireBot = new Line({ start: [NODE_X, RD_CY - 0.45, 0], end: [NODE_X, GND_Y, 0], color: FG, strokeWidth: 1.8 });

    // Ground symbol (3-line, matches 06/06b)
    const gnd1 = new Line({ start: [NODE_X - 0.35, GND_Y, 0], end: [NODE_X + 0.35, GND_Y, 0], color: FG, strokeWidth: 3 });
    const gnd2 = new Line({ start: [NODE_X - 0.22, GND_Y - 0.15, 0], end: [NODE_X + 0.22, GND_Y - 0.15, 0], color: FG, strokeWidth: 2 });
    const gnd3 = new Line({ start: [NODE_X - 0.10, GND_Y - 0.28, 0], end: [NODE_X + 0.10, GND_Y - 0.28, 0], color: FG, strokeWidth: 1 });

    // ── R_b feedback (v_n → up → across top → down to output tap) ──
    const RB_CX = (NODE_X + TAP_X) / 2;
    const fb1 = new Line({ start: [NODE_X, minusY, 0], end: [NODE_X, FB_Y, 0], color: FG, strokeWidth: 1.8 });
    const fb2L = new Line({ start: [NODE_X, FB_Y, 0], end: [RB_CX - R_W / 2, FB_Y, 0], color: FG, strokeWidth: 1.8 });
    const Rb = new Rectangle({ width: R_W, height: R_H, color: MAG, strokeWidth: 2, fillOpacity: 0.22 });
    Rb.moveTo([RB_CX, FB_Y, 0]);
    const RbL = new MathTex({ latex: 'R_{b}', color: MAG });
    await RbL.waitForRender?.();
    RbL.scale(0.6).moveTo([RB_CX, FB_Y + R_H / 2 + 0.18, 0]);
    const fb2R = new Line({ start: [RB_CX + R_W / 2, FB_Y, 0], end: [TAP_X, FB_Y, 0], color: FG, strokeWidth: 1.8 });
    const fb3 = new Line({ start: [TAP_X, FB_Y, 0], end: [TAP_X, CY, 0], color: FG, strokeWidth: 1.8 });
    const tapDot = new Dot({ point: [TAP_X, CY, 0], color: FG, radius: 0.06 });

    // ── Output wire ──
    const outW = new Line({ start: [TRI_APEX_X, CY, 0], end: [OUT_X, CY, 0], color: FG, strokeWidth: 1.8 });
    const vOutPort = new Circle({ radius: 0.07, color: FG, strokeWidth: 2, fillColor: '#000000', fillOpacity: 1 }).moveTo([OUT_X, CY, 0]);
    const Vo = new MathTex({ latex: 'v_{o}', color: YELLOW });
    await Vo.waitForRender?.();
    Vo.scale(0.7).nextTo([OUT_X, CY, 0], RIGHT, 0.14);

    // ── Right-hand side info panel (Section 1) – all MathTex, left-aligned ──
    // Canvas right column: x ∈ [1.25, 6.85], y ∈ [-4, 3.6]
    // Layout uses a shared left-pin helper for exact alignment.

    const RX = 1.3;  // left edge of main bullet text
    const DX = 1.1;  // x-centre of main bullet dots
    const SRX = 1.5;  // left edge of sub-bullet text
    const SDX = 1.3;  // x-centre of sub-bullet dash
    const BS = 0.43;  // scale for bullet MathTex
    const SS = 0.38;  // scale for sub-bullet MathTex
    const EQS = 0.6;  // scale for equations

    // Left-pin: place obj so its left edge is exactly at xL, centred on y
    async function mkMath(latex, color, scale, xL, y) {
      const o = new MathTex({ latex, color });
      await o.waitForRender?.();
      o.scale(scale).moveTo([0, y, 0]);
      if (typeof o.getLeft === 'function') {
        o.shift([xL - o.getLeft()[0], 0, 0]);
      } else {
        o.moveTo([xL + 1.5, y, 0]);
      }
      return o;
    }

    function mkDot(x, y, filled = true) {
      return new Circle({
        radius: 0.06, color: FG,
        fillColor: filled ? FG : BG, fillOpacity: 1,
        strokeWidth: filled ? 0 : 1.5,
      }).moveTo([x, y, 0]);
    }

    // ── Row y positions – multi-line bullets, generous spacing ──
    const ROW_OFFSETS = -1.5;
    const LS = 0.44;  // line spacing within a bullet
    const BG_GAP = 0.82;  // gap between bullets
    let Y = 4.10 + ROW_OFFSETS;
    const r = {
      b1l1: Y,
      b1l2: Y - LS,
      b2l1: Y - LS - BG_GAP,
      b2l2: Y - 2 * LS - BG_GAP,
      b3l1: Y - 2 * LS - 2 * BG_GAP,
      b3l2: Y - 3 * LS - 2 * BG_GAP,
      b4l1: Y - 3 * LS - 3 * BG_GAP,
      b4l2: Y - 4 * LS - 3 * BG_GAP,
      sub: Y - 4 * LS - 3 * BG_GAP - 0.55,
      b5l1: Y - 4 * LS - 3 * BG_GAP - 0.55 - BG_GAP,
      b5l2: Y - 5 * LS - 3 * BG_GAP - 0.55 - BG_GAP,
    };

    // — Bullet 1 (2 lines) —
    const d1 = mkDot(DX, r.b1l1);
    const t1l1 = await mkMath('\\text{The difference/differential amplifier}', FG, BS, RX, r.b1l1);
    const t1l2 = await mkMath('\\text{has two inputs, } V_a \\text{ and } V_b\\text{.}', FG, BS, RX, r.b1l2);

    // — Bullet 2 (2 lines) —
    const d2 = mkDot(DX, r.b2l1);
    const t2l1 = await mkMath('\\text{The output is the amplified difference}', FG, BS, RX, r.b2l1);
    const t2l2 = await mkMath('\\text{between the two inputs, } V_b - V_a\\text{.}', FG, BS, RX, r.b2l2);

    // — Bullet 3 (2 lines) —
    const d3 = mkDot(DX, r.b3l1);
    const t3l1 = await mkMath('\\text{Ideal difference amplifiers have zero}', FG, BS, RX, r.b3l1);
    const t3l2 = await mkMath('\\text{common-mode gain.}', FG, BS, RX, r.b3l2);

    // — Bullet 4 (2 lines) —
    const d4 = mkDot(DX, r.b4l1);
    const t4l1 = await mkMath('\\text{Choosing } R_a = R_c \\text{, and } R_b = R_d\\text{,}', FG, BS, RX, r.b4l1);
    const t4l2 = await mkMath('\\text{i.e. perfectly matched resistors, gives zero CM gain.}', FG, BS, RX, r.b4l2);

    // — Sub-bullet (1 line) —
    const ds = await mkMath('\\text{–}', MUTED, SS, SDX, r.sub);
    const ts = await mkMath('\\text{Use resistors with smallest tolerance, e.g., } {\\pm}0.1\\%\\text{.}', MUTED, SS, SRX, r.sub);

    // — Bullet 5 (2 lines) —
    const d5 = mkDot(DX, r.b5l1);
    const t5l1 = await mkMath('\\text{They only amplify differential-mode}', FG, BS, RX, r.b5l1);
    const t5l2 = await mkMath('\\text{portions of input signals.}', FG, BS, RX, r.b5l2);

    // ── Equation box – positioned under the circuit diagram (left half) ──
    const EQ_BOX_CX = -3.1;
    const EQ_BOX_W = 6.4;
    const EQ_BOX_H = 2.00;
    const EQ_BOX_TOP = -1.96;
    const EQ_BOX_CY = EQ_BOX_TOP - EQ_BOX_H / 2;

    // Centre-pin helper: place obj centred at (cx, y)
    async function mkMathCentre(latex, color, scale, cx, y) {
      const o = new MathTex({ latex, color });
      await o.waitForRender?.();
      o.scale(scale).moveTo([cx, y, 0]);
      return o;
    }

    const eqBox = new Rectangle({
      width: EQ_BOX_W, height: EQ_BOX_H,
      color: ACCENT, strokeWidth: 1.4, fillOpacity: 0.10,
    });
    eqBox.moveTo([EQ_BOX_CX, EQ_BOX_CY, 0]);

    // Heading – left-pinned inside box top
    const EQ_LEFT = -6.05;
    const eqnHead = await mkMath('\\text{If resistors are perfectly matched:}', MUTED, 0.40, EQ_LEFT, EQ_BOX_TOP - 0.25);

    // Equation 1 – centred, color-coded resistors
    const eqn1 = await mkMathCentre(
      `V_o = \\frac{\\textcolor{${MAG}}{R_b}}{\\textcolor{${BLUE}}{R_a}}(V_b - V_a) = \\frac{\\textcolor{${MAG}}{R_d}}{\\textcolor{${BLUE}}{R_c}}(V_b - V_a)`,
      FG, 0.47, EQ_BOX_CX, EQ_BOX_TOP - 0.7
    );

    // Equation 2 – centred, color-coded resistors
    const eqn2 = await mkMathCentre(
      `A_v = \\frac{\\textcolor{${MAG}}{R_b}}{\\textcolor{${BLUE}}{R_a}} = \\frac{\\textcolor{${MAG}}{R_d}}{\\textcolor{${BLUE}}{R_c}}`,
      FG, 0.47, EQ_BOX_CX, EQ_BOX_TOP - 1.5
    );

    // ── Manim object groups for section toggling ──
    const bulletObjs = [
      d1, t1l1, t1l2, d2, t2l1, t2l2, d3, t3l1, t3l2,
      d4, t4l1, t4l2, ds, ts, d5, t5l1, t5l2,
    ];
    const equationObjs = [eqBox, eqnHead, eqn1, eqn2];
    const circuitObjs = [
      title, tri, mSym, pSym,
      vaCircle, vaPlus, vaMinus, Va, inWaL, Ra, RaL, inWaR, vnDot, vnLbl, inStubA,
      fb1, fb2L, Rb, RbL, fb2R, fb3, tapDot,
      vbCircle, vbPlus, vbMinus, Vb, vbUp, inWcL, Rc, RcL, inWcR, vpDot, vpLbl, inStubC,
      rdWireTop, Rd, RdL, rdWireBot, gnd1, gnd2, gnd3,
      outW, vOutPort, Vo,
    ];

    // ══════════════════════════════════════════════════
    // Interactive layer (registered before animations so
    // section switching works immediately on page load)
    // ══════════════════════════════════════════════════

    // ── State ──
    const state = {
      section: 'rejection',
      tolerance: 0,
      resistors: { Ra: 1000, Rb: 10000, Rc: 10000, Rd: 1000 },
      rafId: null,
    };

    // ── DOM refs ──
    const secIndicator = document.getElementById('sec-indicator');
    const prevBtn = document.getElementById('sec-prev');
    const nextBtn = document.getElementById('sec-next');
    const ecgPanel = document.getElementById('ecgPanel');
    const ecgCanvas = document.getElementById('ecgCanvas');
    const ecgCtx = ecgCanvas.getContext('2d');
    const fftCanvas = document.getElementById('fftCanvas');
    const fftCtx = fftCanvas.getContext('2d');
    const hrSlider = document.getElementById('hrSlider');
    const hrValEl = document.getElementById('hrVal');
    const hrvSlider = document.getElementById('hrvSlider');
    const hrvValEl = document.getElementById('hrvVal');

    // ── HR / HRV controls ──
    let targetHR = 70;   // bpm
    let hrvPct = 10;     // % variability

    hrSlider.addEventListener('input', () => {
      targetHR = parseInt(hrSlider.value);
      hrValEl.textContent = targetHR + ' bpm';
    });
    hrvSlider.addEventListener('input', () => {
      hrvPct = parseInt(hrvSlider.value);
      hrvValEl.textContent = hrvPct + '%';
    });

    // ── Tolerance controls ──
    const tolBtns = document.querySelectorAll('#tolRow .quiz-btn');
    const NOMINAL = { Ra: 1000, Rb: 10000, Rc: 10000, Rd: 1000 };

    function rerollResistors() {
      const tol = state.tolerance;
      for (const key of ['Ra', 'Rb', 'Rc', 'Rd']) {
        const nom = NOMINAL[key];
        state.resistors[key] = tol === 0 ? nom : nom * (1 + (Math.random() * 2 - 1) * tol);
      }
    }

    tolBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tolBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.tolerance = parseFloat(btn.dataset.tol);
        rerollResistors();
      });
    });

    // ── ECG signal synthesis (sum-of-Gaussians PQRST) ──
    // Real ECG ~1 mV peak, common-mode hum ~1 V peak
    const ECG_AMPLITUDE = 0.001;  // 1 mV
    const HUM_AMPLITUDE = 1.0;    // 1 V peak mains hum

    function ecgTemplate(phase, beat) {
      // beat object carries per-beat random offsets
      const a = beat.amp, s = beat.shift;
      let v = 0;
      v += (0.12 * a[0]) * Math.exp(-Math.pow((phase - (0.10 + s[0])) / 0.025, 2));
      v -= (0.08 * a[1]) * Math.exp(-Math.pow((phase - (0.17 + s[1])) / 0.008, 2));
      v += (1.00 * a[2]) * Math.exp(-Math.pow((phase - (0.20 + s[2])) / 0.012, 2));
      v -= (0.15 * a[3]) * Math.exp(-Math.pow((phase - (0.23 + s[3])) / 0.008, 2));
      v += (0.18 * a[4]) * Math.exp(-Math.pow((phase - (0.35 + s[4])) / 0.035, 2));
      return v;
    }

    // Per-beat variation: slight random amplitude & timing shifts
    function rollBeat() {
      const r = () => 0.85 + Math.random() * 0.30;        // amplitude: 0.85–1.15
      const s = () => (Math.random() - 0.5) * 0.008;      // timing shift: ±4 ms
      const meanPeriod = 60 / targetHR;
      const variation = meanPeriod * (hrvPct / 100) * (Math.random() * 2 - 1);
      return {
        amp: [r(), r(), r(), r(), r()],
        shift: [s(), s(), s(), s(), s()],
        period: Math.max(0.25, meanPeriod + variation),
      };
    }
    let currentBeat = rollBeat();
    let beatStartT = 0;  // absolute time the current beat began

    // ── Scrolling ECG buffer ──
    const ECG_BUF_LEN = 700;
    const ecgBuffer = new Float32Array(ECG_BUF_LEN);
    let ecgBufIdx = 0;
    let ecgLastSampleT = 0;
    const ECG_SAMPLE_RATE = 200;
    const ECG_SAMPLE_DT = 1 / ECG_SAMPLE_RATE;

    // ── Resize canvases to match pixel dimensions ──
    function resizeCanvases() {
      const dpr = window.devicePixelRatio || 1;
      for (const [cv, cx] of [[ecgCanvas, ecgCtx], [fftCanvas, fftCtx]]) {
        const rect = cv.getBoundingClientRect();
        cv.width = Math.round(rect.width * dpr);
        cv.height = Math.round(rect.height * dpr);
        cx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
    }
    new ResizeObserver(resizeCanvases).observe(ecgCanvas);

    // ── ECG drawing ──
    function drawEcgPlot() {
      const rect = ecgCanvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      const ctx = ecgCtx;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, w, h);

      // Title
      ctx.fillStyle = YELLOW;
      ctx.font = '600 16px IBM Plex Sans, sans-serif';
      ctx.fillText('Vout(t)', 20, 28);

      // CMRR readout
      const { Ra: ra, Rb: rb, Rc: rc, Rd: rd } = state.resistors;
      const Adiff = rb / ra;
      const Acm = (ra * rc - rb * rd) / (ra * (rc + rd));
      const humLeakMv = Math.abs(Acm) * HUM_AMPLITUDE * 1000;
      const cmrrText = Math.abs(Acm) < 1e-12
        ? 'CMRR: ∞ dB  ·  50 Hz hum leakage: 0 mV'
        : `CMRR: ${(20 * Math.log10(Math.abs(Adiff / Acm))).toFixed(1)} dB  ·  Hum leak: ${humLeakMv.toFixed(1)} mV`;
      ctx.fillStyle = MUTED;
      ctx.font = '11px IBM Plex Mono, monospace';
      ctx.fillText(cmrrText, 20, 48);

      // Plot area
      const plotL = 16, plotR = w - 16;
      const plotT = 64, plotB = h - 16;
      const plotW = plotR - plotL;
      const plotH = plotB - plotT;
      const midY = plotT + plotH / 2;

      // Grid
      ctx.strokeStyle = IS_LIGHT ? '#e0e0e2' : '#161c28';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 6; i++) {
        const y = plotT + (plotH * i) / 6;
        ctx.beginPath(); ctx.moveTo(plotL, y); ctx.lineTo(plotR, y); ctx.stroke();
      }

      // Zero line
      ctx.strokeStyle = MUTED2;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(plotL, midY); ctx.lineTo(plotR, midY); ctx.stroke();
      ctx.setLineDash([]);

      // Auto-scale Y
      let maxAbs = 0.001;
      for (let i = 0; i < ECG_BUF_LEN; i++) {
        const a = Math.abs(ecgBuffer[i]);
        if (a > maxAbs) maxAbs = a;
      }
      maxAbs *= 1.2;

      // Waveform
      ctx.strokeStyle = ACCENT;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < ECG_BUF_LEN; i++) {
        const bufI = (ecgBufIdx + i) % ECG_BUF_LEN;
        const x = plotL + (i / ECG_BUF_LEN) * plotW;
        const y = midY - (ecgBuffer[bufI] / maxAbs) * (plotH / 2);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Axis label
      ctx.fillStyle = MUTED;
      ctx.font = '10px IBM Plex Mono, monospace';
      ctx.fillText('3.5 s', plotR - 30, plotB + 12);
      ctx.fillText('time →', plotL, plotB + 12);
    }

    // ── FFT (radix-2 DIT, real input) ──
    const FFT_N = 512;  // must be power of 2, ≤ ECG_BUF_LEN
    const fftReal = new Float64Array(FFT_N);
    const fftImag = new Float64Array(FFT_N);

    function computeFFT() {
      // Copy latest FFT_N samples from circular buffer, apply Hann window
      for (let i = 0; i < FFT_N; i++) {
        const bufI = (ecgBufIdx - FFT_N + i + ECG_BUF_LEN * FFT_N) % ECG_BUF_LEN;
        const win = 0.5 * (1 - Math.cos(2 * Math.PI * i / (FFT_N - 1)));
        fftReal[i] = ecgBuffer[bufI] * win;
        fftImag[i] = 0;
      }
      // Bit-reversal permutation
      for (let i = 1, j = 0; i < FFT_N; i++) {
        let bit = FFT_N >> 1;
        while (j & bit) { j ^= bit; bit >>= 1; }
        j ^= bit;
        if (i < j) {
          let tmp = fftReal[i]; fftReal[i] = fftReal[j]; fftReal[j] = tmp;
          tmp = fftImag[i]; fftImag[i] = fftImag[j]; fftImag[j] = tmp;
        }
      }
      // Cooley-Tukey butterfly
      for (let len = 2; len <= FFT_N; len <<= 1) {
        const ang = -2 * Math.PI / len;
        const wR = Math.cos(ang), wI = Math.sin(ang);
        for (let i = 0; i < FFT_N; i += len) {
          let curR = 1, curI = 0;
          for (let j = 0; j < len / 2; j++) {
            const uR = fftReal[i + j], uI = fftImag[i + j];
            const vR = fftReal[i + j + len / 2] * curR - fftImag[i + j + len / 2] * curI;
            const vI = fftReal[i + j + len / 2] * curI + fftImag[i + j + len / 2] * curR;
            fftReal[i + j] = uR + vR; fftImag[i + j] = uI + vI;
            fftReal[i + j + len / 2] = uR - vR; fftImag[i + j + len / 2] = uI - vI;
            const tmpR = curR * wR - curI * wI;
            curI = curR * wI + curI * wR;
            curR = tmpR;
          }
        }
      }
    }

    // ── FFT averaging ──
    const maxFreq = 100;
    const binsToShow = Math.floor(maxFreq / ECG_SAMPLE_RATE * FFT_N);
    const fftAvg = new Float64Array(binsToShow);  // exponential moving average
    const FFT_ALPHA = 0.08;  // smoothing factor (lower = smoother)

    // ── FFT drawing ──
    function drawFFTPlot() {
      const rect = fftCanvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      const ctx = fftCtx;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, w, h);

      // Title
      ctx.fillStyle = YELLOW;
      ctx.font = '600 13px IBM Plex Sans, sans-serif';
      ctx.fillText('Frequency Spectrum', 16, 20);

      // Plot area
      const plotL = 16, plotR = w - 16;
      const plotT = 30, plotB = h - 14;
      const plotW = plotR - plotL;
      const plotH = plotB - plotT;

      // Compute instant magnitudes and update average
      computeFFT();
      const mags = new Float64Array(binsToShow);
      for (let i = 0; i < binsToShow; i++) {
        mags[i] = Math.sqrt(fftReal[i] * fftReal[i] + fftImag[i] * fftImag[i]) / FFT_N;
        fftAvg[i] += FFT_ALPHA * (mags[i] - fftAvg[i]);
      }

      // Shared Y scale from averaged data
      let maxMag = 0.0001;
      for (let i = 0; i < binsToShow; i++) {
        if (fftAvg[i] > maxMag) maxMag = fftAvg[i];
        if (mags[i] > maxMag) maxMag = mags[i];
      }

      // Grid lines
      ctx.strokeStyle = IS_LIGHT ? '#e0e0e2' : '#161c28';
      ctx.lineWidth = 0.5;
      for (let f = 0; f <= maxFreq; f += 10) {
        const x = plotL + (f / maxFreq) * plotW;
        ctx.beginPath(); ctx.moveTo(x, plotT); ctx.lineTo(x, plotB); ctx.stroke();
      }

      // 50 Hz marker line
      const x50 = plotL + (50 / maxFreq) * plotW;
      ctx.strokeStyle = RED;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.4;
      ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(x50, plotT); ctx.lineTo(x50, plotB); ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1.0;
      ctx.fillStyle = RED;
      ctx.font = '9px IBM Plex Mono, monospace';
      ctx.fillText('50 Hz', x50 - 14, plotT - 2);

      // Instant spectrum bars (transparent)
      const barW = Math.max(1.5, plotW / binsToShow - 0.5);
      for (let i = 1; i < binsToShow; i++) {
        const freq = i * ECG_SAMPLE_RATE / FFT_N;
        const x = plotL + (freq / maxFreq) * plotW;
        const barH = (mags[i] / maxMag) * plotH;
        ctx.fillStyle = (freq > 48 && freq < 52) ? RED : ACCENT;
        ctx.globalAlpha = 0.15;
        ctx.fillRect(x - barW / 2, plotB - barH, barW, barH);
      }
      ctx.globalAlpha = 1.0;

      // Gaussian-smooth the averaged magnitudes for drawing
      const KERN_R = 4;  // kernel radius in bins
      const smoothed = new Float64Array(binsToShow);
      for (let i = 0; i < binsToShow; i++) {
        let sum = 0, wt = 0;
        for (let k = -KERN_R; k <= KERN_R; k++) {
          const j = i + k;
          if (j < 0 || j >= binsToShow) continue;
          const g = Math.exp(-0.5 * (k * k) / (KERN_R * 0.6) ** 2);
          sum += fftAvg[j] * g;
          wt += g;
        }
        smoothed[i] = sum / wt;
      }

      // Averaged spectrum line (smooth, solid)
      ctx.strokeStyle = ACCENT;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 1; i < binsToShow; i++) {
        const freq = i * ECG_SAMPLE_RATE / FFT_N;
        const x = plotL + (freq / maxFreq) * plotW;
        const y = plotB - (smoothed[i] / maxMag) * plotH;
        if (i === 1) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Highlight 50 Hz region on the averaged line in red
      ctx.strokeStyle = RED;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      let started = false;
      for (let i = 1; i < binsToShow; i++) {
        const freq = i * ECG_SAMPLE_RATE / FFT_N;
        if (freq < 44 || freq > 56) continue;
        const x = plotL + (freq / maxFreq) * plotW;
        const y = plotB - (smoothed[i] / maxMag) * plotH;
        if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Frequency axis labels
      ctx.fillStyle = MUTED;
      ctx.font = '9px IBM Plex Mono, monospace';
      for (let f = 0; f <= maxFreq; f += 20) {
        const x = plotL + (f / maxFreq) * plotW;
        ctx.fillText(f + '', x - 6, plotB + 10);
      }
      ctx.fillText('Hz', plotR - 10, plotB + 10);
    }

    // ── Animation frame ──
    function ecgFrame(tNow) {
      if (state.section !== 'tolerance') return;

      const tSec = tNow / 1000;

      while (ecgLastSampleT < tSec) {
        ecgLastSampleT += ECG_SAMPLE_DT;
        if (ecgLastSampleT >= beatStartT + currentBeat.period) {
          beatStartT += currentBeat.period;
          currentBeat = rollBeat();
        }
        const ecgPhase = (ecgLastSampleT - beatStartT) / currentBeat.period;
        const ecgVal = ecgTemplate(ecgPhase, currentBeat);

        const { Ra: ra, Rb: rb, Rc: rc, Rd: rd } = state.resistors;
        const Acm = (ra * rc - rb * rd) / (ra * (rc + rd));
        const Adiff = rb / ra;
        const ecgOut = Adiff * ECG_AMPLITUDE * ecgVal;
        const hum = Acm * HUM_AMPLITUDE * Math.sin(2 * Math.PI * 50 * ecgLastSampleT);
        const sample = ecgOut + hum;

        ecgBuffer[ecgBufIdx % ECG_BUF_LEN] = sample;
        ecgBufIdx++;
      }

      drawEcgPlot();
      drawFFTPlot();
      state.rafId = requestAnimationFrame(ecgFrame);
    }

    // ── Section switching ──
    let hasVisitedS2 = false;

    function setSection(name) {
      if (state.rafId) cancelAnimationFrame(state.rafId);
      state.section = name;
      if (name === 'rejection') {
        ecgPanel.classList.remove('visible');
        secIndicator.textContent = 'Section 1 · Difference Amplifier';
        prevBtn.disabled = true;
        nextBtn.disabled = false;
        // Only restore bullets if returning from Section 2
        if (hasVisitedS2) {
          for (const obj of bulletObjs) scene.add(obj);
        }
      } else {
        hasVisitedS2 = true;
        animCancelled = true;
        // Instantly show circuit + equations, hide bullets
        for (const obj of circuitObjs) scene.add(obj);
        for (const obj of equationObjs) scene.add(obj);
        for (const obj of bulletObjs) scene.remove(obj);
        ecgPanel.classList.add('visible');
        resizeCanvases();
        secIndicator.textContent = 'Section 2 · Tolerance';
        prevBtn.disabled = false;
        nextBtn.disabled = true;
        rerollResistors();
        fftAvg.fill(0);
        ecgLastSampleT = performance.now() / 1000;
        state.rafId = requestAnimationFrame(ecgFrame);
      }
    }

    prevBtn.addEventListener('click', () => { if (state.section === 'tolerance') setSection('rejection'); });
    nextBtn.addEventListener('click', () => { if (state.section === 'rejection') setSection('tolerance'); });
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' && state.section === 'rejection') setSection('tolerance');
      if (e.key === 'ArrowLeft' && state.section === 'tolerance') setSection('rejection');
    });

    // ── Build-in animation (non-blocking, cancellable) ──
    let animCancelled = false;

    async function playIfActive(...anims) {
      if (animCancelled) return;
      await scene.play(...anims);
    }

    (async () => {
      const W = 0.3, C = 0.4;
      await playIfActive(new Write(title, { duration: 0.7 }));
      await playIfActive(new Create(tri, { duration: C }), new Write(mSym, { duration: C }), new Write(pSym, { duration: C }));
      await playIfActive(new Create(outW, { duration: W }));
      await playIfActive(new Create(vOutPort, { duration: 0.2 }), new Write(Vo, { duration: C }));
      await playIfActive(new Create(vaCircle, { duration: C }), new Write(vaPlus, { duration: 0.2 }), new Write(vaMinus, { duration: 0.2 }), new Write(Va, { duration: C }));
      await playIfActive(new Create(inWaL, { duration: W }));
      await playIfActive(new Create(Ra, { duration: C }), new Write(RaL, { duration: C }));
      await playIfActive(new Create(inWaR, { duration: W }));
      await playIfActive(new FadeIn(vnDot, { duration: 0.15 }), new Write(vnLbl, { duration: C }));
      await playIfActive(new Create(inStubA, { duration: W }));
      await playIfActive(new Create(fb1, { duration: W }));
      await playIfActive(new Create(fb2L, { duration: W }));
      await playIfActive(new Create(Rb, { duration: C }), new Write(RbL, { duration: C }));
      await playIfActive(new Create(fb2R, { duration: W }));
      await playIfActive(new Create(fb3, { duration: W }));
      await playIfActive(new FadeIn(tapDot, { duration: 0.15 }));
      await playIfActive(new Create(vbCircle, { duration: C }), new Write(vbPlus, { duration: 0.2 }), new Write(vbMinus, { duration: 0.2 }), new Write(Vb, { duration: C }));
      await playIfActive(new Create(vbUp, { duration: W }));
      await playIfActive(new Create(inWcL, { duration: W }));
      await playIfActive(new Create(Rc, { duration: C }), new Write(RcL, { duration: C }));
      await playIfActive(new Create(inWcR, { duration: W }));
      await playIfActive(new FadeIn(vpDot, { duration: 0.15 }), new Write(vpLbl, { duration: C }));
      await playIfActive(new Create(inStubC, { duration: W }));
      await playIfActive(new Create(rdWireTop, { duration: W }));
      await playIfActive(new Create(Rd, { duration: C }), new Write(RdL, { duration: C }));
      await playIfActive(new Create(rdWireBot, { duration: W }));
      await playIfActive(new Create(gnd1, { duration: 0.2 }), new Create(gnd2, { duration: 0.2 }), new Create(gnd3, { duration: 0.2 }));
      await playIfActive(new FadeIn(d1, { duration: 0.35 }), new FadeIn(t1l1, { duration: 0.5 }), new FadeIn(t1l2, { duration: 0.5 }));
      await playIfActive(new FadeIn(d2, { duration: 0.35 }), new FadeIn(t2l1, { duration: 0.5 }), new FadeIn(t2l2, { duration: 0.5 }));
      await playIfActive(new FadeIn(d3, { duration: 0.35 }), new FadeIn(t3l1, { duration: 0.5 }), new FadeIn(t3l2, { duration: 0.5 }));
      await playIfActive(new FadeIn(d4, { duration: 0.35 }), new FadeIn(t4l1, { duration: 0.5 }), new FadeIn(t4l2, { duration: 0.5 }));
      await playIfActive(new FadeIn(ds, { duration: 0.35 }), new FadeIn(ts, { duration: 0.5 }));
      await playIfActive(new FadeIn(d5, { duration: 0.35 }), new FadeIn(t5l1, { duration: 0.5 }), new FadeIn(t5l2, { duration: 0.5 }));
      await playIfActive(new Create(eqBox, { duration: 1 }));
      await playIfActive(new Write(eqnHead, { duration: 1 }));
      await playIfActive(new Write(eqn1, { duration: 1 }));
      await playIfActive(new Write(eqn2, { duration: 1 }));
    })();

    // ── Start ──
    setSection('rejection');
  </script>
