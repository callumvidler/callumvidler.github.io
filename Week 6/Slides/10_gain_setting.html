<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 10 — How Negative Feedback Controls the Gain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
  <style>
    .fb-panel {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 7;
      width: 260px;
      padding: 14px 16px 16px;
      background: var(--slide-surface);
      border: 1px solid var(--slide-border);
      border-radius: 12px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22), 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      font-family: 'IBM Plex Sans', 'IBM Plex Mono', sans-serif;
      color: var(--slide-text);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    [data-theme="light"] .fb-panel {
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.03);
    }
    .fb-panel.visible { display: flex; }
    .fb-panel .fb-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--slide-accent);
      font-weight: 500;
    }
    .fb-panel .fb-row {
      display: flex; flex-direction: column; gap: 4px;
    }
    .fb-panel .fb-row label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--slide-text-dim);
      display: flex; justify-content: space-between;
    }
    .fb-panel .fb-row label .val {
      color: var(--slide-text);
      font-variant-numeric: tabular-nums;
    }
    .fb-panel input[type="range"] {
      width: 100%;
      accent-color: var(--slide-accent);
      cursor: pointer;
      height: 18px;
    }
    .fb-panel .fb-readouts {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 3px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--slide-text);
      line-height: 1.5;
      margin-top: 4px;
      padding-top: 8px;
      border-top: 1px solid var(--slide-border);
    }
    .fb-panel .fb-readouts .k { color: var(--slide-text-dim); }
    .fb-panel .fb-readouts .v {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    .fb-panel .fb-reset {
      align-self: flex-end;
      margin-top: 2px;
      background: transparent;
      border: 1px solid var(--slide-border);
      color: var(--slide-text-dim);
      padding: 3px 10px;
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .fb-panel .fb-reset:hover {
      color: var(--slide-text);
      border-color: var(--slide-accent);
    }
  </style>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">12 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>

    <div class="fb-panel" id="fbPanel" aria-hidden="true">
      <div class="fb-title">Try it</div>
      <div class="fb-row">
        <label>V<sub>in</sub> <span class="val" id="fbVinVal">2.00 V</span></label>
        <input type="range" id="fbVinSlider" min="-4" max="4" step="0.1" value="2">
      </div>
      <div class="fb-row">
        <label>A<sub>OL</sub> <span class="val" id="fbAolVal">1e6</span></label>
        <input type="range" id="fbAolSlider" min="0" max="40" step="1" value="40">
      </div>
      <div class="fb-readouts">
        <span class="k">V<sub>+</sub></span><span class="v" id="fbRvplus">2.00 V</span>
        <span class="k">V<sub>−</sub></span><span class="v" id="fbRvminus">2.00 V</span>
        <span class="k">error</span><span class="v" id="fbRerr">0.00 V</span>
        <span class="k">V<sub>out</sub></span><span class="v" id="fbRvout">4.00 V</span>
        <span class="k">A<sub>CL</sub></span><span class="v" id="fbRacl">2.00</span>
      </div>
      <button type="button" class="fb-reset" id="fbReset">reset</button>
    </div>
  </div>

  <script type="module">
    import {
      Scene, Polygon, Line, Rectangle, Circle, Text, MathTex, VGroup, Dot,
      Create, Write, FadeIn, FadeOut, Transform
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // Plot region constants (shared across Part 1 and Part 2)
    const PLOT_X0 = 1.5, PLOT_X1 = 5.5;
    const PLOT_Y0 = -2.0, PLOT_Y1 = 1.9;

    // Design values
    const BETA = 0.5;
    const V_IN_AUTO = 2;
    const V_SAT = 13;

    // ── Part 1 — persistent stage ──
    const title = new Text({
      text: 'How Negative Feedback Controls the Gain',
      fontSize: 34, color: FG, fontUrl: FONT_URL
    });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    const partLabelP1 = new Text({
      text: 'Part 1 — Without feedback',
      fontSize: 14, color: MUTED, fontUrl: FONT_URL
    });
    await partLabelP1.loadGlyphs?.();
    partLabelP1.moveTo([-4.4, 2.95, 0]);

    // Op-amp triangle centered around (−3.0, 0.2)
    const cx = -3.0, cy = 0.2;
    const triangle = new Polygon({
      vertices: [[cx - 1.6, cy - 1.3, 0], [cx - 1.6, cy + 1.3, 0], [cx + 1.4, cy, 0]],
      color: ACCENT, strokeWidth: 3, fillOpacity: 0
    });

    // Input rails (V+ on top, V− on bottom)
    const inPlus  = new Line({ start: [cx - 3.2, cy + 0.7, 0], end: [cx - 1.6, cy + 0.7, 0], color: FG });
    const inMinus = new Line({ start: [cx - 3.2, cy - 0.7, 0], end: [cx - 1.6, cy - 0.7, 0], color: FG });

    // Output rail
    const outRail = new Line({ start: [cx + 1.4, cy, 0], end: [cx + 3.2, cy, 0], color: FG });

    // + / − symbols inside triangle
    const plusSym  = new Text({ text: '+', fontSize: 22, color: ACCENT, fontUrl: FONT_URL });
    const minusSym = new Text({ text: '−', fontSize: 22, color: RED,    fontUrl: FONT_URL });
    await Promise.all([plusSym.loadGlyphs?.(), minusSym.loadGlyphs?.()]);
    plusSym.moveTo([cx - 1.25, cy + 0.45, 0]);
    minusSym.moveTo([cx - 1.25, cy - 0.45, 0]);

    // ── Play sequence (Part 1 reveal) ──
    await scene.play(new Write(title, { duration: 0.6 }));
    await scene.play(new FadeIn(partLabelP1, { duration: 0.3 }));
    await scene.play(new Create(triangle, { duration: 0.8 }));
    await scene.play(
      new FadeIn(inPlus,  { duration: 0.4 }),
      new FadeIn(inMinus, { duration: 0.4 }),
      new FadeIn(outRail, { duration: 0.4 }),
      new Write(plusSym,  { duration: 0.4 }),
      new Write(minusSym, { duration: 0.4 })
    );

    // ── Part 1 — V_in source on V+, ground on V− ──
    const vInSrcCircle = new Circle({ radius: 0.18, color: FG, strokeWidth: 2 });
    vInSrcCircle.moveTo([cx - 3.6, cy + 0.7, 0]);
    const vInLbl = new Text({ text: 'V_in', fontSize: 11, color: FG, fontUrl: FONT_URL });
    await vInLbl.loadGlyphs?.();
    vInLbl.moveTo([cx - 3.6, cy + 1.15, 0]);
    // Extend input rail to the source circle
    const vInLead = new Line({ start: [cx - 3.6, cy + 0.7, 0], end: [cx - 3.2, cy + 0.7, 0], color: FG });

    // Ground tie on V− rail
    const gndLead = new Line({ start: [cx - 3.6, cy - 0.7, 0], end: [cx - 3.2, cy - 0.7, 0], color: FG });
    const gndV    = new Line({ start: [cx - 3.6, cy - 0.7, 0], end: [cx - 3.6, cy - 1.0, 0], color: FG });
    const gndH1   = new Line({ start: [cx - 3.85, cy - 1.0, 0], end: [cx - 3.35, cy - 1.0, 0], color: FG });
    const gndH2   = new Line({ start: [cx - 3.75, cy - 1.12, 0], end: [cx - 3.45, cy - 1.12, 0], color: FG });
    const gndH3   = new Line({ start: [cx - 3.65, cy - 1.24, 0], end: [cx - 3.55, cy - 1.24, 0], color: FG });
    const gndGroup = new VGroup(gndLead, gndV, gndH1, gndH2, gndH3);

    // ── Part 1 — inset plot axes ──
    const xAxis = new Line({ start: [PLOT_X0, PLOT_Y0, 0], end: [PLOT_X1, PLOT_Y0, 0], color: MUTED });
    const yAxis = new Line({ start: [PLOT_X0, PLOT_Y0, 0], end: [PLOT_X0, PLOT_Y1, 0], color: MUTED });
    const xLbl = new Text({ text: 'V_in (mV)', fontSize: 11, color: FG, fontUrl: FONT_URL });
    const yLbl = new Text({ text: 'V_out (V)', fontSize: 11, color: FG, fontUrl: FONT_URL });
    await Promise.all([xLbl.loadGlyphs?.(), yLbl.loadGlyphs?.()]);
    xLbl.moveTo([(PLOT_X0 + PLOT_X1) / 2, PLOT_Y0 - 0.35, 0]);
    yLbl.rotate(Math.PI / 2).moveTo([PLOT_X0 - 0.35, (PLOT_Y0 + PLOT_Y1) / 2, 0]);

    // ±V_sat dashed rails
    const satY = -2.0 + (V_SAT / 15) * 3.9; // y for +V_sat with 15 V ceiling mapping
    // Top rail (+V_sat): horizontal dashed line
    const satTopParts = [];
    for (let i = 0; i < 16; i++) {
      const xa = PLOT_X0 + i * 0.25;
      satTopParts.push(new Line({ start: [xa, satY, 0], end: [xa + 0.15, satY, 0], color: RED, strokeWidth: 1 }));
    }
    const satBotParts = [];
    for (let i = 0; i < 16; i++) {
      const xa = PLOT_X0 + i * 0.25;
      satBotParts.push(new Line({ start: [xa, -satY, 0], end: [xa + 0.15, -satY, 0], color: RED, strokeWidth: 1 }));
    }
    const vSatTopLbl = new Text({ text: '+V_sat', fontSize: 9, color: RED, fontUrl: FONT_URL });
    const vSatBotLbl = new Text({ text: '−V_sat', fontSize: 9, color: RED, fontUrl: FONT_URL });
    await Promise.all([vSatTopLbl.loadGlyphs?.(), vSatBotLbl.loadGlyphs?.()]);
    vSatTopLbl.moveTo([PLOT_X1 + 0.35, satY, 0]);
    vSatBotLbl.moveTo([PLOT_X1 + 0.35, -satY, 0]);

    // ── Part 1 — nominal transfer curve (A_OL = 200k) ──
    // At this axis scale, the curve is essentially a vertical step at V_in = 0.
    const plotMidX = (PLOT_X0 + PLOT_X1) / 2; // 3.5
    const nomLeft  = new Line({ start: [PLOT_X0, -satY, 0], end: [plotMidX - 0.02, -satY, 0], color: ACCENT, strokeWidth: 3 });
    const nomStep  = new Line({ start: [plotMidX - 0.02, -satY, 0], end: [plotMidX + 0.02, satY, 0], color: ACCENT, strokeWidth: 3 });
    const nomRight = new Line({ start: [plotMidX + 0.02, satY, 0], end: [PLOT_X1, satY, 0], color: ACCENT, strokeWidth: 3 });
    const nomCurve = new VGroup(nomLeft, nomStep, nomRight);

    // "Linear range ≈ ±65 μV" callout: small yellow bracket at x = plotMidX
    const bracketL = new Line({ start: [plotMidX - 0.08, -0.25, 0], end: [plotMidX - 0.08, 0.25, 0], color: YELLOW, strokeWidth: 2 });
    const bracketR = new Line({ start: [plotMidX + 0.08, -0.25, 0], end: [plotMidX + 0.08, 0.25, 0], color: YELLOW, strokeWidth: 2 });
    const bracketTop = new Line({ start: [plotMidX - 0.08, 0.25, 0], end: [plotMidX + 0.08, 0.25, 0], color: YELLOW, strokeWidth: 2 });
    const bracketBot = new Line({ start: [plotMidX - 0.08, -0.25, 0], end: [plotMidX + 0.08, -0.25, 0], color: YELLOW, strokeWidth: 2 });
    const bracket = new VGroup(bracketL, bracketR, bracketTop, bracketBot);
    const bracketArrow = new Line({ start: [plotMidX + 0.7, 0.9, 0], end: [plotMidX + 0.12, 0.1, 0], color: YELLOW, strokeWidth: 1.5 });
    const bracketLbl = new Text({ text: 'Linear range ≈ ±65 μV', fontSize: 10, color: YELLOW, fontUrl: FONT_URL });
    await bracketLbl.loadGlyphs?.();
    bracketLbl.moveTo([plotMidX + 1.25, 1.05, 0]);

    // Formula subcaption below plot
    const eqnSub = new Text({
      text: 'V_out = A_OL · V_in,  clipped at ±V_sat',
      fontSize: 10, color: MUTED, fontUrl: FONT_URL
    });
    await eqnSub.loadGlyphs?.();
    eqnSub.moveTo([(PLOT_X0 + PLOT_X1) / 2, PLOT_Y0 - 0.7, 0]);

    await scene.play(
      new FadeIn(vInSrcCircle), new FadeIn(vInLead), new Write(vInLbl),
      new FadeIn(gndGroup)
    );
    await scene.play(
      new Create(xAxis), new Create(yAxis), new Write(xLbl), new Write(yLbl)
    );
    for (const d of satTopParts) scene.add(d);
    for (const d of satBotParts) scene.add(d);
    await scene.play(
      ...satTopParts.map(d => new Create(d, { duration: 0.2 })),
      ...satBotParts.map(d => new Create(d, { duration: 0.2 })),
      new FadeIn(vSatTopLbl), new FadeIn(vSatBotLbl)
    );
    await scene.play(new Create(nomCurve, { duration: 0.8, lagRatio: 0.02 }), new FadeIn(eqnSub));
    await scene.play(new Create(bracket, { duration: 0.4 }), new Create(bracketArrow, { duration: 0.3 }), new FadeIn(bracketLbl));

    // ── Part 1 — punchline beat 1 ──
    const punchline1 = new Text({
      text: 'Any real input slams the output to a rail.',
      fontSize: 14, color: YELLOW, fontUrl: FONT_URL
    });
    await punchline1.loadGlyphs?.();
    punchline1.moveTo([(PLOT_X0 + PLOT_X1) / 2, PLOT_Y0 - 1.05, 0]);
    await scene.play(new FadeIn(punchline1, { duration: 0.5 }));
    await scene.wait(1.0);

    // ── Part 1 — device/temperature jitter (three ghost curves) ──
    // Visually exaggerate the slope of each ghost so the "family" is distinguishable.
    // Real A_OL values would all look vertical at this axis scale — the subcaption
    // makes this honesty explicit.
    const mkGhost = (halfWidth, color) => {
      const left   = new Line({ start: [PLOT_X0, -satY, 0], end: [plotMidX - halfWidth, -satY, 0], color, strokeWidth: 2 });
      const middle = new Line({ start: [plotMidX - halfWidth, -satY, 0], end: [plotMidX + halfWidth, satY, 0], color, strokeWidth: 2 });
      const right  = new Line({ start: [plotMidX + halfWidth, satY, 0], end: [PLOT_X1, satY, 0], color, strokeWidth: 2 });
      return new VGroup(left, middle, right);
    };
    const ghost50k  = mkGhost(0.20, MUTED2);  // widest (most horizontal middle)
    const ghost200k = mkGhost(0.10, MUTED2);
    const ghost2M   = mkGhost(0.03, MUTED2);  // narrowest (most vertical)

    const jitterSub = new Text({
      text: 'A_OL = 50k … 2M across temperature and devices',
      fontSize: 10, color: MUTED, fontUrl: FONT_URL
    });
    await jitterSub.loadGlyphs?.();
    jitterSub.moveTo([(PLOT_X0 + PLOT_X1) / 2, PLOT_Y0 - 0.95, 0]);

    await scene.play(new FadeIn(ghost50k,  { duration: 0.5 }));
    await scene.play(new FadeIn(ghost200k, { duration: 0.5 }));
    await scene.play(new FadeIn(ghost2M,   { duration: 0.5 }));

    // ── Part 1 — punchline beat 2 ──
    const punchline2 = new Text({
      text: 'And A_OL itself varies ~10× with temperature and device.',
      fontSize: 14, color: YELLOW, fontUrl: FONT_URL
    });
    await punchline2.loadGlyphs?.();
    punchline2.moveTo([(PLOT_X0 + PLOT_X1) / 2, PLOT_Y0 - 1.05, 0]);

    await scene.play(new FadeOut(punchline1, { duration: 0.3 }));
    await scene.play(new FadeIn(jitterSub,  { duration: 0.4 }));
    await scene.play(new FadeIn(punchline2, { duration: 0.4 }));
    await scene.wait(0.8);

    // ── Part 1 — final punchline ──
    const punchlineFinal = new Text({
      text: 'Open-loop: useless as a linear amplifier.',
      fontSize: 16, color: YELLOW, fontUrl: FONT_URL
    });
    await punchlineFinal.loadGlyphs?.();
    punchlineFinal.moveTo([(PLOT_X0 + PLOT_X1) / 2, PLOT_Y0 - 1.45, 0]);
    await scene.play(new FadeIn(punchlineFinal, { duration: 0.5 }));
    await scene.wait(1.5);

    // ── Transition to Part 2 ──
    // Fade out everything Part 1-specific while leaving the triangle,
    // input/output rails, and + / − symbols intact.
    await scene.play(
      new FadeOut(vInSrcCircle, { duration: 0.4 }),
      new FadeOut(vInLead,      { duration: 0.4 }),
      new FadeOut(vInLbl,       { duration: 0.4 }),
      new FadeOut(gndGroup,     { duration: 0.4 }),
      new FadeOut(xAxis,        { duration: 0.4 }),
      new FadeOut(yAxis,        { duration: 0.4 }),
      new FadeOut(xLbl,         { duration: 0.4 }),
      new FadeOut(yLbl,         { duration: 0.4 }),
      new FadeOut(vSatTopLbl,   { duration: 0.4 }),
      new FadeOut(vSatBotLbl,   { duration: 0.4 }),
      ...satTopParts.map(d => new FadeOut(d, { duration: 0.4 })),
      ...satBotParts.map(d => new FadeOut(d, { duration: 0.4 })),
      new FadeOut(nomCurve,     { duration: 0.4 }),
      new FadeOut(bracket,      { duration: 0.4 }),
      new FadeOut(bracketArrow, { duration: 0.4 }),
      new FadeOut(bracketLbl,   { duration: 0.4 }),
      new FadeOut(eqnSub,       { duration: 0.4 }),
      new FadeOut(ghost50k,     { duration: 0.4 }),
      new FadeOut(ghost200k,    { duration: 0.4 }),
      new FadeOut(ghost2M,      { duration: 0.4 }),
      new FadeOut(jitterSub,    { duration: 0.4 }),
      new FadeOut(punchline2,   { duration: 0.4 }),
      new FadeOut(punchlineFinal, { duration: 0.4 }),
      new FadeOut(partLabelP1,  { duration: 0.4 })
    );

    // ── Part 2 — label ──
    const partLabelP2 = new Text({
      text: 'Part 2 — With negative feedback',
      fontSize: 14, color: MUTED, fontUrl: FONT_URL
    });
    await partLabelP2.loadGlyphs?.();
    partLabelP2.moveTo([-4.25, 2.95, 0]);
    await scene.play(new FadeIn(partLabelP2, { duration: 0.4 }));

    // ── Part 2 — V_in source on V+ rail (re-introduced) ──
    const vInSrcP2     = new Circle({ radius: 0.18, color: FG, strokeWidth: 2 });
    vInSrcP2.moveTo([cx - 3.6, cy + 0.7, 0]);
    const vInLblP2     = new Text({ text: 'V_in', fontSize: 11, color: FG, fontUrl: FONT_URL });
    await vInLblP2.loadGlyphs?.();
    vInLblP2.moveTo([cx - 3.6, cy + 1.15, 0]);
    const vInLeadP2    = new Line({ start: [cx - 3.6, cy + 0.7, 0], end: [cx - 3.2, cy + 0.7, 0], color: FG });

    // ── Part 2 — feedback wire loop ──
    // Output tap at (cx+3.0, cy) goes up, over the top of the triangle, down to V− level,
    // then passes through R_f to the R_f/R_g junction at (cx - 3.0, cy - 0.7), then R_g
    // drops from that junction to ground at (cx - 3.0, cy - 2.0).
    const tapX = cx + 3.0;  // where feedback branches off the output rail
    const fbTopY = cy + 2.1;
    const fbLeftX = cx - 3.0;

    const fbUp    = new Line({ start: [tapX, cy, 0],   end: [tapX, fbTopY, 0],   color: ACCENT });
    const fbOver  = new Line({ start: [tapX, fbTopY, 0], end: [fbLeftX, fbTopY, 0], color: ACCENT });
    const fbDown1 = new Line({ start: [fbLeftX, fbTopY, 0], end: [fbLeftX, cy - 0.2, 0], color: ACCENT });
    // R_f body (rectangle as a schematic resistor between (fbLeftX, cy-0.2) and (fbLeftX, cy-0.55))
    const rfBody = new Rectangle({ width: 0.22, height: 0.35, color: ACCENT, strokeWidth: 2, fillOpacity: 0 });
    rfBody.moveTo([fbLeftX, cy - 0.375, 0]);
    const fbDown2 = new Line({ start: [fbLeftX, cy - 0.55, 0], end: [fbLeftX, cy - 0.7, 0], color: ACCENT });
    // Horizontal stub from junction to V− rail
    const fbStub  = new Line({ start: [fbLeftX, cy - 0.7, 0], end: [cx - 1.6, cy - 0.7, 0], color: ACCENT });
    const rfLbl   = new Text({ text: 'R_f', fontSize: 12, color: MUTED, fontUrl: FONT_URL });
    await rfLbl.loadGlyphs?.();
    rfLbl.moveTo([fbLeftX + 0.35, cy - 0.375, 0]);

    // R_g drops from junction at (fbLeftX, cy - 0.7) to ground
    const rgDown1 = new Line({ start: [fbLeftX, cy - 0.7, 0], end: [fbLeftX, cy - 1.0, 0], color: ACCENT });
    const rgBody  = new Rectangle({ width: 0.22, height: 0.35, color: ACCENT, strokeWidth: 2, fillOpacity: 0 });
    rgBody.moveTo([fbLeftX, cy - 1.175, 0]);
    const rgDown2 = new Line({ start: [fbLeftX, cy - 1.35, 0], end: [fbLeftX, cy - 1.6, 0], color: ACCENT });
    // Ground symbol at (fbLeftX, cy - 1.6)
    const rgGndH1 = new Line({ start: [fbLeftX - 0.25, cy - 1.6, 0], end: [fbLeftX + 0.25, cy - 1.6, 0], color: FG });
    const rgGndH2 = new Line({ start: [fbLeftX - 0.15, cy - 1.72, 0], end: [fbLeftX + 0.15, cy - 1.72, 0], color: FG });
    const rgGndH3 = new Line({ start: [fbLeftX - 0.05, cy - 1.84, 0], end: [fbLeftX + 0.05, cy - 1.84, 0], color: FG });
    const rgLbl   = new Text({ text: 'R_g', fontSize: 12, color: MUTED, fontUrl: FONT_URL });
    await rgLbl.loadGlyphs?.();
    rgLbl.moveTo([fbLeftX + 0.35, cy - 1.175, 0]);

    const fbNetwork = new VGroup(
      fbUp, fbOver, fbDown1, rfBody, fbDown2, fbStub, rfLbl,
      rgDown1, rgBody, rgDown2, rgGndH1, rgGndH2, rgGndH3, rgLbl
    );

    await scene.play(
      new FadeIn(vInSrcP2), new FadeIn(vInLeadP2), new Write(vInLblP2)
    );
    await scene.play(new Create(fbNetwork, { duration: 1.2, lagRatio: 0.05 }));

    // ── Part 2 — narration caption below circuit ──
    const narration = new Text({
      text: 'V_+ = 2 V applied.  V_− starts at 0.  Error = V_+ − V_− = 2 V.',
      fontSize: 12, color: FG, fontUrl: FONT_URL
    });
    await narration.loadGlyphs?.();
    narration.moveTo([-3.0, -3.2, 0]);
    await scene.play(new FadeIn(narration, { duration: 0.4 }));

    // ── Part 2 — plot axes (Search step vs Voltage) ──
    const xAxisP2 = new Line({ start: [PLOT_X0, PLOT_Y0, 0], end: [PLOT_X1, PLOT_Y0, 0], color: MUTED });
    const yAxisP2 = new Line({ start: [PLOT_X0, PLOT_Y0, 0], end: [PLOT_X0, PLOT_Y1, 0], color: MUTED });
    const xLblP2 = new Text({ text: 'Search step', fontSize: 11, color: FG, fontUrl: FONT_URL });
    const yLblP2 = new Text({ text: 'Voltage (V)', fontSize: 11, color: FG, fontUrl: FONT_URL });
    await Promise.all([xLblP2.loadGlyphs?.(), yLblP2.loadGlyphs?.()]);
    xLblP2.moveTo([(PLOT_X0 + PLOT_X1) / 2, PLOT_Y0 - 0.35, 0]);
    yLblP2.rotate(Math.PI / 2).moveTo([PLOT_X0 - 0.35, (PLOT_Y0 + PLOT_Y1) / 2, 0]);

    // Coordinate helpers (voltage → plot y; step → plot x)
    const stepToX = s => PLOT_X0 + s * 1.0;
    const voltToY = v => PLOT_Y0 + (v / 5.0) * 3.9;

    // V+ horizontal reference line at y = 2 V
    const vPlusRefY = voltToY(V_IN_AUTO); // -2.0 + (2/5)*3.9 = -0.44
    const vPlusLine = new Line({
      start: [PLOT_X0, vPlusRefY, 0],
      end:   [PLOT_X1, vPlusRefY, 0],
      color: ACCENT, strokeWidth: 2
    });
    const vPlusLineLbl = new Text({ text: 'V_+ = 2 V', fontSize: 11, color: ACCENT, fontUrl: FONT_URL });
    await vPlusLineLbl.loadGlyphs?.();
    vPlusLineLbl.moveTo([PLOT_X1 + 0.55, vPlusRefY, 0]);

    await scene.play(
      new Create(xAxisP2), new Create(yAxisP2), new Write(xLblP2), new Write(yLblP2)
    );
    await scene.play(new Create(vPlusLine, { duration: 0.5 }), new FadeIn(vPlusLineLbl));

    // ── Part 2 — live voltage labels on circuit (mutated during search steps) ──
    const voutLabel = new Text({ text: 'V_out = 0.0 V', fontSize: 11, color: FG, fontUrl: FONT_URL });
    await voutLabel.loadGlyphs?.();
    voutLabel.moveTo([cx + 2.5, cy + 0.35, 0]);
    const vminusLabel = new Text({ text: 'V_\u2212 = 0 V', fontSize: 11, color: BLUE, fontUrl: FONT_URL });
    await vminusLabel.loadGlyphs?.();
    vminusLabel.moveTo([cx - 2.5, cy - 0.95, 0]);
    const vplusLabel = new Text({ text: 'V_+ = 2 V', fontSize: 11, color: ACCENT, fontUrl: FONT_URL });
    await vplusLabel.loadGlyphs?.();
    vplusLabel.moveTo([cx - 2.5, cy + 0.95, 0]);
    await scene.play(new FadeIn(voutLabel), new FadeIn(vminusLabel), new FadeIn(vplusLabel));

    // "Push V_out ↑" arrow at output rail (persistent during steps 1–3, fades after step 4)
    const pushArrow = new Line({
      start: [cx + 2.5, cy + 1.15, 0],
      end:   [cx + 2.5, cy + 0.65, 0],
      color: YELLOW, strokeWidth: 3
    });
    const pushHead1 = new Line({ start: [cx + 2.4, cy + 0.78, 0], end: [cx + 2.5, cy + 0.65, 0], color: YELLOW, strokeWidth: 3 });
    const pushHead2 = new Line({ start: [cx + 2.6, cy + 0.78, 0], end: [cx + 2.5, cy + 0.65, 0], color: YELLOW, strokeWidth: 3 });
    const pushLbl = new Text({ text: 'Push V_out \u2191', fontSize: 10, color: YELLOW, fontUrl: FONT_URL });
    await pushLbl.loadGlyphs?.();
    pushLbl.moveTo([cx + 3.15, cy + 0.9, 0]);
    const pushGroup = new VGroup(pushArrow, pushHead1, pushHead2, pushLbl);
    await scene.play(new FadeIn(pushGroup, { duration: 0.3 }));

    // Step helper — runs one search beat
    // Each step: mutate voltage labels, drop a blue dot at (stepIdx, vMinusNew),
    // extend the staircase, draw an error indicator with label.
    const staircaseSegments = [];
    const staircaseDots = [];
    const errorIndicators = [];
    let prevDotPos = [stepToX(0), voltToY(0), 0];

    const runStep = async (stepIdx, voutNew, vMinusNew, errorVal) => {
      const newVoutText = new Text({ text: `V_out = ${voutNew.toFixed(1)} V`, fontSize: 11, color: FG, fontUrl: FONT_URL });
      await newVoutText.loadGlyphs?.();
      newVoutText.moveTo(voutLabel.getCenter());
      const newVminusText = new Text({ text: `V_\u2212 = ${vMinusNew.toFixed(1)} V`, fontSize: 11, color: BLUE, fontUrl: FONT_URL });
      await newVminusText.loadGlyphs?.();
      newVminusText.moveTo(vminusLabel.getCenter());

      const dotX = stepToX(stepIdx);
      const dotY = voltToY(vMinusNew);
      const dot = new Dot({ point: [dotX, dotY, 0], color: BLUE, radius: 0.08 });
      staircaseDots.push(dot);

      // Staircase: horizontal from prev to (dotX, prevY), vertical from (dotX, prevY) to (dotX, dotY)
      const hSeg = new Line({ start: prevDotPos, end: [dotX, prevDotPos[1], 0], color: BLUE, strokeWidth: 2 });
      const vSeg = new Line({ start: [dotX, prevDotPos[1], 0], end: [dotX, dotY, 0], color: BLUE, strokeWidth: 2 });
      staircaseSegments.push(hSeg, vSeg);

      // Error indicator: dashed vertical from dot to V+ line
      const errParts = [];
      const dashY0 = dotY;
      const dashY1 = vPlusRefY;
      const dashCount = Math.max(3, Math.round(Math.abs(dashY1 - dashY0) / 0.1));
      for (let i = 0; i < dashCount; i++) {
        const y0 = dashY0 + (dashY1 - dashY0) * (i / dashCount);
        const y1 = dashY0 + (dashY1 - dashY0) * ((i + 0.5) / dashCount);
        errParts.push(new Line({ start: [dotX + 0.08, y0, 0], end: [dotX + 0.08, y1, 0], color: YELLOW, strokeWidth: 1.5 }));
      }
      const errLbl = new Text({ text: `error = ${errorVal.toFixed(1)} V`, fontSize: 10, color: YELLOW, fontUrl: FONT_URL });
      await errLbl.loadGlyphs?.();
      errLbl.moveTo([dotX + 0.7, (dashY0 + dashY1) / 2, 0]);
      const errGroup = new VGroup(...errParts, errLbl);
      errorIndicators.push(errGroup);

      await scene.play(
        new Transform(voutLabel,   newVoutText,   { duration: 0.3 }),
        new Transform(vminusLabel, newVminusText, { duration: 0.3 }),
        new Create(hSeg, { duration: 0.25 }),
        new Create(vSeg, { duration: 0.25 }),
        new FadeIn(dot,  { duration: 0.25 }),
        new FadeIn(errGroup, { duration: 0.25 })
      );
      prevDotPos = [dotX, dotY, 0];
    };

    await runStep(1, 1.0, 0.5, 1.5);
    // Fade error 1 before drawing error 2 so the plot doesn't get cluttered
    await scene.play(new FadeOut(errorIndicators[0], { duration: 0.2 }));
    await runStep(2, 2.0, 1.0, 1.0);
    await scene.play(new FadeOut(errorIndicators[1], { duration: 0.2 }));
    await runStep(3, 3.0, 1.5, 0.5);
    await scene.play(new FadeOut(errorIndicators[2], { duration: 0.2 }));
    await runStep(4, 4.0, 2.0, 0.0);

    // Collapse the final error indicator and fade the push arrow
    await scene.play(new FadeOut(errorIndicators[3], { duration: 0.4 }), new FadeOut(pushGroup, { duration: 0.4 }));

    // Replace narration caption with settled text
    const narrationSettled = new Text({
      text: 'V_\u2212 = V_+.  Error = 0.  Output has settled.',
      fontSize: 12, color: FG, fontUrl: FONT_URL
    });
    await narrationSettled.loadGlyphs?.();
    narrationSettled.moveTo(narration.getCenter());
    await scene.play(new Transform(narration, narrationSettled, { duration: 0.4 }));

    // ── Part 2 — virtual short reveal ──
    // Yellow dashed line between V+ and V− inside the triangle, matching the
    // visual idiom used by slide 11 (virtual_short.html).
    const vsDashes = [];
    for (let i = 0; i < 6; i++) {
      const xa = cx - 2.2 + i * 0.25;
      vsDashes.push(new Line({
        start: [xa,        cy + 0.7, 0],
        end:   [xa + 0.15, cy - 0.7, 0],
        color: YELLOW, strokeWidth: 1.5
      }));
    }
    const vsGroup = new VGroup(...vsDashes);
    const vsLabel = new Text({
      text: 'V_+ ≈ V_−  (virtual short)',
      fontSize: 12, color: YELLOW, fontUrl: FONT_URL
    });
    await vsLabel.loadGlyphs?.();
    vsLabel.moveTo([cx - 0.5, cy + 1.9, 0]);

    for (const d of vsDashes) scene.add(d);
    await scene.play(
      ...vsDashes.map(d => new Create(d, { duration: 0.25 })),
      new FadeIn(vsLabel, { duration: 0.4 })
    );

    // ── Part 2 — closed-loop gain formula ──
    const gainEqn = new MathTex({ latex: '\\dfrac{V_{out}}{V_{in}} = 1 + \\dfrac{R_f}{R_g} = 2', color: ACCENT });
    await gainEqn.waitForRender?.();
    gainEqn.scale(0.6).moveTo([-3.0, -2.6, 0]);
    const gainSub = new Text({
      text: 'Gain set by resistors — independent of A_OL.',
      fontSize: 11, color: MUTED, fontUrl: FONT_URL
    });
    await gainSub.loadGlyphs?.();
    gainSub.moveTo([-3.0, -3.75, 0]);

    await scene.play(new Write(gainEqn, { duration: 0.6 }));
    await scene.play(new FadeIn(gainSub, { duration: 0.4 }));
    await scene.wait(0.8);

    // ── Interactive panel wiring ──
    const fbPanel     = document.getElementById('fbPanel');
    const fbVinSlider = document.getElementById('fbVinSlider');
    const fbVinVal    = document.getElementById('fbVinVal');
    const fbAolSlider = document.getElementById('fbAolSlider');
    const fbAolVal    = document.getElementById('fbAolVal');
    const fbRvplus    = document.getElementById('fbRvplus');
    const fbRvminus   = document.getElementById('fbRvminus');
    const fbRerr      = document.getElementById('fbRerr');
    const fbRvout     = document.getElementById('fbRvout');
    const fbRacl      = document.getElementById('fbRacl');
    const fbReset     = document.getElementById('fbReset');

    // Log-scale A_OL: slider is 0..40, maps to 1e2..1e6
    const aolFromSlider = s => Math.pow(10, 2 + (s / 40) * 4);
    const fmtAol = a => {
      if (a >= 1e6) return '1e6';
      if (a >= 1e3) return (a / 1e3).toFixed(0) + 'k';
      return a.toFixed(0);
    };

    const computeState = () => {
      const Vplus = parseFloat(fbVinSlider.value);
      const AOL   = aolFromSlider(parseFloat(fbAolSlider.value));
      const VoutRaw = (AOL * Vplus) / (1 + AOL * BETA);
      const Vout  = Math.max(-V_SAT, Math.min(V_SAT, VoutRaw));
      const Vminus = BETA * Vout;
      const err    = Vplus - Vminus;
      const ACL    = Math.abs(Vplus) > 1e-3 ? Vout / Vplus : 1 / BETA;
      return { Vplus, AOL, Vout, Vminus, err, ACL };
    };

    const updateReadouts = (s) => {
      fbVinVal.textContent  = s.Vplus.toFixed(2) + ' V';
      fbAolVal.textContent  = fmtAol(s.AOL);
      fbRvplus.textContent  = s.Vplus.toFixed(2) + ' V';
      fbRvminus.textContent = s.Vminus.toFixed(2) + ' V';
      fbRerr.textContent    = s.err.toFixed(3) + ' V';
      fbRvout.textContent   = s.Vout.toFixed(2) + ' V';
      fbRacl.textContent    = s.ACL.toFixed(2);
    };

    // Recompute virtual-short opacity from loop-gain closeness.
    // At A_OL·β → ∞: opacity → 1. As A_OL drops toward 100 with β=0.5, opacity drops.
    const vsOpacity = (AOL) => {
      const loopGain = AOL * BETA;
      // Map loopGain = 50 (A_OL=100) → 0.35, loopGain = 500000 (A_OL=1e6) → 1.0
      const t = Math.min(1, Math.max(0, (Math.log10(loopGain) - Math.log10(50)) / (Math.log10(500000) - Math.log10(50))));
      return 0.35 + 0.65 * t;
    };

    const onSliderInput = () => {
      const s = computeState();
      updateReadouts(s);

      // Move the live cursor dot
      try {
        tcCursor.moveTo([tcXFromVin(s.Vplus), tcYFromVout(s.Vout), 0]);
      } catch (e) { /* ignore if manim-web moveTo is not reactive */ }

      // Fade the virtual-short dashes based on loop gain
      const op = vsOpacity(s.AOL);
      for (const d of vsDashes) {
        if (typeof d.setOpacity === 'function') d.setOpacity(op);
        else if (d.style) d.style.opacity = op;
      }
      if (typeof vsLabel.setOpacity === 'function') vsLabel.setOpacity(op);

      scene.render?.(); // force repaint if scene is idle
    };

    fbVinSlider.addEventListener('input', onSliderInput);
    fbAolSlider.addEventListener('input', onSliderInput);

    fbReset.addEventListener('click', () => {
      fbVinSlider.value = '2';
      fbAolSlider.value = '40';
      onSliderInput();
    });

    // ── Panel activation: retire the search-step plot, draw transfer curve ──
    const toRetire = [
      xAxisP2, yAxisP2, xLblP2, yLblP2,
      vPlusLine, vPlusLineLbl,
      ...staircaseSegments,
      ...staircaseDots
    ];
    await scene.play(...toRetire.map(o => new FadeOut(o, { duration: 0.4 })));

    // Transfer-curve inset — same plot region, new labels
    const tcXAxis = new Line({ start: [PLOT_X0, PLOT_Y0, 0], end: [PLOT_X1, PLOT_Y0, 0], color: MUTED });
    const tcYAxis = new Line({ start: [PLOT_X0, PLOT_Y0, 0], end: [PLOT_X0, PLOT_Y1, 0], color: MUTED });
    const tcXLbl = new Text({ text: 'V_in (V)', fontSize: 11, color: FG, fontUrl: FONT_URL });
    const tcYLbl = new Text({ text: 'V_out (V)', fontSize: 11, color: FG, fontUrl: FONT_URL });
    await Promise.all([tcXLbl.loadGlyphs?.(), tcYLbl.loadGlyphs?.()]);
    tcXLbl.moveTo([(PLOT_X0 + PLOT_X1) / 2, PLOT_Y0 - 0.35, 0]);
    tcYLbl.rotate(Math.PI / 2).moveTo([PLOT_X0 - 0.35, (PLOT_Y0 + PLOT_Y1) / 2, 0]);

    // Transfer-curve mapping helpers (panel slider range is V_in ∈ [−4, +4], V_out ∈ [−13, +13])
    const tcXFromVin  = v => PLOT_X0 + ((v + 4) / 8) * (PLOT_X1 - PLOT_X0);
    const tcYFromVout = v => PLOT_Y0 + ((v + 13) / 26) * (PLOT_Y1 - PLOT_Y0);

    // Ideal gain-2 reference line from (V_in=-4, V_out=-8) to (V_in=+4, V_out=+8)
    const tcIdealLine = new Line({
      start: [tcXFromVin(-4), tcYFromVout(-8), 0],
      end:   [tcXFromVin(+4), tcYFromVout(+8), 0],
      color: ACCENT, strokeWidth: 2
    });

    // Live cursor dot
    const tcCursor = new Dot({ point: [tcXFromVin(2), tcYFromVout(4), 0], color: BLUE, radius: 0.09 });

    await scene.play(
      new Create(tcXAxis), new Create(tcYAxis), new Write(tcXLbl), new Write(tcYLbl)
    );
    await scene.play(new Create(tcIdealLine, { duration: 0.5 }), new FadeIn(tcCursor));

    // Show the panel after the auto-animation completes
    fbPanel.classList.add('visible');
    fbPanel.setAttribute('aria-hidden', 'false');
    onSliderInput(); // seed readouts

    await scene.wait(0.2);

    await scene.wait(0.1);
  </script>
</body>
</html>
