<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 15 — Common-Mode Noise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
  <style>
    .manim-stage { position: relative; }
    #s1-waves {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Stage 3 overlays — hidden until compression transition completes */
    .cm-graph-wrap {
      position: absolute;
      left: 28px;
      right: 330px;
      bottom: 30px;
      height: 260px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 8;
    }
    .cm-graph-wrap.visible { opacity: 1; pointer-events: auto; }
    .cm-graph-wrap canvas { width: 100%; height: 100%; display: block; }

    .ol-panel {
      position: absolute;
      right: 14px;
      bottom: 30px;
      z-index: 9;
      width: 290px;
      padding: 14px 16px 14px;
      border-radius: 12px;
      border: 1px solid var(--slide-border);
      background: var(--slide-surface);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22), 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      display: none;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    [data-theme="light"] .ol-panel {
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.03);
    }
    .ol-panel.visible { display: flex; }

    .ol-title {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--slide-accent);
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
    }

    .ol-row { display: grid; gap: 4px; }
    .ol-row label {
      display: flex;
      justify-content: space-between;
      color: var(--slide-text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }
    .ol-row .v { color: var(--slide-text); font-variant-numeric: tabular-nums; }

    .ol-panel input[type="range"] {
      width: 100%;
      accent-color: var(--slide-accent);
      cursor: pointer;
      height: 18px;
    }

    .cm-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .cm-toggle button {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 6px 0;
      background: transparent;
      color: var(--slide-text-dim);
      border: 1px solid var(--slide-border);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .cm-toggle button:hover { color: var(--slide-text); }
    .cm-toggle button.active {
      background: var(--slide-accent);
      color: var(--slide-bg);
      border-color: var(--slide-accent);
    }

    .ol-readout {
      margin-top: 2px;
      border-top: 1px solid var(--slide-border);
      padding-top: 8px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }
    .ol-readout .k { color: var(--slide-text-dim); }
    .ol-readout .v { color: var(--slide-text); text-align: right; }

  </style>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">17 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
    <canvas id="s1-waves" width="1280" height="720"></canvas>
  </div>

  <div id="cm-graph-wrap" class="cm-graph-wrap">
    <canvas id="cm-graph"></canvas>
  </div>

  <aside id="cm-panel" class="ol-panel cm-panel">
    <div class="ol-title">Mains interference</div>
    <div class="ol-row">
      <label>Noise amplitude <span class="v" data-readout="amp">1.50×</span></label>
      <input type="range" id="cm-amp" min="0" max="2" step="0.01" value="1.5">
    </div>
    <div class="ol-row">
      <label>Line frequency <span class="v" data-readout="freq">50 Hz</span></label>
      <div class="cm-toggle">
        <button type="button" data-freq="50" class="active">50</button>
        <button type="button" data-freq="60">60</button>
      </div>
    </div>
    <div class="ol-readout">
      <span class="k">v_i1 pk-pk</span><span class="v" data-readout="v1pp">—</span>
      <span class="k">v_i2 pk-pk</span><span class="v" data-readout="v2pp">—</span>
      <span class="k">v_i1 − v_i2 pk-pk</span><span class="v" data-readout="vdpp">—</span>
    </div>
  </aside>

  <div class="stepper-row" id="stepper">
    <button type="button" class="stepper-btn" id="step-prev">&larr; Prev Step</button>
    <span class="step-indicator" id="step-indicator">Step 1/3</span>
    <button type="button" class="stepper-btn" id="step-next">Next Step &rarr;</button>
  </div>

  <script type="module">
    import {
      Scene, Rectangle, Polygon, Circle, Line, Text, MathTex, VGroup, Dot,
      Create, Write, FadeIn, FadeOut
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ── Stage 1: wave-pool concept panels (drawn entirely on s1-waves canvas) ──
    const stage1Title = new Text({
      text: 'Common-mode vs. differential-mode',
      fontSize: 26, color: FG, fontUrl: FONT_URL
    });
    const stage1Caption = new Text({
      text: 'A differential amplifier rejects what is common, amplifies what is different.',
      fontSize: 16, color: MUTED, fontUrl: FONT_URL
    });
    await stage1Title.loadGlyphs?.();
    stage1Title.moveTo([0, 3.0, 0]);
    await stage1Caption.loadGlyphs?.();
    stage1Caption.moveTo([0, -2.7, 0]);

    // ── Stage 2: ECG scenario ────────────────────────────────────────────────
    const SLIDE_TITLE_LEFT_X = -6.2;
    const BED_CX = -2.8, BED_CY = -1.3, BED_W = 4.2, BED_H = 0.4;
    const PATIENT_SHIFT = [-2.8, -1.1, 0];

    const slideTitle = new Text({
      text: 'Mains interference couples equally to both electrodes',
      fontSize: 26, color: FG, fontUrl: FONT_URL
    });
    await slideTitle.loadGlyphs?.();
    slideTitle.moveTo([0, 3.2, 0]);
    if (typeof slideTitle.getLeft === 'function') {
      slideTitle.shift([SLIDE_TITLE_LEFT_X - slideTitle.getLeft()[0], 0, 0]);
    }

    // Bed + legs + pillow
    const bed = new Rectangle({ width: BED_W, height: BED_H, color: MUTED, strokeWidth: 2, fillOpacity: 0.08 });
    bed.moveTo([BED_CX, BED_CY, 0]);
    const bedLegL = new Line({
      start: [BED_CX - BED_W / 2 + 0.15, BED_CY - BED_H / 2, 0],
      end:   [BED_CX - BED_W / 2 + 0.15, BED_CY - BED_H / 2 - 0.55, 0],
      color: MUTED, strokeWidth: 2
    });
    const bedLegR = new Line({
      start: [BED_CX + BED_W / 2 - 0.15, BED_CY - BED_H / 2, 0],
      end:   [BED_CX + BED_W / 2 - 0.15, BED_CY - BED_H / 2 - 0.55, 0],
      color: MUTED, strokeWidth: 2
    });
    const pillow = new Polygon({
      vertices: [
        [BED_CX - BED_W / 2 - 0.05, BED_CY + BED_H / 2, 0],
        [BED_CX - BED_W / 2 + 0.85, BED_CY + BED_H / 2, 0],
        [BED_CX - BED_W / 2 + 0.85, BED_CY + BED_H / 2 + 0.22, 0],
        [BED_CX - BED_W / 2 - 0.05, BED_CY + BED_H / 2 + 0.22, 0]
      ],
      color: MAG, strokeWidth: 1.5, fillOpacity: 0.18
    });

    // Patient silhouette — 25-vertex polygon, reclining side profile
    const PATIENT_LOCAL = [
      [-2.00,  0.40], [-1.78,  0.46], [-1.68,  0.30], [-1.60,  0.25],
      [-1.54,  0.14], [-1.40,  0.12], [-1.20,  0.28], [-0.70,  0.32],
      [-0.20,  0.26], [ 0.30,  0.28], [ 0.75,  0.32], [ 1.20,  0.28],
      [ 1.65,  0.20], [ 1.95,  0.22], [ 2.10,  0.12], [ 2.05,  0.02],
      [ 1.50,  0.00], [ 0.80,  0.00], [ 0.10,  0.00], [-0.60,  0.00],
      [-1.20,  0.00], [-1.55,  0.05], [-1.80,  0.20], [-2.05,  0.32],
      [-2.00,  0.40]
    ];
    const patient = new Polygon({
      vertices: PATIENT_LOCAL.map(([x, y]) => [x + PATIENT_SHIFT[0], y + PATIENT_SHIFT[1], 0]),
      color: FG, strokeWidth: 2, fillOpacity: 0.10
    });

    // Electrodes (local coords shifted onto chest)
    const ELEC1_LOCAL = [-1.00, 0.28];
    const ELEC2_LOCAL = [-0.30, 0.24];
    const elec1Pos = [ELEC1_LOCAL[0] + PATIENT_SHIFT[0], ELEC1_LOCAL[1] + PATIENT_SHIFT[1], 0];
    const elec2Pos = [ELEC2_LOCAL[0] + PATIENT_SHIFT[0], ELEC2_LOCAL[1] + PATIENT_SHIFT[1], 0];
    const elec1 = new Dot({ point: elec1Pos, color: YELLOW, radius: 0.09 });
    const elec2 = new Dot({ point: elec2Pos, color: YELLOW, radius: 0.09 });

    const elecLbl1 = new MathTex({ latex: 'v_{i1}', color: FG });
    const elecLbl2 = new MathTex({ latex: 'v_{i2}', color: FG });
    await elecLbl1.waitForRender?.();
    await elecLbl2.waitForRender?.();
    elecLbl1.scale(0.42).moveTo([elec1Pos[0] - 0.05, elec1Pos[1] + 0.26, 0]);
    elecLbl2.scale(0.42).moveTo([elec2Pos[0] + 0.25, elec2Pos[1] + 0.22, 0]);

    // Amp box — small rounded-feel rectangle to the right of the patient
    const AMP_BOX_CX = 1.60, AMP_BOX_CY = -0.80;
    const ampBox = new Rectangle({
      width: 0.85, height: 0.65, color: FG, strokeWidth: 2, fillOpacity: 0.06
    });
    ampBox.moveTo([AMP_BOX_CX, AMP_BOX_CY, 0]);
    const ampLbl = new Text({ text: 'to amp', fontSize: 12, color: MUTED, fontUrl: FONT_URL });
    await ampLbl.loadGlyphs?.();
    ampLbl.moveTo([AMP_BOX_CX, AMP_BOX_CY, 0]);

    const lead1 = new Line({
      start: elec1Pos,
      end:   [AMP_BOX_CX - 0.42, AMP_BOX_CY + 0.15, 0],
      color: FG, strokeWidth: 2
    });
    const lead2 = new Line({
      start: elec2Pos,
      end:   [AMP_BOX_CX - 0.42, AMP_BOX_CY - 0.15, 0],
      color: FG, strokeWidth: 2
    });

    // Mains cord + label
    const MAINS_X = 4.80;
    const mains = new Line({
      start: [MAINS_X,  2.50, 0],
      end:   [MAINS_X, -1.80, 0],
      color: RED, strokeWidth: 3
    });
    const mainsLbl = new Text({ text: 'Mains 50 Hz', fontSize: 14, color: RED, fontUrl: FONT_URL });
    await mainsLbl.loadGlyphs?.();
    mainsLbl.moveTo([MAINS_X, 2.88, 0]);

    // Capacitive coupling — two dashed paths, same dash count, same stroke, same color
    const couple1 = [];
    const couple2 = [];
    function addDashes(target, xs, ys, xe, ye, n) {
      for (let i = 0; i < n; i++) {
        const t0 = i / n, t1 = (i + 0.55) / n;
        target.push(new Line({
          start: [xs + (xe - xs) * t0, ys + (ye - ys) * t0, 0],
          end:   [xs + (xe - xs) * t1, ys + (ye - ys) * t1, 0],
          color: MAG, strokeWidth: 2
        }));
      }
    }
    addDashes(couple1, MAINS_X, 0.90, elec1Pos[0], elec1Pos[1], 12);
    addDashes(couple2, MAINS_X, 0.30, elec2Pos[0], elec2Pos[1], 12);
    const couple1Group = new VGroup(...couple1);
    const couple2Group = new VGroup(...couple2);

    const capLbl = new Text({
      text: 'C_couple (same on both leads)',
      fontSize: 12, color: MAG, fontUrl: FONT_URL
    });
    await capLbl.loadGlyphs?.();
    capLbl.moveTo([1.0, 0.95, 0]);

    // Bottom caption for Stage 2
    const stage2Caption = new Text({
      text: 'Identical 50 Hz on v_i1 and v_i2  →  common-mode',
      fontSize: 16, color: FG, fontUrl: FONT_URL
    });
    await stage2Caption.loadGlyphs?.();
    stage2Caption.moveTo([0, -2.70, 0]);

    // ── Stage groups ─────────────────────────────────────────────────────────
    const stage1Group = new VGroup(stage1Title, stage1Caption);

    const stage2Body = new VGroup(
      bed, bedLegL, bedLegR, pillow,
      patient,
      elec1, elec2, elecLbl1, elecLbl2,
      lead1, lead2, ampBox, ampLbl,
      mains, mainsLbl,
      couple1Group, couple2Group, capLbl,
      stage2Caption
    );

    // ── Signal module (always available, render loop deferred) ─────────────
    const state = {
      amplitude: 1.5,
      frequency: 50,
      tStart: performance.now() / 1000
    };

    const HEART_PERIOD_S = 60 / 72;
    const GAUSSIANS = [
      { center: 0.12, amp:  0.15, sigma: 0.025 },
      { center: 0.30, amp: -0.10, sigma: 0.008 },
      { center: 0.32, amp:  1.00, sigma: 0.010 },
      { center: 0.34, amp: -0.25, sigma: 0.010 },
      { center: 0.48, amp:  0.30, sigma: 0.040 }
    ];
    function ecg(t) {
      const tBeat = ((t % HEART_PERIOD_S) + HEART_PERIOD_S) % HEART_PERIOD_S;
      let y = 0;
      for (const g of GAUSSIANS) {
        const d = tBeat - g.center;
        y += g.amp * Math.exp(-(d * d) / (2 * g.sigma * g.sigma));
      }
      return y;
    }
    function mainsNoise(t) {
      return state.amplitude * Math.sin(2 * Math.PI * state.frequency * t);
    }

    const SAMPLE_RATE_HZ = 120;
    const TIME_WINDOW_S  = 3.0;
    const RING_LEN       = SAMPLE_RATE_HZ * TIME_WINDOW_S;
    const buf_v1 = new Float32Array(RING_LEN);
    const buf_v2 = new Float32Array(RING_LEN);
    const buf_vd = new Float32Array(RING_LEN);
    let ringHead = 0, ringFilled = 0;
    let lastSampleTime = state.tStart;

    function pushSample(v1, v2, vd) {
      const idx = (ringHead + ringFilled) % RING_LEN;
      buf_v1[idx] = v1; buf_v2[idx] = v2; buf_vd[idx] = vd;
      if (ringFilled < RING_LEN) ringFilled++;
      else ringHead = (ringHead + 1) % RING_LEN;
    }
    function sampleAt(t) {
      const v1 = ecg(t) + mainsNoise(t);
      const v2 = mainsNoise(t);
      return [v1, v2, v1 - v2];
    }
    function peakToPeak(buf) {
      if (ringFilled === 0) return 0;
      let lo = Infinity, hi = -Infinity;
      for (let i = 0; i < ringFilled; i++) {
        const v = buf[(ringHead + i) % RING_LEN];
        if (v < lo) lo = v; if (v > hi) hi = v;
      }
      return hi - lo;
    }

    // ── Canvas render loop (started on first stage-3 visit) ───────────────
    const canvas = document.getElementById('cm-graph');
    const ctx = canvas.getContext('2d');
    const TRACES = [
      { buf: buf_v1, label: 'v_i1',        color: BLUE   },
      { buf: buf_v2, label: 'v_i2',        color: CYAN   },
      { buf: buf_vd, label: 'v_i1 − v_i2', color: ACCENT }
    ];
    const ROW_GAP = 10, LEFT_GUTTER = 80, RIGHT_GUTTER = 16;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = Math.round(canvas.clientWidth * dpr);
      canvas.height = Math.round(canvas.clientHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    function drawFrame() {
      const cssW = canvas.clientWidth, cssH = canvas.clientHeight;
      ctx.clearRect(0, 0, cssW, cssH);
      const rowH = (cssH - ROW_GAP * (TRACES.length - 1)) / TRACES.length;
      const plotW = cssW - LEFT_GUTTER - RIGHT_GUTTER;
      ctx.font = '11px "IBM Plex Mono", monospace';
      ctx.textBaseline = 'middle';
      for (let r = 0; r < TRACES.length; r++) {
        const tr = TRACES[r];
        const y0 = r * (rowH + ROW_GAP), yMid = y0 + rowH / 2;
        ctx.strokeStyle = MUTED2; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(LEFT_GUTTER, y0); ctx.lineTo(cssW - RIGHT_GUTTER, y0);
        ctx.moveTo(LEFT_GUTTER, y0 + rowH); ctx.lineTo(cssW - RIGHT_GUTTER, y0 + rowH);
        ctx.stroke();
        ctx.strokeStyle = MUTED; ctx.setLineDash([2, 4]);
        ctx.beginPath(); ctx.moveTo(LEFT_GUTTER, yMid); ctx.lineTo(cssW - RIGHT_GUTTER, yMid); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = MUTED; ctx.textAlign = 'right';
        ctx.fillText(tr.label, LEFT_GUTTER - 10, yMid);
        if (ringFilled > 1) {
          const yScale = (rowH / 2 - 4) / 3.5;
          ctx.strokeStyle = tr.color; ctx.lineWidth = 1.6; ctx.beginPath();
          for (let i = 0; i < ringFilled; i++) {
            const x = LEFT_GUTTER + (i / (RING_LEN - 1)) * plotW;
            const y = yMid - tr.buf[(ringHead + i) % RING_LEN] * yScale;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }
    }
    function tick(nowMs) {
      const nowS = nowMs / 1000, dt = 1 / SAMPLE_RATE_HZ;
      while (lastSampleTime + dt <= nowS) {
        lastSampleTime += dt;
        const [v1, v2, vd] = sampleAt(lastSampleTime - state.tStart);
        pushSample(v1, v2, vd);
      }
      drawFrame();
      requestAnimationFrame(tick);
    }

    // ── Control wiring ────────────────────────────────────────────────────────
    const cmGraphWrap = document.getElementById('cm-graph-wrap');
    const cmPanel     = document.getElementById('cm-panel');
    const ampSlider   = document.getElementById('cm-amp');
    const ampOut  = document.querySelector('[data-readout="amp"]');
    const freqOut = document.querySelector('[data-readout="freq"]');
    const v1ppOut = document.querySelector('[data-readout="v1pp"]');
    const v2ppOut = document.querySelector('[data-readout="v2pp"]');
    const vdppOut = document.querySelector('[data-readout="vdpp"]');
    const freqButtons = cmPanel.querySelectorAll('.cm-toggle button');

    ampSlider.addEventListener('input', () => {
      state.amplitude = parseFloat(ampSlider.value);
      ampOut.textContent = state.amplitude.toFixed(2) + '×';
    });
    freqButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const f = parseInt(btn.dataset.freq, 10);
        state.frequency = f;
        freqOut.textContent = f + ' Hz';
        freqButtons.forEach(b => b.classList.toggle('active', b === btn));
      });
    });
    setInterval(() => {
      v1ppOut.textContent = peakToPeak(buf_v1).toFixed(2);
      v2ppOut.textContent = peakToPeak(buf_v2).toFixed(2);
      vdppOut.textContent = peakToPeak(buf_vd).toFixed(2);
    }, 66);
    window.addEventListener('resize', resizeCanvas);

    // ── Stage 1 wave-pool animation (HTML canvas overlay) ───────────────────
    const s1Canvas = document.getElementById('s1-waves');
    const s1Ctx = s1Canvas.getContext('2d');

    // Panel layout (canvas pixel coords, 1280×720)
    const S1_PANELS = [
      { label: 'Common-mode', x: 50, w: 550, mode: 'common' },
      { label: 'Differential-mode', x: 680, w: 550, mode: 'diff' }
    ];
    const S1_WAVE_TOP = 120, S1_WAVE_H = 200, S1_WAVE_BOT = S1_WAVE_TOP + S1_WAVE_H;
    const S1_DIFF_TOP = S1_WAVE_BOT + 50, S1_DIFF_H = 80;
    const S1_SURF_AMP = 40;
    const S1_WAVE_K = 2.5;
    const S1_DOT_R = 10;

    let s1AnimId = null;
    let s1Visible = false;

    function drawS1(time) {
      const c = s1Ctx;
      c.clearRect(0, 0, 1280, 720);
      const t = time / 1000;

      c.font = '600 17px "IBM Plex Sans", sans-serif';
      c.textAlign = 'center';

      for (const p of S1_PANELS) {
        const cx = p.x + p.w / 2;
        const waveY0 = S1_WAVE_TOP + S1_WAVE_H / 2;

        // Panel border
        c.strokeStyle = MUTED2;
        c.lineWidth = 1.5;
        c.strokeRect(p.x, S1_WAVE_TOP - 45, p.w, S1_WAVE_H + S1_DIFF_H + 115);

        // Header
        c.fillStyle = FG;
        c.fillText(p.label, cx, S1_WAVE_TOP - 18);

        // Water surface
        const surfFn = (xNorm) => {
          if (p.mode === 'common') {
            return S1_SURF_AMP * Math.sin(2 * Math.PI * t * 0.8);
          } else {
            return S1_SURF_AMP * Math.sin(S1_WAVE_K * xNorm * Math.PI * 2 - 2 * Math.PI * t * 0.8);
          }
        };

        // Draw water surface
        c.strokeStyle = MUTED;
        c.lineWidth = 2;
        c.beginPath();
        for (let i = 0; i <= 200; i++) {
          const xNorm = i / 200;
          const px = p.x + 30 + xNorm * (p.w - 60);
          const py = waveY0 - surfFn(xNorm);
          if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
        }
        c.stroke();

        // Water fill (subtle)
        c.globalAlpha = 0.06;
        c.fillStyle = p.mode === 'common' ? BLUE : RED;
        c.lineTo(p.x + p.w - 30, S1_WAVE_BOT);
        c.lineTo(p.x + 30, S1_WAVE_BOT);
        c.closePath();
        c.fill();
        c.globalAlpha = 1.0;

        // Dot positions — two dots at fixed x-positions on the surface
        const dot1XNorm = 0.3, dot2XNorm = 0.7;
        const dot1X = p.x + 30 + dot1XNorm * (p.w - 60);
        const dot2X = p.x + 30 + dot2XNorm * (p.w - 60);
        const dot1Y = waveY0 - surfFn(dot1XNorm);
        const dot2Y = waveY0 - surfFn(dot2XNorm);

        // Dashed line between dots
        c.strokeStyle = FG;
        c.lineWidth = 1.5;
        c.setLineDash([4, 4]);
        c.beginPath();
        c.moveTo(dot1X, dot1Y);
        c.lineTo(dot2X, dot2Y);
        c.stroke();
        c.setLineDash([]);

        // Dots
        c.fillStyle = BLUE;
        c.beginPath(); c.arc(dot1X, dot1Y, S1_DOT_R, 0, Math.PI * 2); c.fill();
        c.fillStyle = CYAN;
        c.beginPath(); c.arc(dot2X, dot2Y, S1_DOT_R, 0, Math.PI * 2); c.fill();

        // Dot labels
        c.font = '12px "IBM Plex Mono", monospace';
        c.fillStyle = BLUE; c.textAlign = 'center';
        c.fillText('v\u2081', dot1X, dot1Y - 18);
        c.fillStyle = CYAN;
        c.fillText('v\u2082', dot2X, dot2Y - 18);

        // Difference display below the wave pool
        const diffY0 = S1_DIFF_TOP + S1_DIFF_H / 2;
        const diff = dot1Y - dot2Y;

        // Difference label
        c.font = '12px "IBM Plex Mono", monospace';
        c.fillStyle = MUTED; c.textAlign = 'left';
        c.fillText('v\u2081 \u2212 v\u2082', p.x + 35, S1_DIFF_TOP - 6);

        // Baseline
        c.strokeStyle = MUTED2; c.lineWidth = 1;
        c.setLineDash([2, 4]);
        c.beginPath(); c.moveTo(p.x + 30, diffY0); c.lineTo(p.x + p.w - 30, diffY0); c.stroke();
        c.setLineDash([]);

        // Difference bar / indicator
        const barW = 30, barX = cx - barW / 2;
        const barH = diff * 0.8;
        c.fillStyle = ACCENT;
        c.globalAlpha = 0.5;
        c.fillRect(barX, diffY0 - barH, barW, barH);
        c.globalAlpha = 1.0;
        c.strokeStyle = ACCENT; c.lineWidth = 2;
        c.strokeRect(barX, diffY0 - barH, barW, barH);

        // Difference value text
        const diffVal = Math.abs(barH / 0.8).toFixed(0);
        c.font = 'bold 14px "IBM Plex Mono", monospace';
        c.fillStyle = ACCENT; c.textAlign = 'center';
        if (p.mode === 'common') {
          c.fillText('\u0394 = 0  (rejected)', cx, diffY0 + 24);
        } else {
          c.fillText('\u0394 oscillates  (amplified)', cx, diffY0 + 24);
        }

        // Sub-caption
        c.font = '13px "IBM Plex Sans", sans-serif';
        c.fillStyle = MUTED; c.textAlign = 'center';
        if (p.mode === 'common') {
          c.fillText('Both rise and fall together', cx, S1_DIFF_TOP + S1_DIFF_H + 38);
        } else {
          c.fillText('One rises while the other falls', cx, S1_DIFF_TOP + S1_DIFF_H + 38);
        }

        c.font = '600 17px "IBM Plex Sans", sans-serif';
      }

      if (s1Visible) s1AnimId = requestAnimationFrame(drawS1);
    }

    function startS1Waves() {
      s1Visible = true;
      s1Canvas.style.display = '';
      if (!s1AnimId) s1AnimId = requestAnimationFrame(drawS1);
    }
    function stopS1Waves() {
      s1Visible = false;
      if (s1AnimId) { cancelAnimationFrame(s1AnimId); s1AnimId = null; }
      s1Ctx.clearRect(0, 0, 1280, 720);
      s1Canvas.style.display = 'none';
    }
    s1Canvas.style.display = 'none';

    // ── Stage navigation ──────────────────────────────────────────────────────
    const SCENE_GROUP_SCALE  = 0.55;
    const SCENE_GROUP_TARGET = [0, 1.20, 0];
    let currentStage = 0;
    let stage2Compressed = false;
    let renderLoopStarted = false;
    let stage2OrigCenter = null;
    let stage1Animated = false;
    let animating = false;

    const navPrev = document.getElementById('step-prev');
    const navNext = document.getElementById('step-next');
    const navInd  = document.getElementById('step-indicator');

    function updateNav() {
      navPrev.disabled = currentStage <= 1;
      navNext.disabled = currentStage >= 3;
      navInd.textContent = 'Step ' + currentStage + '/3';
    }

    async function goTo(n) {
      if (n === currentStage || n < 1 || n > 3 || animating) return;

      // ── Hide current stage ──
      if (currentStage === 1) {
        scene.remove(stage1Group);
        stopS1Waves();
      } else if (currentStage === 2) {
        scene.remove(stage2Body);
        scene.remove(slideTitle);
      } else if (currentStage === 3) {
        if (stage2Compressed) {
          stage2Body.scale(1 / SCENE_GROUP_SCALE);
          if (stage2OrigCenter) stage2Body.moveTo(stage2OrigCenter);
          stage2Compressed = false;
        }
        scene.remove(stage2Body);
        scene.remove(slideTitle);
        cmGraphWrap.classList.remove('visible');
        cmPanel.classList.remove('visible');
      }

      currentStage = n;
      updateNav();

      // ── Show new stage ──
      if (n === 1) {
        if (!stage1Animated) {
          stage1Animated = true;
          animating = true;
          await scene.play(new Write(stage1Title, { duration: 0.6 }));
          startS1Waves();
          await scene.wait(1.0);
          await scene.play(new FadeIn(stage1Caption, { duration: 0.4 }));
          animating = false;
        } else {
          scene.add(stage1Group);
          startS1Waves();
        }
      } else if (n === 2) {
        scene.add(slideTitle);
        scene.add(stage2Body);
      } else if (n === 3) {
        scene.add(slideTitle);
        if (!stage2Compressed) {
          stage2OrigCenter = stage2Body.getCenter?.() || [0, -0.5, 0];
          stage2Body.scale(SCENE_GROUP_SCALE);
          stage2Body.moveTo(SCENE_GROUP_TARGET);
          stage2Compressed = true;
        }
        scene.add(stage2Body);
        cmGraphWrap.classList.add('visible');
        cmPanel.classList.add('visible');
        if (!renderLoopStarted) {
          renderLoopStarted = true;
          resizeCanvas();
          requestAnimationFrame(tick);
        }
      }
    }

    navPrev.addEventListener('click', () => goTo(currentStage - 1));
    navNext.addEventListener('click', () => goTo(currentStage + 1));
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') goTo(currentStage + 1);
      if (e.key === 'ArrowLeft') goTo(currentStage - 1);
    });

    goTo(1);
    await scene.wait(0.1);
  </script>
</body>
</html>
