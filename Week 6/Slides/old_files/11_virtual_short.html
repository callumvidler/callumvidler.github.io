<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 12 — Virtual Short</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">13 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
  </div>

  <script type="module">
    import {
      Scene, Polygon, Line, Circle, Text, MathTex, VGroup,
      Create, Write, FadeIn, FadeOut, Transform,
      UP, DOWN, LEFT, RIGHT, WHITE
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ── Title ──
    const title = new Text({ text: 'How Does an Op-Amp Use Negative Feedback?', fontSize: 40, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    // ── Left description bullets ──
    const leftBullets = [
      'Like a thermostat, an op-amp drives its output to eliminate',
      'the differential input voltage',
      'Negative feedback shapes this response to give the desired',
      'output for a given input'
    ];
    const leftObjs = [];
    for (let i = 0; i < leftBullets.length; i++) {
      const b = new Text({ text: (i === 0 || i === 2 ? '•  ' : '    ') + leftBullets[i], fontSize: 11, color: MUTED, fontUrl: FONT_URL });
      await b.loadGlyphs?.();
      b.moveTo([-3.9, 2.7 - i * 0.35, 0]);
      leftObjs.push(b);
    }

    // ── Right description ──
    const rightBullets = [
      'A virtual short exists between the op-amp inputs',
      'Negligible current flows into each input'
    ];
    const rightObjs = [];
    for (let i = 0; i < rightBullets.length; i++) {
      const b = new Text({ text: '•  ' + rightBullets[i], fontSize: 11, color: MUTED, fontUrl: FONT_URL });
      await b.loadGlyphs?.();
      b.moveTo([3.8, 2.7 - i * 0.4, 0]);
      rightObjs.push(b);
    }

    // ── Op-amp triangle (centered, pushed down) ──
    const cy = -0.2;
    const triangle = new Polygon({
      vertices: [[-1.6, cy - 1.3, 0], [-1.6, cy + 1.3, 0], [1.4, cy, 0]],
      color: ACCENT, strokeWidth: 3, fillOpacity: 0
    });
    const inP = new Line({ start: [-3.2, cy + 0.7, 0], end: [-1.6, cy + 0.7, 0], color: FG });
    const inM = new Line({ start: [-3.2, cy - 0.7, 0], end: [-1.6, cy - 0.7, 0], color: FG });
    const out = new Line({ start: [1.4, cy, 0], end: [3.2, cy, 0], color: FG });

    const pSym = new Text({ text: '+', fontSize: 20, color: ACCENT, fontUrl: FONT_URL }).moveTo([-1.25, cy + 0.45, 0]);
    const mSym = new Text({ text: '−', fontSize: 20, color: RED,    fontUrl: FONT_URL }).moveTo([-1.25, cy - 0.45, 0]);

    // Virtual short dashed line
    const dashParts = [];
    for (let i = 0; i < 6; i++) {
      const x0d = -2.2 + i * 0.25;
      dashParts.push(new Line({ start: [x0d, cy + 0.7, 0], end: [x0d + 0.15, cy - 0.7, 0], color: YELLOW, strokeWidth: 1 }));
    }
    const vsLbl = new Text({ text: '≈ 0 V', fontSize: 12, color: YELLOW, fontUrl: FONT_URL });
    await vsLbl.loadGlyphs?.();
    vsLbl.moveTo([-2.7, cy, 0]);

    // I ≈ 0 labels
    const IplusLbl = new MathTex({ latex: 'I\\approx 0', color: ACCENT });
    const IminusLbl = new MathTex({ latex: 'I\\approx 0', color: ACCENT });
    await Promise.all([IplusLbl.waitForRender?.(), IminusLbl.waitForRender?.()]);
    IplusLbl.scale(0.45).moveTo([-3.6, cy + 0.95, 0]);
    IminusLbl.scale(0.45).moveTo([-3.6, cy - 0.95, 0]);

    // Equations (below op-amp)
    const eq1 = new MathTex({ latex: 'V_{out} = A_{OL}(V_{+} - V_{-})', color: FG });
    const eq2 = new MathTex({ latex: 'V_{+} - V_{-} = \\dfrac{V_{out}}{A_{OL}}', color: FG });
    const eq3 = new MathTex({ latex: 'A_{OL}\\to\\infty \\;\\Rightarrow\\; V_{+}\\approx V_{-}', color: ACCENT });
    const eq4 = new Text({ text: 'Input impedance is very large — negligible input current', fontSize: 10, color: MUTED, fontUrl: FONT_URL });
    await Promise.all([eq1.waitForRender?.(), eq2.waitForRender?.(), eq3.waitForRender?.(), eq4.loadGlyphs?.()]);
    eq1.scale(0.55).moveTo([0, -2.2, 0]);
    eq2.scale(0.55).moveTo([0, -2.75, 0]);
    eq3.scale(0.55).moveTo([0, -3.25, 0]);
    eq4.moveTo([0, -3.7, 0]);

    // Sequence
    await scene.play(new Write(title, { duration: 0.6 }));
    for (const b of leftObjs) await scene.play(new FadeIn(b, { duration: 0.2 }));
    await scene.play(new Create(triangle));
    await scene.play(new FadeIn(inP), new FadeIn(inM), new FadeIn(out), new Write(pSym), new Write(mSym));
    for (const d of dashParts) scene.add(d);
    await scene.play(new FadeIn(vsLbl), ...dashParts.map(d => new Create(d, { duration: 0.25 })));
    await scene.play(new Write(IplusLbl), new Write(IminusLbl));
    for (const b of rightObjs) await scene.play(new FadeIn(b, { duration: 0.2 }));
    await scene.play(new Write(eq1));
    await scene.play(new Write(eq2));
    await scene.play(new Write(eq3));
    await scene.play(new FadeIn(eq4));
    await scene.wait(2);
  </script>
</body>
</html>
