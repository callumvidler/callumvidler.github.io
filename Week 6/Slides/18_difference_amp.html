<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 18 — Difference Amplifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    // Theme bridge:
    //   1. Priority: ?theme= URL param (presenter sets this when loading).
    //   2. Fallback: sessionStorage, preserved across the reload triggered
    //      by the module's themechange listener (theme.js always forces
    //      'light' at parse time, so we need our own persistence).
    // Also hides the per-slide toggle button when embedded in the presenter.
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">19 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
  </div>

  <script type="module">
    import {
      Scene, Polygon, Rectangle, Line, Circle, Text, MathTex, VGroup, Dot,
      Create, Write, FadeIn, FadeOut, MoveAlongPath,
      UP, DOWN, LEFT, RIGHT, WHITE, linear
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    const title = new Text({ text: 'Differential Amplifier', fontSize: 40, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    const bullets = [
      'Output amplifies V_b - V_a',
      'Zero common-mode gain needs matched resistors',
      'Choose R_a = R_c and R_b = R_d',
      'Use tight tolerance parts (typically +/-0.1%)'
    ];
    const bulletObjs = [];
    for (let i = 0; i < bullets.length; i++) {
      const b = new Text({ text: '•  ' + bullets[i], fontSize: 13, color: MUTED, fontUrl: FONT_URL });
      await b.loadGlyphs?.();
      b.moveTo([2.55, 1.7 - i * 0.34, 0]);
      bulletObjs.push(b);
    }

    const tri = new Polygon({
      vertices: [[0.5, -1.2, 0], [0.5, 1.2, 0], [2.2, 0, 0]],
      color: ACCENT, strokeWidth: 2, fillOpacity: 0
    });
    const pSym = new Text({ text: '+', fontSize: 18, color: ACCENT, fontUrl: FONT_URL }).moveTo([0.9, -0.45, 0]);
    const mSym = new Text({ text: '−', fontSize: 18, color: RED,    fontUrl: FONT_URL }).moveTo([0.9,  0.45, 0]);

    // V_a → R_a → inverting, R_b feedback
    const Va = new MathTex({ latex: 'V_{a}', color: BLUE });
    const Vb = new MathTex({ latex: 'V_{b}', color: MAG });
    await Va.waitForRender?.();
    await Vb.waitForRender?.();
    Va.scale(0.55).moveTo([-5.0,  0.6, 0]);
    Vb.scale(0.55).moveTo([-5.0, -0.6, 0]);

    const inA = new Line({ start: [-4.7,  0.6, 0], end: [0.5,  0.6, 0], color: FG });
    const inB = new Line({ start: [-4.7, -0.6, 0], end: [0.5, -0.6, 0], color: FG });
    const Ra  = new Rectangle({ width: 0.6, height: 0.25, color: ACCENT, strokeWidth: 2 });
    Ra.moveTo([-2.3, 0.6, 0]);
    const Rd  = new Rectangle({ width: 0.6, height: 0.25, color: ACCENT, strokeWidth: 2 });
    Rd.moveTo([-2.3, -0.6, 0]);
    const RaL = new MathTex({ latex: 'R_{a}', color: ACCENT });
    const RdL = new MathTex({ latex: 'R_{d}', color: ACCENT });

    // Feedback R_b (inverting)
    const fb1 = new Line({ start: [0.5, 0.6, 0], end: [0.5, 1.8, 0], color: FG });
    const fb2 = new Line({ start: [0.5, 1.8, 0], end: [3.0, 1.8, 0], color: FG });
    const fb3 = new Line({ start: [3.0, 1.8, 0], end: [3.0, 0, 0], color: FG });
    const Rb  = new Rectangle({ width: 0.6, height: 0.25, color: YELLOW, strokeWidth: 2 });
    Rb.moveTo([1.75, 1.8, 0]);
    const RbL = new MathTex({ latex: 'R_{b}', color: YELLOW });

    // R_c from +input to ground
    const RcLead = new Line({ start: [0.5, -0.6, 0], end: [0.5, -1.4, 0], color: FG });
    const Rc    = new Rectangle({ width: 0.6, height: 0.25, color: YELLOW, strokeWidth: 2 });
    Rc.rotate(Math.PI / 2);
    Rc.moveTo([0.5, -1.95, 0]);
    const RcL  = new MathTex({ latex: 'R_{c}', color: YELLOW });
    const RcG  = new Line({ start: [0.3, -2.5, 0], end: [0.7, -2.5, 0], color: FG, strokeWidth: 3 });

    await Promise.all([RaL.waitForRender?.(), RdL.waitForRender?.(), RbL.waitForRender?.(), RcL.waitForRender?.()]);
    RaL.scale(0.5).nextTo(Ra, UP, 0.1);
    RdL.scale(0.5).nextTo(Rd, DOWN, 0.1);
    RbL.scale(0.5).nextTo(Rb, UP, 0.1);
    RcL.scale(0.5).nextTo(Rc, RIGHT, 0.1);

    const outW = new Line({ start: [2.2, 0, 0], end: [4.0, 0, 0], color: FG });
    const Vo   = new MathTex({ latex: 'V_{o}', color: YELLOW });
    await Vo.waitForRender?.();
    Vo.scale(0.55).nextTo([4.0, 0, 0], RIGHT, 0.1);

    const eqn = new MathTex({ latex: 'V_o = \\dfrac{R_b}{R_a}\\,(V_b - V_a)', color: ACCENT });
    await eqn.waitForRender?.();
    eqn.scale(0.75).moveTo([-2, -3.1, 0]);

    // Sequence
    await scene.play(new Write(title, { duration: 0.7 }));
    await scene.play(
      new Create(tri), new Write(pSym), new Write(mSym),
      new Write(Va), new Write(Vb),
      new Create(inA), new Create(inB),
      new Create(Ra), new Create(Rd), new Write(RaL), new Write(RdL),
      new Create(fb1), new Create(fb2), new Create(fb3),
      new Create(Rb), new Write(RbL),
      new Create(RcLead), new Create(Rc), new Write(RcL), new Create(RcG),
      new Create(outW), new Write(Vo)
    );
    await scene.play(new Write(eqn));

    // Demo 1: identical signals → zero output
    const caption1 = new Text({ text: 'Identical inputs: output stays at 0', fontSize: 16, color: FG, fontUrl: FONT_URL });
    await caption1.loadGlyphs?.();
    caption1.moveTo([2.0, -3.1, 0]);
    await scene.play(new FadeIn(caption1));
    const d1 = new Dot({ point: [-4.7,  0.6, 0], color: RED, radius: 0.1 });
    const d2 = new Dot({ point: [-4.7, -0.6, 0], color: RED, radius: 0.1 });
    scene.add(d1, d2);
    await scene.play(
      new MoveAlongPath(d1, { path: new Line({ start: [-4.7, 0.6, 0], end: [0.5, 0.6, 0] }), duration: 1.1, rateFunc: linear }),
      new MoveAlongPath(d2, { path: new Line({ start: [-4.7, -0.6, 0], end: [0.5, -0.6, 0] }), duration: 1.1, rateFunc: linear })
    );
    await scene.wait(0.5);
    scene.remove(d1); scene.remove(d2); scene.remove(caption1);

    // Demo 2: differential signal → output
    const caption2 = new Text({ text: 'Differential inputs: amplified difference', fontSize: 16, color: ACCENT, fontUrl: FONT_URL });
    await caption2.loadGlyphs?.();
    caption2.moveTo([2.0, -3.1, 0]);
    await scene.play(new FadeIn(caption2));
    const d3 = new Dot({ point: [-4.7,  0.6, 0], color: BLUE, radius: 0.1 });
    const d4 = new Dot({ point: [-4.7, -0.6, 0], color: MAG, radius: 0.1 });
    scene.add(d3, d4);
    await scene.play(
      new MoveAlongPath(d3, { path: new Line({ start: [-4.7, 0.6, 0], end: [0.5, 0.6, 0] }), duration: 1.1, rateFunc: linear }),
      new MoveAlongPath(d4, { path: new Line({ start: [-4.7, -0.6, 0], end: [0.5, -0.6, 0] }), duration: 1.1, rateFunc: linear })
    );
    const outDot = new Dot({ point: [2.2, 0, 0], color: YELLOW, radius: 0.12 });
    scene.add(outDot);
    await scene.play(new MoveAlongPath(outDot, { path: new Line({ start: [2.2, 0, 0], end: [4.0, 0, 0] }), duration: 0.8, rateFunc: linear }));
    for (const b of bulletObjs) {
      await scene.play(new FadeIn(b, { duration: 0.2 }));
    }
    await scene.wait(2);
  </script>
</body>
</html>
