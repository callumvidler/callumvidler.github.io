<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 19 — Instrumentation Amplifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    // Theme bridge:
    //   1. Priority: ?theme= URL param (presenter sets this when loading).
    //   2. Fallback: sessionStorage, preserved across the reload triggered
    //      by the module's themechange listener (theme.js always forces
    //      'light' at parse time, so we need our own persistence).
    // Also hides the per-slide toggle button when embedded in the presenter.
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">20 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
  </div>

  <script type="module">
    import {
      Scene, Polygon, Rectangle, Line, Text, MathTex, VGroup, Dot,
      Create, Write, FadeIn, Indicate, MoveAlongPath,
      UP, DOWN, LEFT, RIGHT, WHITE, linear
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    const title = new Text({ text: 'Instrumentation Amplifier', fontSize: 40, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    const props = [
      'Very high input impedance and low output impedance',
      'High CMRR, low noise, low offset drift',
      'Gain set by one resistor R_gain',
      'A_v = 1 + 2R / R_gain'
    ];
    const propObjs = [];
    for (let i = 0; i < props.length; i++) {
      const p = new Text({ text: '•  ' + props[i], fontSize: 13, color: MUTED, fontUrl: FONT_URL });
      await p.loadGlyphs?.();
      p.moveTo([2.3, 1.85 - i * 0.34, 0]);
      propObjs.push(p);
    }

    const opamp = (cx, cy) => new Polygon({
      vertices: [[cx - 0.8, cy - 0.7, 0], [cx - 0.8, cy + 0.7, 0], [cx + 0.8, cy, 0]],
      color: ACCENT, strokeWidth: 2, fillOpacity: 0
    });

    const A1 = opamp(-1.8, 1.5);
    const A2 = opamp(-1.8, -1.5);
    const A3 = opamp( 2.6, 0);

    // Input leads
    const inTop = new Line({ start: [-5, 1.8, 0], end: [-2.6, 1.8, 0], color: FG });
    const inBot = new Line({ start: [-5, -1.8, 0], end: [-2.6, -1.8, 0], color: FG });
    const vaLbl = new MathTex({ latex: 'V_{a}', color: BLUE });
    const vbLbl = new MathTex({ latex: 'V_{b}', color: MAG });
    await Promise.all([vaLbl.waitForRender?.(), vbLbl.waitForRender?.()]);
    vaLbl.scale(0.55).moveTo([-5.2, 1.8, 0]);
    vbLbl.scale(0.55).moveTo([-5.2, -1.8, 0]);

    // Buffer feedback + R_gain
    const fb1a = new Line({ start: [-1.0, 1.5, 0], end: [-1.0, 2.4, 0], color: FG });
    const fb1b = new Line({ start: [-1.0, 2.4, 0], end: [-2.6, 2.4, 0], color: FG });
    const fb1c = new Line({ start: [-2.6, 2.4, 0], end: [-2.6, 1.2, 0], color: FG });
    const R1  = new Rectangle({ width: 0.5, height: 0.2, color: ACCENT, strokeWidth: 2 });
    R1.moveTo([-1.8, 2.4, 0]);
    const R1L = new MathTex({ latex: 'R', color: ACCENT });

    const fb2a = new Line({ start: [-1.0, -1.5, 0], end: [-1.0, -2.4, 0], color: FG });
    const fb2b = new Line({ start: [-1.0, -2.4, 0], end: [-2.6, -2.4, 0], color: FG });
    const fb2c = new Line({ start: [-2.6, -2.4, 0], end: [-2.6, -1.2, 0], color: FG });
    const R2  = new Rectangle({ width: 0.5, height: 0.2, color: ACCENT, strokeWidth: 2 });
    R2.moveTo([-1.8, -2.4, 0]);
    const R2L = new MathTex({ latex: 'R', color: ACCENT });

    // R_gain connecting the two inverting inputs (−) nodes at (-2.6, 1.2) to (-2.6, -1.2)
    const Rg = new Rectangle({ width: 0.2, height: 1.0, color: YELLOW, strokeWidth: 2 });
    Rg.moveTo([-2.6, 0.0, 0]);
    const RgL = new MathTex({ latex: 'R_{gain}', color: YELLOW });

    // Buffer outputs → difference amp
    const out1 = new Line({ start: [-1.0, 1.5, 0], end: [1.0, 1.5, 0], color: FG });
    const diffIn1 = new Line({ start: [1.0, 1.5, 0], end: [1.8, 0.3, 0], color: FG });
    const out2 = new Line({ start: [-1.0, -1.5, 0], end: [1.0, -1.5, 0], color: FG });
    const diffIn2 = new Line({ start: [1.0, -1.5, 0], end: [1.8, -0.3, 0], color: FG });

    // Diff amp output
    const finalOut = new Line({ start: [3.4, 0, 0], end: [5.0, 0, 0], color: FG });
    const outLbl = new MathTex({ latex: 'V_{out}', color: YELLOW });
    await outLbl.waitForRender?.();
    outLbl.scale(0.55).nextTo([5.0, 0, 0], RIGHT, 0.1);

    const eqn = new MathTex({ latex: 'A_v = 1 + \\dfrac{2R}{R_{gain}}', color: ACCENT });
    await eqn.waitForRender?.();
    eqn.scale(0.75).moveTo([2.3, -3.0, 0]);

    await Promise.all([R1L.waitForRender?.(), R2L.waitForRender?.(), RgL.waitForRender?.()]);
    R1L.scale(0.45).nextTo(R1, UP, 0.05);
    R2L.scale(0.45).nextTo(R2, DOWN, 0.05);
    RgL.scale(0.5).nextTo(Rg, LEFT, 0.1);

    // Sequence
    await scene.play(new Write(title, { duration: 0.7 }));
    await scene.play(new Create(A1), new Create(A2), new Create(A3));
    await scene.play(
      new Create(inTop), new Create(inBot),
      new Write(vaLbl), new Write(vbLbl),
      new Create(fb1a), new Create(fb1b), new Create(fb1c),
      new Create(fb2a), new Create(fb2b), new Create(fb2c),
      new Create(R1), new Create(R2), new Write(R1L), new Write(R2L),
      new Create(Rg), new Write(RgL)
    );
    await scene.play(
      new Create(out1), new Create(diffIn1),
      new Create(out2), new Create(diffIn2),
      new Create(finalOut), new Write(outLbl)
    );
    await scene.play(new Write(eqn));

    // Symmetric signal dots
    const da = new Dot({ point: [-5, 1.8, 0], color: BLUE, radius: 0.1 });
    const db = new Dot({ point: [-5, -1.8, 0], color: MAG, radius: 0.1 });
    scene.add(da, db);
    const pa = new Line({ start: [-5, 1.8, 0], end: [1.8, 0.3, 0] });
    const pb = new Line({ start: [-5, -1.8, 0], end: [1.8, -0.3, 0] });
    await scene.play(
      new MoveAlongPath(da, { path: pa, duration: 1.6, rateFunc: linear }),
      new MoveAlongPath(db, { path: pb, duration: 1.6, rateFunc: linear })
    );
    await scene.play(new Indicate(Rg));
    for (const p of propObjs) {
      await scene.play(new FadeIn(p, { duration: 0.2 }));
    }
    await scene.wait(2);
  </script>
</body>
</html>
