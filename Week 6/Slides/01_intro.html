<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 1 — Op-Amp Introduction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
        : (ss === 'dark' || ss === 'light') ? ss
          : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
</head>

<body class="slide">
  <header class="slide-header">
    <span class="slide-num">02 / 19</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
  </div>

  <script type="module">
    import {
      Scene, Polygon, Line, Circle, Arrow, Text, MathTex, Brace, VGroup,
      Create, Write, FadeIn, GrowFromCenter,
      UP, DOWN, LEFT, RIGHT, ORIGIN,
      WHITE, BLACK
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ── Title ──
    const title = new Text({ text: 'Operational Amplifiers (Op-Amps)', fontSize: 40, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    // ── Bullet points (right side) ──
    const bulletTexts = [
      'Voltage-controlled voltage source',
      'Differential input',
      'Single-ended output',
      'Very large voltage gain'
    ];
    const bullets = [];
    for (let i = 0; i < bulletTexts.length; i++) {
      const b = new Text({ text: '•  ' + bulletTexts[i], fontSize: 25, color: MUTED, fontUrl: FONT_URL });
      await b.loadGlyphs?.();
      const BULLET_LEFT_X = 2.6;
      b.moveTo([BULLET_LEFT_X, 1.9 - i * 0.55, 0]);
      b.shift([BULLET_LEFT_X - b.getLeft()[0], 0, 0]);
      // Left-align by shifting right based on width (fallback: center-ish)
      bullets.push(b);
    }
    const gainDetail = new MathTex({ latex: 'A_{OL} \\gtrsim 10^{5}', color: ACCENT });
    await gainDetail.waitForRender?.();
    gainDetail.scale(0.55).moveTo([4.6, 1.9 - 4 * 0.55, 0]);

    // ── Op-amp triangle (left) ──
    const cx = -2, cy = 0;
    const OP_HALF_W = 1.9;
    const OP_HALF_H = 1.7;
    const INPUT_Y = 0.8;
    const INPUT_EXT = 0.75;
    const OUTPUT_EXT = 1.0;
    const RAIL_INSET = 1.1;
    const RAIL_EXT = 0.75;
    const RAIL_SEG = 0.12;
    const RAIL_GAP = 0.08;
    const RAIL_COLOR = MUTED2;
    function makeVerticalDottedRail(x, yStart, yEnd, color) {
      const parts = [];
      const dir = Math.sign(yEnd - yStart) || 1;
      let y = yStart;
      while ((dir > 0 && y < yEnd) || (dir < 0 && y > yEnd)) {
        const yNext = dir > 0 ? Math.min(y + RAIL_SEG, yEnd) : Math.max(y - RAIL_SEG, yEnd);
        parts.push(new Line({ start: [x, y, 0], end: [x, yNext, 0], color, strokeWidth: 2 }));
        y = dir > 0 ? yNext + RAIL_GAP : yNext - RAIL_GAP;
      }
      return new VGroup(...parts);
    }
    const triangle = new Polygon({
      vertices: [[cx - OP_HALF_W, cy - OP_HALF_H, 0], [cx - OP_HALF_W, cy + OP_HALF_H, 0], [cx + OP_HALF_W, cy, 0]],
      color: ACCENT, strokeWidth: 3, fillOpacity: 0.1
    });

    // ── Input wires and labels ──
    const inPlus = new Line({ start: [cx - OP_HALF_W - INPUT_EXT, cy + INPUT_Y, 0], end: [cx - OP_HALF_W, cy + INPUT_Y, 0], color: FG });
    const inMinus = new Line({ start: [cx - OP_HALF_W - INPUT_EXT, cy - INPUT_Y, 0], end: [cx - OP_HALF_W, cy - INPUT_Y, 0], color: FG });
    const outLine = new Line({ start: [cx + OP_HALF_W, cy, 0], end: [cx + OP_HALF_W + OUTPUT_EXT, cy, 0], color: FG });

    const plusSym = new Text({ text: '+', fontSize: 28, color: RED, fontUrl: FONT_URL }).moveTo([cx - OP_HALF_W + 0.25, cy + INPUT_Y, 0]);
    const minusSym = new Text({ text: '−', fontSize: 28, color: BLUE, fontUrl: FONT_URL }).moveTo([cx - OP_HALF_W + 0.25, cy - INPUT_Y, 0]);

    const vPlusLabel = new MathTex({ latex: 'V_{+}', color: FG , fontSize: 50});
    const vMinusLabel = new MathTex({ latex: 'V_{-}', color: FG, fontSize: 50});
    const voutLabel = new MathTex({ latex: 'V_{out}', color: BLACK, fontSize: 50});
    const inPlusPort = new Circle({ radius: 0.06, color: FG, strokeWidth: 2, fillOpacity: 1 }).moveTo(inPlus.getStart());
    const inMinusPort = new Circle({ radius: 0.06, color: FG, strokeWidth: 2, fillOpacity: 1 }).moveTo(inMinus.getStart());
    const outPort = new Circle({ radius: 0.06, color: FG, strokeWidth: 2, fillOpacity: 1 }).moveTo(outLine.getEnd());

    // ── Supply rails ──
    const vsPlusStart = [cx, cy + RAIL_INSET, 0];
    const vsPlusEnd = [cx, cy + RAIL_INSET + RAIL_EXT, 0];
    const vsMinusStart = [cx, cy - RAIL_INSET, 0];
    const vsMinusEnd = [cx, cy - RAIL_INSET - RAIL_EXT, 0];
    const vsPlus = makeVerticalDottedRail(cx, vsPlusStart[1], vsPlusEnd[1], RAIL_COLOR);
    const vsMinus = makeVerticalDottedRail(cx, vsMinusStart[1], vsMinusEnd[1], RAIL_COLOR);
    const vsPlusLabel = new MathTex({ latex: 'V_{S +}', color: RAIL_COLOR, fontSize: 52 });
    const vsMinusLabel = new MathTex({ latex: 'V_{S -}', color: RAIL_COLOR, fontSize: 52 });

    // ── Equation ──
    const eqn = new MathTex({
      latex: 'V_{out} = A_{OL}\\,(V_{+} - V_{-})',
      color: FG
    });


    // Wait for glyphs/renders
    await Promise.all([
      plusSym.loadGlyphs?.(),
      minusSym.loadGlyphs?.(),
      vPlusLabel.waitForRender?.(),
      vMinusLabel.waitForRender?.(),
      voutLabel.waitForRender?.(),
      vsPlusLabel.waitForRender?.(),
      vsMinusLabel.waitForRender?.(),
      eqn.waitForRender?.()
    ]);

    vPlusLabel.scale(0.55).nextTo(inPlus.getStart(), LEFT, 0.15);
    vMinusLabel.scale(0.55).nextTo(inMinus.getStart(), LEFT, 0.15);
    voutLabel.scale(0.55).nextTo(outLine.getEnd(), RIGHT, 0.15);
    vsPlusLabel.scale(0.5).nextTo(vsPlusEnd, UP, 0.1);
    vsMinusLabel.scale(0.5).nextTo(vsMinusEnd, DOWN, 0.1);

    eqn.scale(0.7).moveTo([4.5, -2, 0]);

    // ── Underbrace for V_in ──
    const vInBraceLine = new Line({ start: [4.6, -2.3, 0], end: [6.4, -2.3, 0], color: ACCENT, strokeWidth: 1.5 });
    const vInTickL = new Line({ start: [4.6, -2.3, 0], end: [4.6, -2.2, 0], color: ACCENT, strokeWidth: 1.5 });
    const vInTickR = new Line({ start: [6.4, -2.3, 0], end: [6.4, -2.2, 0], color: ACCENT, strokeWidth: 1.5 });
    const vInLabel = new MathTex({ latex: 'V_{in}', color: ACCENT });
    //await vInLabel.waitForRender?.();
    vInLabel.scale(0.6).moveTo([5.5, -2.6, 0]);

    // ── Animation sequence ──
    await scene.play(new Write(title, { duration: 0.8 }));
    await scene.play(new Create(triangle, { duration: 0.5 }));
    await scene.play(
      new FadeIn(inPlus),
      new Write(plusSym),
      new FadeIn(inMinus),
      new FadeIn(outLine),
      new FadeIn(inPlusPort),
      new FadeIn(inMinusPort),
      new FadeIn(outPort),
      new Write(minusSym, { duration: 0.1 })
    );
    await scene.play(
      new Write(vPlusLabel),
      new Write(vMinusLabel),
      new Write(voutLabel)
    );
    await scene.wait(0.3);

    await scene.play(
      new FadeIn(vsPlus),
      new FadeIn(vsMinus),
      new Write(vsPlusLabel),
      new Write(vsMinusLabel)
    );
    await scene.wait(0.2);

    // Bullets fade in one by one
    for (const b of bullets) {
      await scene.play(new FadeIn(b, { duration: 0.25 }));
    }
    await scene.play(new FadeIn(gainDetail, { duration: 0.3 }));
    await scene.wait(0.3);

    await scene.play(new Write(eqn));
    await scene.play(
      new Create(vInBraceLine),
      new Create(vInTickL),
      new Create(vInTickR)
    );
    await scene.play(new FadeIn(vInLabel, { shift: [0, 0.3, 0] }));
    await scene.wait(2);
  </script>
</body>

</html>
