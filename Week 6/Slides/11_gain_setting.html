<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 11 — Setting Gain Using Negative Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">12 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
  </div>

  <script type="module">
    import {
      Scene, Line, Rectangle, MathTex, Text, VGroup, Dot,
      Create, Write, FadeIn,
      UP, DOWN, LEFT, RIGHT, WHITE
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ── Title ──
    const title = new Text({ text: 'Setting the Gain Using Negative Feedback', fontSize: 40, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    // ── Boxed equation (top-right) ──
    const eqnBox = new Rectangle({ width: 3.4, height: 0.8, color: ACCENT, strokeWidth: 2, fillOpacity: 0.08 });
    eqnBox.moveTo([4.6, 2.8, 0]);
    const eqnBoxed = new MathTex({ latex: 'A_{CL} = \\dfrac{A_{OL}}{1 + A_{OL}\\,\\beta}', color: ACCENT });
    await eqnBoxed.waitForRender?.();
    eqnBoxed.scale(0.55).moveTo([4.6, 2.8, 0]);

    // ── Bullet list (left side) ──
    const bullets = [
      'Negative feedback sets the gain with minimal dependence on A_OL',
      'No need to consider device variation in the open-loop gain'
    ];
    const bulletObjs = [];
    for (let i = 0; i < bullets.length; i++) {
      const b = new Text({ text: '•  ' + bullets[i], fontSize: 12, color: MUTED, fontUrl: FONT_URL });
      await b.loadGlyphs?.();
      b.moveTo([-5.4, 2.8 - i * 0.45, 0]);
      bulletObjs.push(b);
    }

    // ── Plot ──
    const x0 = -4.8, x1 = 3.4, y0 = -2.4, y1 = 1.9;
    const xAxis = new Line({ start: [x0, y0, 0], end: [x1, y0, 0], color: MUTED });
    const yAxis = new Line({ start: [x0, y0, 0], end: [x0, y1, 0], color: MUTED });
    const xL = new Text({ text: 'Open-loop voltage gain magnitude (V/V)', fontSize: 10, color: FG, fontUrl: FONT_URL });
    const yL = new Text({ text: 'Closed-loop voltage gain magnitude (V/V)', fontSize: 9, color: FG, fontUrl: FONT_URL });
    await Promise.all([xL.loadGlyphs?.(), yL.loadGlyphs?.()]);
    xL.moveTo([(x0 + x1) / 2, y0 - 0.35, 0]);
    yL.rotate(Math.PI / 2).moveTo([x0 - 0.3, (y0 + y1) / 2, 0]);

    // Curves
    const mkCurve = (G, color) => {
      const beta = 1 / G;
      const pts = [];
      const N = 60;
      for (let i = 0; i <= N; i++) {
        const logA = (i / N) * 6;
        const A = Math.pow(10, logA);
        const ACL = A / (1 + A * beta);
        const logCL = Math.log10(Math.max(ACL, 1e-3));
        const xPix = x0 + (logA / 6) * (x1 - x0);
        const yPix = y0 + (logCL / 4) * (y1 - y0);
        pts.push([xPix, yPix, 0]);
      }
      const lines = [];
      for (let i = 1; i < pts.length; i++)
        lines.push(new Line({ start: pts[i - 1], end: pts[i], color, strokeWidth: 3 }));
      return new VGroup(...lines);
    };

    const c10   = mkCurve(10,   BLUE);
    const c100  = mkCurve(100,  ACCENT);
    const c1000 = mkCurve(1000, MAG);

    // Legend (right of plot)
    const lbl10   = new Text({ text: 'Desired gain: 10',   fontSize: 10, color: BLUE,   fontUrl: FONT_URL });
    const lbl100  = new Text({ text: 'Desired gain: 100',  fontSize: 10, color: ACCENT, fontUrl: FONT_URL });
    const lbl1000 = new Text({ text: 'Desired gain: 1000', fontSize: 10, color: MAG,    fontUrl: FONT_URL });
    await Promise.all([lbl10.loadGlyphs?.(), lbl100.loadGlyphs?.(), lbl1000.loadGlyphs?.()]);
    lbl10.moveTo([4.5, -0.9, 0]);
    lbl100.moveTo([4.5, -1.3, 0]);
    lbl1000.moveTo([4.5, -1.7, 0]);

    // Caption
    const caption = new Text({ text: 'Large A_OL makes A_CL robust.', fontSize: 20, color: YELLOW, fontUrl: FONT_URL });
    await caption.loadGlyphs?.();
    caption.moveTo([4.6, 0.5, 0]);

    // ── Sequence ──
    await scene.play(new Write(title, { duration: 0.6 }));
    await scene.play(new Create(eqnBox), new Write(eqnBoxed));
    for (const b of bulletObjs) {
      await scene.play(new FadeIn(b, { duration: 0.25 }));
    }
    await scene.play(new Create(xAxis), new Create(yAxis), new Write(xL), new Write(yL));
    await scene.play(new Create(c10,   { duration: 1.0, lagRatio: 0.02 }), new FadeIn(lbl10));
    await scene.play(new Create(c100,  { duration: 1.0, lagRatio: 0.02 }), new FadeIn(lbl100));
    await scene.play(new Create(c1000, { duration: 1.0, lagRatio: 0.02 }), new FadeIn(lbl1000));
    await scene.play(new FadeIn(caption, { shift: [0, -0.2, 0] }));
    await scene.wait(2);
  </script>
</body>
</html>
