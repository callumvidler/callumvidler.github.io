<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 14: Input Offset Voltage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
        : (ss === 'dark' || ss === 'light') ? ss
          : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
  <style>
    /* ───────── SVG overlay (V_out bar) ───────── */
    #trace-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease-out;
    }

    #trace-overlay .bar-rail {
      fill: none;
      stroke: #6a6a72;
      stroke-width: 1.5;
    }

    [data-theme="dark"] #trace-overlay .bar-rail {
      stroke: #8892a4;
    }

    #trace-overlay .tick {
      stroke: #6a6a72;
      stroke-width: 1.4;
    }

    [data-theme="dark"] #trace-overlay .tick {
      stroke: #8892a4;
    }

    #trace-overlay .axis-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-style: italic;
      fill: #6a6a72;
      font-size: 18px;
    }

    [data-theme="dark"] #trace-overlay .axis-label {
      fill: #8892a4;
    }

    #trace-overlay .tick-label {
      font-family: 'IBM Plex Mono', monospace;
      fill: #6a6a72;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    [data-theme="dark"] #trace-overlay .tick-label {
      fill: #8892a4;
    }

    #trace-overlay .vout-bar {
      fill: #3d8b6e;
      transition: fill 0.15s;
    }

    [data-theme="dark"] #trace-overlay .vout-bar {
      fill: #6aaa8e;
    }

    #trace-overlay .vout-bar.sat {
      fill: #c74034;
    }

    [data-theme="dark"] #trace-overlay .vout-bar.sat {
      fill: #e06050;
    }

    #trace-overlay .readout {
      font-family: 'IBM Plex Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 18px;
      fill: #1a1a1e;
    }

    [data-theme="dark"] #trace-overlay .readout {
      fill: #e2e8f0;
    }

    #trace-overlay .sat-tag {
      fill: #c74034;
    }

    [data-theme="dark"] #trace-overlay .sat-tag {
      fill: #e06050;
    }

    /* Phase gating of overlay */
    #stage[data-stage="1"] #trace-overlay {
      opacity: 0;
    }

    #stage[data-stage="2"] #trace-overlay,
    #stage[data-stage="3"] #trace-overlay {
      opacity: 1;
    }

    /* ───────── Control panel (sliders) ───────── */
    #ctrl-panel {
      position: absolute;
      left: 56%;
      bottom: 12%;
      width: 34%;
      padding: 10px 14px 11px 14px;
      background: rgba(125, 125, 135, 0.09);
      border: 1px solid rgba(125, 125, 135, 0.28);
      border-radius: 7px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      color: inherit;
      opacity: 0;
      transition: opacity 0.5s ease-out;
      box-sizing: border-box;
      z-index: 6;
    }

    #ctrl-panel .slider-row {
      display: grid;
      grid-template-columns: 38px 1fr 64px;
      align-items: center;
      gap: 10px;
      margin: 3px 0;
    }

    #ctrl-panel .lbl {
      font-weight: 600;
      font-size: 12px;
      font-style: italic;
      color: #3d8b6e;
    }

    [data-theme="dark"] #ctrl-panel .lbl,
    [data-theme="dark"] #ctrl-panel .formula-line {
      color: #6aaa8e;
    }

    #ctrl-panel .val {
      text-align: right;
      font-variant-numeric: tabular-nums;
      opacity: 0.85;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }

    #ctrl-panel input[type=range] {
      width: 100%;
      accent-color: #3d8b6e;
      margin: 0;
    }

    [data-theme="dark"] #ctrl-panel input[type=range] {
      accent-color: #6aaa8e;
    }

    #ctrl-panel .formula-line {
      margin-top: 6px;
      padding-top: 5px;
      border-top: 1px solid rgba(125, 125, 135, 0.22);
      font-size: 11px;
      font-weight: 500;
      color: #3d8b6e;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-style: italic;
    }

    #stage[data-stage="2"] #ctrl-panel {
      opacity: 1;
      pointer-events: auto;
    }

    #stage[data-stage="3"] #ctrl-panel {
      opacity: 0.35;
      pointer-events: none;
    }

    /* ───────── Phase headline (top-right of stage) ───────── */
    .phase-headline {
      position: absolute;
      top: 16px;
      right: 18px;
      z-index: 5;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--slide-text-dim);
      pointer-events: none;
    }

    .phase-headline .ph-num {
      color: var(--slide-accent);
      font-weight: 600;
      margin-right: 8px;
    }

    /* ───────── Active stepper button ───────── */
    .stepper-btn.active {
      color: var(--slide-accent);
      border-color: var(--slide-accent);
      background: rgba(106, 170, 142, 0.12);
    }

    /* ───────── Phase-3 overlay (hit area over the manim-drawn pot) ───────── */
    #phase3-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease-out;
    }

    #stage[data-stage="3"] #phase3-overlay {
      opacity: 1;
    }

    #stage[data-stage="3"] #phase3-overlay .pot-hit {
      pointer-events: auto;
    }

    #phase3-overlay .pot-hit {
      fill: transparent;
      stroke: none;
      cursor: grab;
    }

    #phase3-overlay .pot-hit:active {
      cursor: grabbing;
    }
  </style>
</head>

<body class="slide">
  <header class="slide-header">
    <span class="slide-num">13 / 19</span>
  </header>

  <div id="stage" class="manim-stage" data-stage="1">
    <div class="stage-fallback">Loading manim-web scene…</div>

    <div class="phase-headline" id="phase-headline">
      <span class="ph-num">01</span><span id="phase-title">Cause: transistor mismatch</span>
    </div>

    <svg id="trace-overlay" viewBox="0 0 1280 720" preserveAspectRatio="none">
      <text class="axis-label" x="900" y="416" text-anchor="middle">V<tspan dy="4" font-size="13">out</tspan></text>
      <rect class="bar-rail" x="720" y="438" width="360" height="22" rx="3" />
      <line class="tick" x1="720" y1="436" x2="720" y2="468" />
      <line class="tick" x1="900" y1="436" x2="900" y2="468" />
      <line class="tick" x1="1080" y1="436" x2="1080" y2="468" />
      <text class="tick-label" x="720" y="488" text-anchor="middle">−12 V</text>
      <text class="tick-label" x="900" y="488" text-anchor="middle">0</text>
      <text class="tick-label" x="1080" y="488" text-anchor="middle">+12 V</text>
      <rect id="vout-bar" class="vout-bar" x="900" y="440" width="0" height="18" rx="2" />
      <text class="readout" id="vout-readout" x="900" y="526" text-anchor="middle">V<tspan dy="3" font-size="13">out
        </tspan>
        <tspan dy="-3"> = +0.0 mV</tspan>
      </text>
    </svg>

    <svg id="phase3-overlay" viewBox="0 0 1280 720" preserveAspectRatio="none">
      <!-- Transparent hit area over the manim-drawn pot; sized generously so
           slight coordinate-mapping drift still lets the user grab the wiper. -->
      <circle class="pot-hit" id="pot-hit" cx="505" cy="522" r="56" />
    </svg>

    <div id="ctrl-panel">
      <div class="slider-row">
        <span class="lbl">V<sub>os</sub></span>
        <input type="range" id="vos-slider" min="-5" max="5" step="0.1" value="2">
        <span class="val" id="vos-val">+2.0 mV</span>
      </div>
      <div class="slider-row">
        <span class="lbl">Gain</span>
        <input type="range" id="gain-slider" min="1" max="101" step="1" value="11">
        <span class="val" id="gain-val">11×</span>
      </div>
      <div class="formula-line">V<sub>out</sub> = V<sub>os</sub> · (1 + R₂ / R₁)</div>
    </div>

    <div class="stepper-row">
      <button class="stepper-btn active" data-phase="1">1 · Cause</button>
      <button class="stepper-btn" data-phase="2">2 · Model</button>
      <button class="stepper-btn" data-phase="3">3 · Trim</button>
    </div>
  </div>

  <script type="module">
    import {
      Scene, Arc, Polygon, Rectangle, Line, Circle, Dot, Text, MathTex,
      Create, Write, FadeIn, FadeOut, Transform,
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ─────────────────────────────────────────────────────────────────
    // Title (persistent across all phases)
    // ─────────────────────────────────────────────────────────────────
    const title = new Text({ text: 'DC Imperfection: Input Offset Voltage', fontSize: 34, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    // =================================================================
    // PHASE 1 — Cause: op-amp package (LHS) with a circular callout (RHS)
    // zooming into an accurately drawn NPN input differential pair.
    // =================================================================

    // Helper: build a filled-triangle arrowhead tangent to a direction vector.
    function arrowTriangle(tipX, tipY, dirX, dirY, color) {
      const mag = Math.hypot(dirX, dirY) || 1;
      const ux = dirX / mag, uy = dirY / mag;          // forward (outward) unit
      const bx = -ux, by = -uy;                 // back unit
      const px = -uy, py = ux;                 // perpendicular (CCW 90°)
      const len = 0.14;                                // arrow length
      const hw = 0.065;                               // arrow half-width at the base
      const bcX = tipX + bx * len;
      const bcY = tipY + by * len;
      return new Polygon({
        vertices: [
          [tipX, tipY, 0],
          [bcX + px * hw, bcY + py * hw, 0],
          [bcX - px * hw, bcY - py * hw, 0]
        ],
        color, strokeWidth: 1.4, fillOpacity: 0.9
      });
    }

    // ── LHS: the op-amp package ────────────────────────────────────
    const OP_CX = -4.2, OP_CY = 0.0;
    const OP_HH = 0.85;
    const opBackX = OP_CX - 0.65;  // -4.85
    const opApexX = OP_CX + 0.78;  // -3.42
    const opTri = new Polygon({
      vertices: [
        [opBackX, OP_CY - OP_HH, 0],
        [opBackX, OP_CY + OP_HH, 0],
        [opApexX, OP_CY, 0]
      ],
      color: ACCENT, strokeWidth: 2, fillOpacity: 0.06
    });
    const opPlus = new Text({ text: '+', fontSize: 18, color: ACCENT, fontUrl: FONT_URL });
    const opMinus = new Text({ text: '−', fontSize: 18, color: RED, fontUrl: FONT_URL });
    await Promise.all([opPlus.loadGlyphs?.(), opMinus.loadGlyphs?.()]);
    opPlus.moveTo([opBackX + 0.22, OP_CY + 0.36, 0]);
    opMinus.moveTo([opBackX + 0.22, OP_CY - 0.36, 0]);

    // Op-amp input and output stubs + labels
    const opInPlusStub = new Line({ start: [opBackX - 0.65, OP_CY + 0.42, 0], end: [opBackX, OP_CY + 0.42, 0], color: ACCENT, strokeWidth: 1.8 });
    const opInMinusStub = new Line({ start: [opBackX - 0.65, OP_CY - 0.42, 0], end: [opBackX, OP_CY - 0.42, 0], color: RED, strokeWidth: 1.8 });
    const opInPlusLbl = new MathTex({ latex: 'v_{+}', color: ACCENT });
    const opInMinusLbl = new MathTex({ latex: 'v_{-}', color: RED });
    await Promise.all([opInPlusLbl.waitForRender?.(), opInMinusLbl.waitForRender?.()]);
    opInPlusLbl.scale(0.55).moveTo([opBackX - 0.85, OP_CY + 0.42, 0]);
    opInMinusLbl.scale(0.55).moveTo([opBackX - 0.85, OP_CY - 0.42, 0]);

    const opOutStub = new Line({ start: [opApexX, OP_CY, 0], end: [opApexX + 0.50, OP_CY, 0], color: BLUE, strokeWidth: 1.8 });
    const opOutLbl = new MathTex({ latex: 'v_{out}', color: BLUE });
    await opOutLbl.waitForRender?.();
    opOutLbl.scale(0.55).moveTo([opApexX + 0.80, OP_CY, 0]);

    const opPartLbl = new Text({ text: 'LM741', fontSize: 12, color: MUTED, fontUrl: FONT_URL });
    await opPartLbl.loadGlyphs?.();
    opPartLbl.moveTo([OP_CX + 0.05, OP_CY + OP_HH + 0.25, 0]);

    // ── Highlight circle hugging the op-amp input region ──────────
    const HL_CX = -4.4, HL_CY = 0.0, HL_R = 0.2;
    const highlightCircle = new Circle({ radius: HL_R, color: MUTED, strokeWidth: 1.2, fillOpacity: 0 });
    highlightCircle.moveTo([HL_CX, HL_CY, 0]);

    // ── Circular callout (centre-left) ───────────────────────────
    // Positioned and sized so the diff pair fits snugly inside while
    // leaving room to the right for the larger LaTeX caption column.
    const CO_CX = 0.0, CO_CY = 0.0, CO_R = 1.85;
    const callout = new Circle({ radius: CO_R, color: MUTED, strokeWidth: 2, fillOpacity: 0.025 });
    callout.moveTo([CO_CX, CO_CY, 0]);
    const calloutLbl = new Text({ text: 'input differential pair', fontSize: 16, color: MUTED, fontUrl: FONT_URL });
    await calloutLbl.loadGlyphs?.();
    calloutLbl.moveTo([CO_CX, CO_CY + CO_R + 0.35, 0]);

    // External tangent lines (zoom cone) — geometry for two unequal circles
    // whose centres lie on the x-axis.
    const d_cc = Math.hypot(CO_CX - HL_CX, CO_CY - HL_CY);
    const sinTh = (CO_R - HL_R) / d_cc;
    const cosTh = Math.sqrt(Math.max(0, 1 - sinTh * sinTh));
    const zoomLineU = new Line({
      start: [HL_CX - HL_R * sinTh, HL_CY + HL_R * cosTh, 0],
      end: [CO_CX - CO_R * sinTh, CO_CY + CO_R * cosTh, 0],
      color: MUTED2, strokeWidth: 1.2
    });
    const zoomLineL = new Line({
      start: [HL_CX - HL_R * sinTh, HL_CY - HL_R * cosTh, 0],
      end: [CO_CX - CO_R * sinTh, CO_CY - CO_R * cosTh, 0],
      color: MUTED2, strokeWidth: 1.2
    });

    // ── Inside the callout: accurate NPN differential pair ───────
    const V_CC_Y = 1.50;
    const BASE_Y = 0.30;
    const STRAP_H = 0.40;
    const Q1X = -0.45;           // left transistor strap x
    const Q2X = 0.45;            // right transistor strap x (mirrored)
    const PAIR_CX = (Q1X + Q2X) / 2; // 1.50 — common emitter / tail / ground axis
    const WING_DX = 0.23;
    const WING_DY = 0.23;
    const Q1_WING_X = Q1X + WING_DX;   // 1.28
    const Q2_WING_X = Q2X - WING_DX;   // 1.72
    const EMIT_JY = -0.65;           // joined-emitter rail y
    const TAIL_Y = -1.05;
    const TAIL_R = 0.16;
    const P1_GND_Y = -1.45;

    // V_CC rail + label (label sits directly above the centre of the rail)
    const vccRail = new Line({ start: [-1.05, V_CC_Y, 0], end: [1.05, V_CC_Y, 0], color: MUTED, strokeWidth: 1.8 });
    const vccLbl = new MathTex({ latex: 'V_{CC}', color: MUTED });
    await vccLbl.waitForRender?.();
    vccLbl.scale(0.55).moveTo([PAIR_CX, V_CC_Y + 0.22, 0]);

    // Collector load resistors (box style)
    const R_W = 0.18, R_H = 0.30;
    const rC1Rect = new Rectangle({ width: R_W, height: R_H, color: ACCENT, strokeWidth: 1.8, fillOpacity: 0.22 });
    rC1Rect.moveTo([Q1_WING_X, 1.17, 0]);
    const rC2Rect = new Rectangle({ width: R_W, height: R_H, color: RED, strokeWidth: 1.8, fillOpacity: 0.22 });
    rC2Rect.moveTo([Q2_WING_X, 1.17, 0]);
    const rC1TopWire = new Line({ start: [Q1_WING_X, V_CC_Y, 0], end: [Q1_WING_X, 1.32, 0], color: MUTED, strokeWidth: 1.6 });
    const rC2TopWire = new Line({ start: [Q2_WING_X, V_CC_Y, 0], end: [Q2_WING_X, 1.32, 0], color: MUTED, strokeWidth: 1.6 });
    const rC1Lbl = new MathTex({ latex: 'R_{C}', color: ACCENT });
    const rC2Lbl = new MathTex({ latex: 'R_{C}', color: RED });
    await Promise.all([rC1Lbl.waitForRender?.(), rC2Lbl.waitForRender?.()]);
    rC1Lbl.scale(0.48).moveTo([Q1_WING_X - 0.40, 1.17, 0]);
    rC2Lbl.scale(0.48).moveTo([Q2_WING_X + 0.40, 1.17, 0]);

    // Q1 (NPN, left; base enters strap from the left, emitter arrow points outward-down-right)
    const strapTopY = BASE_Y + STRAP_H / 2;   //  0.50
    const strapBotY = BASE_Y - STRAP_H / 2;   //  0.10
    const q1Strap = new Line({ start: [Q1X, strapBotY, 0], end: [Q1X, strapTopY, 0], color: ACCENT, strokeWidth: 2.6 });
    const q1Base = new Line({ start: [-1.00, BASE_Y, 0], end: [Q1X, BASE_Y, 0], color: ACCENT, strokeWidth: 1.6 });
    const q1Coll = new Line({ start: [Q1X, strapTopY, 0], end: [Q1_WING_X, strapTopY + WING_DY, 0], color: ACCENT, strokeWidth: 1.6 });
    const q1CollUp = new Line({ start: [Q1_WING_X, strapTopY + WING_DY, 0], end: [Q1_WING_X, 1.02, 0], color: ACCENT, strokeWidth: 1.6 });
    const q1Emit = new Line({ start: [Q1X, strapBotY, 0], end: [Q1_WING_X, strapBotY - WING_DY, 0], color: ACCENT, strokeWidth: 1.6 });
    const q1EmitDown = new Line({ start: [Q1_WING_X, strapBotY - WING_DY, 0], end: [Q1_WING_X, EMIT_JY, 0], color: ACCENT, strokeWidth: 1.6 });
    const q1EmitArrow = arrowTriangle(Q1_WING_X, strapBotY - WING_DY, WING_DX, -WING_DY, ACCENT);
    const q1Lbl = new MathTex({ latex: 'Q_{1}', color: MUTED });
    await q1Lbl.waitForRender?.();
    q1Lbl.scale(0.48).moveTo([Q1X - 0.25, strapTopY + 0.18, 0]);
    const q1InLbl = new MathTex({ latex: 'v_{+}', color: ACCENT });
    await q1InLbl.waitForRender?.();
    q1InLbl.scale(0.58).moveTo([-1.20, BASE_Y, 0]);

    // Q2 (NPN, right; mirrored — base from the right, emitter arrow down-left)
    const q2Strap = new Line({ start: [Q2X, strapBotY, 0], end: [Q2X, strapTopY, 0], color: RED, strokeWidth: 2.6 });
    const q2Base = new Line({ start: [1.00, BASE_Y, 0], end: [Q2X, BASE_Y, 0], color: RED, strokeWidth: 1.6 });
    const q2Coll = new Line({ start: [Q2X, strapTopY, 0], end: [Q2_WING_X, strapTopY + WING_DY, 0], color: RED, strokeWidth: 1.6 });
    const q2CollUp = new Line({ start: [Q2_WING_X, strapTopY + WING_DY, 0], end: [Q2_WING_X, 1.02, 0], color: RED, strokeWidth: 1.6 });
    const q2Emit = new Line({ start: [Q2X, strapBotY, 0], end: [Q2_WING_X, strapBotY - WING_DY, 0], color: RED, strokeWidth: 1.6 });
    const q2EmitDown = new Line({ start: [Q2_WING_X, strapBotY - WING_DY, 0], end: [Q2_WING_X, EMIT_JY, 0], color: RED, strokeWidth: 1.6 });
    const q2EmitArrow = arrowTriangle(Q2_WING_X, strapBotY - WING_DY, -WING_DX, -WING_DY, RED);
    const q2Lbl = new MathTex({ latex: 'Q_{2}', color: MUTED });
    await q2Lbl.waitForRender?.();
    q2Lbl.scale(0.48).moveTo([Q2X + 0.25, strapTopY + 0.18, 0]);
    const q2InLbl = new MathTex({ latex: 'v_{-}', color: RED });
    await q2InLbl.waitForRender?.();
    q2InLbl.scale(0.58).moveTo([1.20, BASE_Y, 0]);

    // Joined emitters → T-junction dot → tail current source → ground
    const emitJoin = new Line({ start: [Q1_WING_X, EMIT_JY, 0], end: [Q2_WING_X, EMIT_JY, 0], color: MUTED, strokeWidth: 1.8 });

    vMinusLbl.scale(0.5).moveTo([POT_CX + 0.52, POT_CY - POT_R - 0.32, 0]);

    // Trim caption below the V− rail
    const trimCap = new Text({ text: 'drag the wiper to null V_os', fontSize: 13, color: MUTED, fontUrl: FONT_URL });
    await trimCap.loadGlyphs?.();
    trimCap.moveTo([POT_CX, POT_CY - POT_R - 0.92, 0]);

    // Cross-reference note under the V_out bar (RHS)
    const p3XRef = new Text({
      text: '(see slide 4 for the transfer-curve view)',
      fontSize: 11, color: CYAN, fontUrl: FONT_URL
    });
    await p3XRef.loadGlyphs?.();
    p3XRef.moveTo([2.9, -2.1, 0]);

    // ── Pot wiper pointer (triangular indicator; re-created on every drag so
    //    the phase-3 fade animations always operate on the latest object) ──
    const POT_SWEEP_DEG = 150;
    const VOS_MAX_MV = 5;
    function makePotArrow(vosMv) {
      const clamped = Math.max(-VOS_MAX_MV, Math.min(VOS_MAX_MV, vosMv));
      const deg = (clamped / VOS_MAX_MV) * POT_SWEEP_DEG;
      const rad = deg * Math.PI / 180;
      const sin = Math.sin(rad), cos = Math.cos(rad);
      // Tip sits just inside the rim; base straddles the hub perpendicular to the wiper axis.
      const tipLen = POT_R - 0.02;
      const baseLen = 0.08;           // offset of the base from the centre, along the wiper axis
      const halfW = 0.09;           // half-width of the base perpendicular to the wiper
      const tipX = POT_CX + tipLen * sin;
      const tipY = POT_CY + tipLen * cos;
      const bcX = POT_CX + baseLen * sin;   // centre of the base, slightly along the wiper
      const bcY = POT_CY + baseLen * cos;
      const bL_x = bcX - halfW * cos;
      const bL_y = bcY + halfW * sin;
      const bR_x = bcX + halfW * cos;
      const bR_y = bcY - halfW * sin;
      return new Polygon({
        vertices: [[tipX, tipY, 0], [bR_x, bR_y, 0], [bL_x, bL_y, 0]],
        color: YELLOW, strokeWidth: 2, fillOpacity: 0.55
      });
    }
    let potArrow = makePotArrow(parseFloat(document.getElementById('vos-slider').value));

    const phase3Objs = [
      dipBody, dipNotch,
      ...dipLeads, ...dipDots, ...dipNums, ...dipFnLabels,
      halo1, halo5,
      pot1w1, pot1w2, pot1w3, pot5w1, pot5w2, pot5w3,
      potRim, potBody,
      ...potTicks, potLblMin, potLblZero, potLblMax,
      potTermL, potTermR,
      potWiperWire, vMinusRail1, vMinusRail2, vMinusRail3, vMinusLbl,
      potArrow, potHub, potLbl,
      trimCap, p3XRef
    ];

    // =================================================================
    // Orchestration
    // =================================================================
    const headlines = {
      1: ['01', 'Cause: transistor mismatch'],
      2: ['02', 'Model: Vos as a series input source'],
      3: ['03', 'Trim: LM741 offset-null pins 1 & 5']
    };
    const phMap = { 1: phase1Objs, 2: phase2Objs, 3: phase3Objs };
    let currentPhase = 1;
    let switching = false;

    const vosSlider = document.getElementById('vos-slider');
    const gainSlider = document.getElementById('gain-slider');
    const vosVal = document.getElementById('vos-val');
    const gainVal = document.getElementById('gain-val');
    const voutReadout = document.getElementById('vout-readout');
    const voutBar = document.getElementById('vout-bar');
    const phNum = document.querySelector('#phase-headline .ph-num');
    const phTitle = document.getElementById('phase-title');

    // Phase-3 interactive pot — the visual is a manim Line that we rebuild on
    // every change so it always stays aligned with the manim-drawn pin wires.
    const phase3Svg = document.getElementById('phase3-overlay');
    const potHitEl = document.getElementById('pot-hit');
    // The hit-area position is a best-effort screen-space estimate of the
    // manim pot centre (manim origin ≈ (640, 360), ≈90 px per unit). If the
    // canvas resizes the manim scale the hit area is generously oversized
    // so the user can still grab the wiper.
    const POT_CX_S = 505;
    const POT_CY_S = 522;

    const BAR_CENTER = 900;
    const BAR_HALF = 180;
    const V_SAT_MV = 12000;

    function updateBar() {
      const vos = parseFloat(vosSlider.value);
      const gain = parseFloat(gainSlider.value);
      const voutMv = vos * gain;
      const clamped = Math.max(-V_SAT_MV, Math.min(V_SAT_MV, voutMv));
      const sat = Math.abs(voutMv) >= V_SAT_MV;
      const w = Math.abs(clamped) / V_SAT_MV * BAR_HALF;
      if (clamped >= 0) {
        voutBar.setAttribute('x', BAR_CENTER);
        voutBar.setAttribute('width', w.toFixed(2));
      } else {
        voutBar.setAttribute('x', (BAR_CENTER - w).toFixed(2));
        voutBar.setAttribute('width', w.toFixed(2));
      }
      voutBar.classList.toggle('sat', sat);

      const vosSign = vos >= 0 ? '+' : '−';
      vosVal.textContent = vosSign + Math.abs(vos).toFixed(1) + ' mV';
      gainVal.textContent = gain.toFixed(0) + '×';

      let disp;
      if (Math.abs(voutMv) >= 1000) disp = (Math.abs(voutMv) / 1000).toFixed(2) + ' V';
      else disp = Math.abs(voutMv).toFixed(1) + ' mV';
      const voutSign = voutMv >= 0 ? '+' : '−';
      const satMarkup = sat ? '<tspan class="sat-tag">  (sat)</tspan>' : '';
      voutReadout.innerHTML =
        'V<tspan dy="3" font-size="13">out</tspan>' +
        '<tspan dy="-3"> = ' + voutSign + disp + '</tspan>' +
        satMarkup;

      // Rebuild the manim pot arrow so it reflects the latest V_os value.
      // The phase3Objs reference is always updated (so the next FadeIn/FadeOut
      // animates the right object) but we only mutate the live scene once
      // phase 3 is actually on-stage.
      if (typeof potArrow !== 'undefined') {
        const oldArrow = potArrow;
        const newArrow = makePotArrow(vos);
        const idx = phase3Objs.indexOf(oldArrow);
        if (idx >= 0) phase3Objs[idx] = newArrow;
        if (typeof currentPhase !== 'undefined' && currentPhase === 3) {
          scene.remove(oldArrow);
          scene.add(newArrow);
        }
        potArrow = newArrow;
      }
    }
    vosSlider.addEventListener('input', updateBar);
    gainSlider.addEventListener('input', updateBar);
    updateBar();

    // ─── Pot drag interaction ────────────────────────────────────────
    let potDragging = false;

    function pointerToVos(clientX, clientY) {
      const rect = phase3Svg.getBoundingClientRect();
      const vx = (clientX - rect.left) / rect.width * 1280;
      const vy = (clientY - rect.top) / rect.height * 720;
      const dx = vx - POT_CX_S;
      const dy = vy - POT_CY_S;
      let deg = Math.atan2(dx, -dy) * 180 / Math.PI;   // 0 = straight up, CW positive
      deg = Math.max(-POT_SWEEP_DEG, Math.min(POT_SWEEP_DEG, deg));
      return (deg / POT_SWEEP_DEG) * VOS_MAX_MV;
    }

    function applyPotFromPointer(e) {
      vosSlider.value = pointerToVos(e.clientX, e.clientY).toFixed(2);
      updateBar();
    }

    potHitEl.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      potDragging = true;
      try { potHitEl.setPointerCapture(e.pointerId); } catch (err) { /* ignore */ }
      applyPotFromPointer(e);
    });
    potHitEl.addEventListener('pointermove', (e) => {
      if (!potDragging) return;
      applyPotFromPointer(e);
    });
    function endPotDrag(e) {
      if (!potDragging) return;
      potDragging = false;
      try { potHitEl.releasePointerCapture(e.pointerId); } catch (err) { /* ignore */ }
    }
    potHitEl.addEventListener('pointerup', endPotDrag);
    potHitEl.addEventListener('pointercancel', endPotDrag);

    function setActiveUI(n) {
      document.querySelectorAll('.stepper-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.phase === String(n));
      });
      phNum.textContent = headlines[n][0];
      phTitle.textContent = headlines[n][1];
      stage.setAttribute('data-stage', String(n));
    }

    async function switchPhase(n) {
      if (switching || n === currentPhase) return;
      switching = true;
      const oldObjs = phMap[currentPhase];
      const newObjs = phMap[n];
      setActiveUI(n);

      // When entering phase 3, push the closed-loop gain high enough that
      // the residual offset produces a visible V_out bar, and make sure V_os
      // starts non-zero so there's something to trim.
      if (n === 3) {
        gainSlider.value = '101';
        if (parseFloat(vosSlider.value) === 0) vosSlider.value = '2.0';
        updateBar();
      }

      const anims = [];
      for (const o of oldObjs) anims.push(new FadeOut(o, { duration: 0.45 }));
      for (const o of newObjs) anims.push(new FadeIn(o, { duration: 0.45 }));
      await scene.play(...anims);
      currentPhase = n;
      switching = false;
    }

    document.querySelectorAll('.stepper-btn').forEach(btn => {
      btn.addEventListener('click', () => switchPhase(parseInt(btn.dataset.phase, 10)));
    });

    // =================================================================
    // Initial reveal — phase 1
    // =================================================================
    await scene.play(new Write(title, { duration: 0.6 }));

    // Step 1: draw the op-amp package on the LHS
    await scene.play(
      new Create(opTri, { duration: 0.6 }),
      new FadeIn(opPlus), new FadeIn(opMinus),
      new Create(opInPlusStub), new Create(opInMinusStub),
      new FadeIn(opInPlusLbl), new FadeIn(opInMinusLbl),
      new Create(opOutStub), new FadeIn(opOutLbl),
      new FadeIn(opPartLbl)
    );

    // Step 2: highlight the input region, expand the zoom cone into the callout

    const highlightCircle2 = highlightCircle.copy();
    phase1Objs.push(highlightCircle2);

    await scene.play(
      new Create(highlightCircle, { duration: 0.7 })
    )
    await scene.wait(0.5)

    await scene.play(
      new Transform(highlightCircle2, callout, { duration: 1.4 }),
      new FadeIn(calloutLbl, { duration: 1.4 }),
      new Create(zoomLineU, { duration: 1.4 }),
      new Create(zoomLineL, { duration: 1.4 })
    );

    await scene.wait(0.2)



    // Step 3: populate the callout with the differential pair
    await scene.play(
      new Create(vccRail), new Write(vccLbl),
      new Create(rC1Rect), new Create(rC2Rect),
      new Create(rC1TopWire), new Create(rC2TopWire),
      new Write(rC1Lbl), new Write(rC2Lbl),
      new Create(q1Strap), new Create(q1Base),
      new Create(q1Coll), new Create(q1CollUp),
      new Create(q1Emit), new Create(q1EmitDown),
      new FadeIn(q1EmitArrow),
      new Write(q1Lbl), new Write(q1InLbl),
      new Create(q2Strap), new Create(q2Base),
      new Create(q2Coll), new Create(q2CollUp),
      new Create(q2Emit), new Create(q2EmitDown),
      new FadeIn(q2EmitArrow),
      new Write(q2Lbl), new Write(q2InLbl),
      new Create(emitJoin), new FadeIn(emitNodeDot),
      new Create(tailJoinWire),
      new Create(tailSrc),
      new Create(tailArrMain), new Create(tailArrL), new Create(tailArrR),
      new Write(tailLbl),
      new Create(tailGndWire),
      new Create(gnd1), new Create(gnd2), new Create(gnd3)
    );

    // Step 4: RHS bullet block + boxed LM741 note
    await scene.play(
      new Write(p1Bullets), new Write(p1TypVals)
    );

    // Step 5: pulse the mismatch halos on Q1 and Q2
    await scene.play(new FadeIn(mismatch1, { duration: 0.35 }), new FadeIn(mismatch, { duration: 0.35 }));
    await scene.play(new FadeOut(mismatch1, { duration: 0.35 }), new FadeOut(mismatch, { duration: 0.35 }));
    await scene.play(new FadeIn(mismatch1, { duration: 0.35 }), new FadeIn(mismatch, { duration: 0.35 }));
    await scene.play(new FadeOut(mismatch1, { duration: 0.35 }), new FadeOut(mismatch, { duration: 0.35 }));
    await scene.play(new FadeIn(mismatch1, { duration: 0.4 }), new FadeIn(mismatch, { duration: 0.4 }));
  </script>
</body>
