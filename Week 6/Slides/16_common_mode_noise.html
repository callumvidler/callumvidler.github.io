<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 16 — Common-Mode Noise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    // Theme bridge:
    //   1. Priority: ?theme= URL param (presenter sets this when loading).
    //   2. Fallback: sessionStorage, preserved across the reload triggered
    //      by the module's themechange listener (theme.js always forces
    //      'light' at parse time, so we need our own persistence).
    // Also hides the per-slide toggle button when embedded in the presenter.
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">17 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
  </div>

  <script type="module">
    import {
      Scene, Rectangle, Polygon, Circle, Line, Text, MathTex, VGroup, Dot,
      Create, Write, FadeIn,
      UP, DOWN, LEFT, RIGHT, WHITE
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    const title = new Text({ text: 'Common-Mode Noise & Rejection', fontSize: 40, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    const TITLE_LEFT_X = -6.2;
    if (typeof title.getLeft === 'function') {
      title.shift([TITLE_LEFT_X - title.getLeft()[0], 0, 0]);
    }

    const bullets = [
      'Common-mode noise appears equally on both inputs',
      'Typical source: 50/60 Hz mains capacitive coupling',
      'Goal: reject common-mode before amplification',
      'Avoid converting common-mode into differential output'
    ];
    const bulletObjs = [];
    for (let i = 0; i < bullets.length; i++) {
      const b = new Text({ text: '•  ' + bullets[i], fontSize: 14, color: MUTED, fontUrl: FONT_URL });
      await b.loadGlyphs?.();
      b.moveTo([2.25, 1.8 - i * 0.34, 0]);
      bulletObjs.push(b);
    }

    // ── Hospital bed (stylised) ──
    const bed = new Rectangle({ width: 4.0, height: 0.4, color: MUTED, strokeWidth: 2, fillOpacity: 0.1 });
    bed.moveTo([-2.8, -1.1, 0]);
    const bedLeg1 = new Line({ start: [-4.6, -1.3, 0], end: [-4.6, -1.9, 0], color: MUTED });
    const bedLeg2 = new Line({ start: [-1.0, -1.3, 0], end: [-1.0, -1.9, 0], color: MUTED });
    const pillow = new Polygon({
      vertices: [[-5.0, -0.9, 0], [-4.2, -0.9, 0], [-4.2, -0.65, 0], [-5.0, -0.65, 0]],
      color: MAG, strokeWidth: 1.5, fillOpacity: 0.2
    });

    // ── Patient stick figure ──
    const head = new Circle({ radius: 0.22, color: FG, strokeWidth: 2, fillOpacity: 0.1 });
    head.moveTo([-4.6, -0.4, 0]);
    const body = new Line({ start: [-4.4, -0.7, 0], end: [-1.6, -0.8, 0], color: FG, strokeWidth: 2 });
    const arm1 = new Line({ start: [-3.8, -0.75, 0], end: [-3.4, -0.95, 0], color: FG });
    const arm2 = new Line({ start: [-3.8, -0.75, 0], end: [-3.4, -0.55, 0], color: FG });

    // ── Two electrode dots on the chest ──
    const elec1 = new Dot({ point: [-3.3, -0.55, 0], color: YELLOW, radius: 0.09 });
    const elec2 = new Dot({ point: [-3.3, -0.95, 0], color: YELLOW, radius: 0.09 });
    const lead1 = new Line({ start: [-3.3, -0.55, 0], end: [ 1.5, 0.3, 0], color: FG });
    const lead2 = new Line({ start: [-3.3, -0.95, 0], end: [ 1.5, -0.3, 0], color: FG });

    // ── Mains cord on the right ──
    const mains = new Line({ start: [4.5,  2.4, 0], end: [4.5, -1.9, 0], color: RED, strokeWidth: 3 });
    const mainsLbl = new Text({ text: 'Mains 50 Hz', fontSize: 14, color: RED, fontUrl: FONT_URL });
    await mainsLbl.loadGlyphs?.();
    mainsLbl.moveTo([4.5, 2.8, 0]);
    const leadLbl1 = new MathTex({ latex: 'v_{i1}', color: FG });
    const leadLbl2 = new MathTex({ latex: 'v_{i2}', color: FG });
    await leadLbl1.waitForRender?.();
    await leadLbl2.waitForRender?.();
    leadLbl1.scale(0.45).moveTo([1.8, 0.55, 0]);
    leadLbl2.scale(0.45).moveTo([1.8, -0.55, 0]);

    // ── Capacitive coupling (dashed look using short lines) ──
    const couple = [];
    const addDashes = (xs, ys, xe, ye, n) => {
      for (let i = 0; i < n; i++) {
        const t0 = i / n, t1 = (i + 0.5) / n;
        couple.push(new Line({
          start: [xs + (xe - xs) * t0, ys + (ye - ys) * t0, 0],
          end:   [xs + (xe - xs) * t1, ys + (ye - ys) * t1, 0],
          color: MAG, strokeWidth: 2
        }));
      }
    };
    addDashes(4.5, 1.0, -4.0, -0.3, 10);
    addDashes(4.5, 0.5, -4.0, -1.1, 10);

    const capLbl = new Text({ text: 'C_couple', fontSize: 12, color: MAG, fontUrl: FONT_URL });
    await capLbl.loadGlyphs?.();
    capLbl.moveTo([0.3, 0.9, 0]);

    // ── Scope-style sine waves on each lead ──
    const mkSine = (y0) => {
      const lines = [];
      const N = 60;
      const x0 = 1.8, x1 = 5.2;
      for (let i = 1; i <= N; i++) {
        const t0 = (i - 1) / N, t1 = i / N;
        const xa = x0 + t0 * (x1 - x0), xb = x0 + t1 * (x1 - x0);
        const ya = y0 + 0.25 * Math.sin(t0 * Math.PI * 4);
        const yb = y0 + 0.25 * Math.sin(t1 * Math.PI * 4);
        lines.push(new Line({ start: [xa, ya, 0], end: [xb, yb, 0], color: RED, strokeWidth: 2 }));
      }
      return new VGroup(...lines);
    };
    const wave1 = mkSine(0.3);
    const wave2 = mkSine(-0.3);

    // ── Sequence ──
    await scene.play(new Write(title, { duration: 0.7 }));
    await scene.play(
      new Create(bed), new Create(bedLeg1), new Create(bedLeg2), new Create(pillow),
      new Create(head), new Create(body), new Create(arm1), new Create(arm2)
    );
    await scene.play(new FadeIn(elec1), new FadeIn(elec2), new Create(lead1), new Create(lead2));
    await scene.play(new Write(leadLbl1), new Write(leadLbl2));
    await scene.play(new Create(mains), new FadeIn(mainsLbl));
    for (const c of couple) scene.add(c);
    await scene.play(new FadeIn(capLbl));
    await scene.play(new Create(wave1, { duration: 1.8, lagRatio: 0.03 }), new Create(wave2, { duration: 1.8, lagRatio: 0.03 }));
    const caption = new Text({ text: 'Identical signal on both leads → common-mode', fontSize: 16, color: FG, fontUrl: FONT_URL });
    await caption.loadGlyphs?.();
    caption.moveTo([0, -2.9, 0]);
    await scene.play(new FadeIn(caption));
    for (const b of bulletObjs) {
      await scene.play(new FadeIn(b, { duration: 0.2 }));
    }
    await scene.wait(2);
  </script>
</body>
</html>
