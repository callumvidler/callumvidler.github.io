<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 19: Instrumentation Amplifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { }
      var pick = (qt === 'dark' || qt === 'light') ? qt
        : (ss === 'dark' || ss === 'light') ? ss
          : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
  <style>
    .ol-panel {
      position: absolute;
      bottom: 52px;
      left: 14px;
      width: 42%;
      z-index: 9;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--slide-border);
      background: var(--slide-surface);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22), 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      display: none;
      gap: 5px 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    [data-theme="light"] .ol-panel {
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.03);
    }

    .ol-panel.visible {
      display: flex;
      flex-direction: column;
    }

    .ol-title {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--slide-accent);
      font-size: 11px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
    }

    .ol-row {
      display: grid;
      gap: 3px;
    }

    .ol-row label {
      display: flex;
      justify-content: space-between;
      color: var(--slide-text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }

    .ol-row .v {
      color: var(--slide-text);
      font-variant-numeric: tabular-nums;
    }

    .ol-panel input[type="range"] {
      width: 100%;
      accent-color: var(--slide-accent);
      cursor: pointer;
      height: 18px;
    }

    .ol-readout {
      border-top: 1px solid var(--slide-border);
      padding-top: 5px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }

    .ol-readout .k {
      color: var(--slide-text-dim);
    }

    .ol-readout .v {
      text-align: right;
      color: var(--slide-text);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .ol-strip {
      margin-top: 2px;
      border-left: 3px solid var(--slide-yellow);
      border-radius: 4px;
      padding: 4px 8px;
      background: rgba(255, 204, 68, 0.12);
      color: var(--slide-yellow);
      line-height: 1.35;
      font-size: 10px;
    }
  </style>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">17 / 19</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>

    <div class="ol-panel" id="olPanel" aria-hidden="true">
      <div class="ol-title">Gain Explorer</div>
      <div class="ol-row">
        <label>R<sub>G</sub> <span class="v" id="rgVal">10.0 k&Omega;</span></label>
        <input type="range" id="rgSlider" min="0" max="1000" step="1" value="500">
      </div>
      <div class="ol-row">
        <label>Source Z<sub>s</sub> <span class="v" id="zsVal">1.0 k&Omega;</span></label>
        <input type="range" id="zsSlider" min="0" max="1000" step="1" value="200">
      </div>
      <div class="ol-readout">
        <span class="k">Gain A<sub>v</sub></span><span class="v" id="gainVal">6.0</span>
        <span class="k">V<sub>out</sub> (buf)</span><span class="v" id="voutVal" style="color:var(--slide-yellow)">60 mV</span>
        <span class="k">V<sub>out</sub> (no buf)</span><span class="v" id="voutNoBufVal" style="color:var(--slide-red)">48 mV</span>
        <span class="k">Signal lost</span><span class="v" id="lossVal" style="color:var(--slide-red)">20%</span>
      </div>
      <div class="ol-strip" id="gainExplain">Drag Source Z to see why the buffer stage matters.</div>
    </div>

    <div class="stepper-row" id="stepper">
      <button type="button" class="stepper-btn" id="sec-prev" disabled>← Prev Section</button>
      <span class="step-indicator" id="sec-indicator">Section 1 · Circuit</span>
      <button type="button" class="stepper-btn" id="sec-next">Next Section →</button>
    </div>
  </div>

  <script type="module">
    import {
      Scene, Polygon, Rectangle, Line, Circle, Dot, Text, MathTex,
      Create, Write, FadeIn, Indicate,
      UP, DOWN, LEFT, RIGHT
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ── Title ──
    const title = new Text({ text: 'Instrumentation Amplifier', fontSize: 40, color: FG, fontUrl: FONT_URL });
    await title.loadGlyphs?.();
    title.moveTo([-3.5, 3.5, 0]);
    if (typeof title.getLeft === 'function') {
      title.shift([-6.2 - title.getLeft()[0], 0, 0]);
    }

    // ═══════════════════════════════════════════════
    //  CIRCUIT DIAGRAM — left half
    //  Three op-amps: A1 (top buffer), A2 (bottom buffer), A3 (diff amp)
    // ═══════════════════════════════════════════════

    const TRI_HALF_H = 0.65;
    const TRI_HALF_W = 0.6;
    const R_W = 0.7, R_H = 0.25;

    // Op-amp positions (shifted down 0.5 to centre circuit vertically)
    const A1_CX = -4.0, A1_CY = 1.5;
    const A2_CX = -4.0, A2_CY = -1.9;
    const A3_CX = -0.2, A3_CY = -0.2;

    // Helper: create op-amp triangle (06/17 style)
    function mkOpamp(cx, cy) {
      return new Polygon({
        vertices: [
          [cx - TRI_HALF_W, cy - TRI_HALF_H, 0],
          [cx - TRI_HALF_W, cy + TRI_HALF_H, 0],
          [cx + TRI_HALF_W, cy, 0]
        ],
        color: MUTED2, strokeWidth: 1.7, fillOpacity: 0.13
      });
    }

    const triA1 = mkOpamp(A1_CX, A1_CY);
    const triA2 = mkOpamp(A2_CX, A2_CY);
    const triA3 = mkOpamp(A3_CX, A3_CY);

    // +/- symbols for each op-amp
    async function mkTerminals(cx, cy) {
      const pY = cy - 0.25, mY = cy + 0.25;
      const p = new Text({ text: '+', fontSize: 14, color: ACCENT, fontUrl: FONT_URL });
      const m = new Text({ text: '−', fontSize: 14, color: RED, fontUrl: FONT_URL });
      await Promise.all([p.loadGlyphs?.(), m.loadGlyphs?.()]);
      p.moveTo([cx - TRI_HALF_W + 0.22, pY, 0]);
      m.moveTo([cx - TRI_HALF_W + 0.22, mY, 0]);
      return { plus: p, minus: m, plusY: pY, minusY: mY };
    }

    const t1 = await mkTerminals(A1_CX, A1_CY);
    const t2 = await mkTerminals(A2_CX, A2_CY);
    const t3 = await mkTerminals(A3_CX, A3_CY);

    // ── Input labels ──
    const VIN_X = -6.2;
    const vaLbl = new MathTex({ latex: 'V_{1}', color: BLUE });
    const vbLbl = new MathTex({ latex: 'V_{2}', color: MAG });
    await Promise.all([vaLbl.waitForRender?.(), vbLbl.waitForRender?.()]);
    vaLbl.scale(0.6).moveTo([VIN_X, t1.plusY, 0]);
    vbLbl.scale(0.6).moveTo([VIN_X, t2.plusY, 0]);

    // ── Input wires with Z_s resistors ──
    const ZS_CX = (VIN_X + 0.25 + A1_CX - TRI_HALF_W) / 2; // midpoint of input wire
    // Top input: V1 → Zs → A1+
    const inW1a = new Line({ start: [VIN_X + 0.25, t1.plusY, 0], end: [ZS_CX - R_W / 2, t1.plusY, 0], color: FG, strokeWidth: 1.8 });
    const Zs1 = new Rectangle({ width: R_W, height: R_H, color: RED, strokeWidth: 2, fillOpacity: 0.22 });
    Zs1.moveTo([ZS_CX, t1.plusY, 0]);
    const Zs1L = new MathTex({ latex: 'Z_s', color: RED });
    await Zs1L.waitForRender?.();
    Zs1L.scale(0.45).moveTo([ZS_CX, t1.plusY + R_H / 2 + 0.18, 0]);
    const inW1b = new Line({ start: [ZS_CX + R_W / 2, t1.plusY, 0], end: [A1_CX - TRI_HALF_W, t1.plusY, 0], color: FG, strokeWidth: 1.8 });
    // Bottom input: V2 → Zs → A2+
    const inW2a = new Line({ start: [VIN_X + 0.25, t2.plusY, 0], end: [ZS_CX - R_W / 2, t2.plusY, 0], color: FG, strokeWidth: 1.8 });
    const Zs2 = new Rectangle({ width: R_W, height: R_H, color: RED, strokeWidth: 2, fillOpacity: 0.22 });
    Zs2.moveTo([ZS_CX, t2.plusY, 0]);
    const Zs2L = new MathTex({ latex: 'Z_s', color: RED });
    await Zs2L.waitForRender?.();
    Zs2L.scale(0.45).moveTo([ZS_CX, t2.plusY - R_H / 2 - 0.18, 0]);
    const inW2b = new Line({ start: [ZS_CX + R_W / 2, t2.plusY, 0], end: [A2_CX - TRI_HALF_W, t2.plusY, 0], color: FG, strokeWidth: 1.8 });

    // ── Buffer outputs ──
    const BUF_OUT_X = A1_CX + TRI_HALF_W;
    const TAP1_X = -2.8;

    // A1 output wire
    const outW1 = new Line({ start: [BUF_OUT_X, A1_CY, 0], end: [TAP1_X, A1_CY, 0], color: FG, strokeWidth: 1.8 });
    const tap1Dot = new Dot({ point: [TAP1_X, A1_CY, 0], color: FG, radius: 0.05 });

    // A2 output wire
    const outW2 = new Line({ start: [BUF_OUT_X, A2_CY, 0], end: [TAP1_X, A2_CY, 0], color: FG, strokeWidth: 1.8 });
    const tap2Dot = new Dot({ point: [TAP1_X, A2_CY, 0], color: FG, radius: 0.05 });

    // ── Feedback R for A1 (from output tap up and back to minus input) ──
    const FB1_Y = A1_CY + 1.1;
    const NODE1_X = -5.0; // where minus input wire meets vertical
    const fb1Vert = new Line({ start: [NODE1_X, t1.minusY, 0], end: [NODE1_X, FB1_Y, 0], color: FG, strokeWidth: 1.8 });

    const R1_CX = (NODE1_X + TAP1_X) / 2;
    const fb1toR = new Line({ start: [NODE1_X, FB1_Y, 0], end: [R1_CX - R_W / 2, FB1_Y, 0], color: FG, strokeWidth: 1.8 });
    const R1 = new Rectangle({ width: R_W, height: R_H, color: ACCENT, strokeWidth: 2, fillOpacity: 0.22 });
    R1.moveTo([R1_CX, FB1_Y, 0]);
    const R1L = new MathTex({ latex: 'R', color: ACCENT });
    await R1L.waitForRender?.();
    R1L.scale(0.5).moveTo([R1_CX, FB1_Y + R_H / 2 + 0.18, 0]);
    const fb1fromR = new Line({ start: [R1_CX + R_W / 2, FB1_Y, 0], end: [TAP1_X, FB1_Y, 0], color: FG, strokeWidth: 1.8 });
    const fb1down = new Line({ start: [TAP1_X, FB1_Y, 0], end: [TAP1_X, A1_CY, 0], color: FG, strokeWidth: 1.8 });

    // Stub from minus input to node
    const stub1 = new Line({ start: [NODE1_X, t1.minusY, 0], end: [A1_CX - TRI_HALF_W, t1.minusY, 0], color: FG, strokeWidth: 1.8 });
    const node1Dot = new Dot({ point: [NODE1_X, t1.minusY, 0], color: FG, radius: 0.05 });

    // ── Feedback R for A2 (from output tap down and back to minus input) ──
    const FB2_Y = A2_CY - 1.1;
    const NODE2_X = -5.0;
    const fb2Vert = new Line({ start: [NODE2_X, t2.minusY, 0], end: [NODE2_X, FB2_Y, 0], color: FG, strokeWidth: 1.8 });

    const R2_CX = (NODE2_X + TAP1_X) / 2;
    const fb2toR = new Line({ start: [NODE2_X, FB2_Y, 0], end: [R2_CX - R_W / 2, FB2_Y, 0], color: FG, strokeWidth: 1.8 });
    const R2 = new Rectangle({ width: R_W, height: R_H, color: ACCENT, strokeWidth: 2, fillOpacity: 0.22 });
    R2.moveTo([R2_CX, FB2_Y, 0]);
    const R2L = new MathTex({ latex: 'R', color: ACCENT });
    await R2L.waitForRender?.();
    R2L.scale(0.5).moveTo([R2_CX, FB2_Y - R_H / 2 - 0.18, 0]);
    const fb2fromR = new Line({ start: [R2_CX + R_W / 2, FB2_Y, 0], end: [TAP1_X, FB2_Y, 0], color: FG, strokeWidth: 1.8 });
    const fb2down = new Line({ start: [TAP1_X, FB2_Y, 0], end: [TAP1_X, A2_CY, 0], color: FG, strokeWidth: 1.8 });

    const stub2 = new Line({ start: [NODE2_X, t2.minusY, 0], end: [A2_CX - TRI_HALF_W, t2.minusY, 0], color: FG, strokeWidth: 1.8 });
    const node2Dot = new Dot({ point: [NODE2_X, t2.minusY, 0], color: FG, radius: 0.05 });

    // ── R_gain connecting the two inverting-input nodes vertically ──
    const RG_CY = (t1.minusY + t2.minusY) / 2;
    const rgWireTop = new Line({ start: [NODE1_X, t1.minusY, 0], end: [NODE1_X, RG_CY + 0.4, 0], color: FG, strokeWidth: 1.8 });
    const Rg = new Rectangle({ width: 0.28, height: 0.8, color: YELLOW, strokeWidth: 2, fillOpacity: 0.22 });
    Rg.moveTo([NODE1_X, RG_CY, 0]);
    const RgL = new MathTex({ latex: 'R_{G}', color: YELLOW });
    await RgL.waitForRender?.();
    RgL.scale(0.55).nextTo(Rg, LEFT, 0.14);
    const rgWireBot = new Line({ start: [NODE1_X, RG_CY - 0.4, 0], end: [NODE1_X, t2.minusY, 0], color: FG, strokeWidth: 1.8 });

    // ── Difference amp stage (A3) input resistors ──
    // R from A1 output → A3 minus
    const R3_CX = (TAP1_X + A3_CX - TRI_HALF_W) / 2 - 0.1;
    const R3_Y = t3.minusY;
    const diffIn1a = new Line({ start: [TAP1_X, A1_CY, 0], end: [TAP1_X, R3_Y, 0], color: FG, strokeWidth: 1.8 });
    const diffIn1b = new Line({ start: [TAP1_X, R3_Y, 0], end: [R3_CX - R_W / 2, R3_Y, 0], color: FG, strokeWidth: 1.8 });
    const R3 = new Rectangle({ width: R_W, height: R_H, color: BLUE, strokeWidth: 2, fillOpacity: 0.22 });
    R3.moveTo([R3_CX, R3_Y, 0]);
    const R3L = new MathTex({ latex: 'R\'', color: BLUE });
    await R3L.waitForRender?.();
    R3L.scale(0.5).moveTo([R3_CX, R3_Y + R_H / 2 + 0.20, 0]);
    const diffIn1c = new Line({ start: [R3_CX + R_W / 2, R3_Y, 0], end: [A3_CX - TRI_HALF_W, R3_Y, 0], color: FG, strokeWidth: 1.8 });
    const diffNode1 = new Dot({ point: [R3_CX + R_W / 2 + 0.15, R3_Y, 0], color: FG, radius: 0.05 });

    // R from A2 output → A3 plus
    const R4_CX = R3_CX;
    const R4_Y = t3.plusY;
    const diffIn2a = new Line({ start: [TAP1_X, A2_CY, 0], end: [TAP1_X, R4_Y, 0], color: FG, strokeWidth: 1.8 });
    const diffIn2b = new Line({ start: [TAP1_X, R4_Y, 0], end: [R4_CX - R_W / 2, R4_Y, 0], color: FG, strokeWidth: 1.8 });
    const R4 = new Rectangle({ width: R_W, height: R_H, color: BLUE, strokeWidth: 2, fillOpacity: 0.22 });
    R4.moveTo([R4_CX, R4_Y, 0]);
    const R4L = new MathTex({ latex: 'R\'', color: BLUE });
    await R4L.waitForRender?.();
    R4L.scale(0.5).moveTo([R4_CX, R4_Y - R_H / 2 - 0.20, 0]);
    const diffIn2c = new Line({ start: [R4_CX + R_W / 2, R4_Y, 0], end: [A3_CX - TRI_HALF_W, R4_Y, 0], color: FG, strokeWidth: 1.8 });
    const diffNode2 = new Dot({ point: [R4_CX + R_W / 2 + 0.15, R4_Y, 0], color: FG, radius: 0.05 });

    // ── A3 feedback resistor R' (from minus node up to output tap) ──
    const A3_OUT_X = A3_CX + TRI_HALF_W;
    const FINAL_TAP_X = 1.0;
    const FB3_Y = t3.minusY + 1.1;
    const fbNode3 = new Dot({ point: [R3_CX + R_W / 2 + 0.15, R3_Y, 0], color: FG, radius: 0.05 });
    const fb3up = new Line({ start: [R3_CX + R_W / 2 + 0.15, R3_Y, 0], end: [R3_CX + R_W / 2 + 0.15, FB3_Y, 0], color: FG, strokeWidth: 1.8 });
    const RF_CX = (R3_CX + R_W / 2 + 0.15 + FINAL_TAP_X) / 2;
    const fb3toR = new Line({ start: [R3_CX + R_W / 2 + 0.15, FB3_Y, 0], end: [RF_CX - R_W / 2, FB3_Y, 0], color: FG, strokeWidth: 1.8 });
    const Rf = new Rectangle({ width: R_W, height: R_H, color: MAG, strokeWidth: 2, fillOpacity: 0.22 });
    Rf.moveTo([RF_CX, FB3_Y, 0]);
    const RfL = new MathTex({ latex: 'R\'\'', color: MAG });
    await RfL.waitForRender?.();
    RfL.scale(0.5).moveTo([RF_CX, FB3_Y + R_H / 2 + 0.20, 0]);
    const fb3fromR = new Line({ start: [RF_CX + R_W / 2, FB3_Y, 0], end: [FINAL_TAP_X, FB3_Y, 0], color: FG, strokeWidth: 1.8 });
    const fb3down = new Line({ start: [FINAL_TAP_X, FB3_Y, 0], end: [FINAL_TAP_X, A3_CY, 0], color: FG, strokeWidth: 1.8 });
    const finalTapDot = new Dot({ point: [FINAL_TAP_X, A3_CY, 0], color: FG, radius: 0.05 });

    // ── R' to ground from A3 plus node ──
    const GND_X = R4_CX + R_W / 2 + 0.15;
    const GND_Y = t3.plusY - 1.2;
    const RG2_CY = (R4_Y + GND_Y) / 2;
    const plusNode3 = new Dot({ point: [GND_X, R4_Y, 0], color: FG, radius: 0.05 });
    const gndWireTop = new Line({ start: [GND_X, R4_Y, 0], end: [GND_X, RG2_CY + 0.35, 0], color: FG, strokeWidth: 1.8 });
    const Rg2 = new Rectangle({ width: 0.28, height: 0.7, color: MAG, strokeWidth: 2, fillOpacity: 0.22 });
    Rg2.moveTo([GND_X, RG2_CY, 0]);
    const Rg2L = new MathTex({ latex: 'R\'\'', color: MAG });
    await Rg2L.waitForRender?.();
    Rg2L.scale(0.5).nextTo(Rg2, RIGHT, 0.12);
    const gndWireBot = new Line({ start: [GND_X, RG2_CY - 0.35, 0], end: [GND_X, GND_Y, 0], color: FG, strokeWidth: 1.8 });

    // Ground symbol
    const gnd1 = new Line({ start: [GND_X - 0.3, GND_Y, 0], end: [GND_X + 0.3, GND_Y, 0], color: FG, strokeWidth: 3 });
    const gnd2 = new Line({ start: [GND_X - 0.18, GND_Y - 0.12, 0], end: [GND_X + 0.18, GND_Y - 0.12, 0], color: FG, strokeWidth: 2 });
    const gnd3 = new Line({ start: [GND_X - 0.08, GND_Y - 0.22, 0], end: [GND_X + 0.08, GND_Y - 0.22, 0], color: FG, strokeWidth: 1 });

    // ── Output wire + label ──
    const OUT_X = 1.6;
    const outWire = new Line({ start: [A3_OUT_X, A3_CY, 0], end: [OUT_X, A3_CY, 0], color: FG, strokeWidth: 1.8 });
    const outPort = new Circle({ radius: 0.07, color: FG, strokeWidth: 2, fillColor: '#000000', fillOpacity: 1 }).moveTo([OUT_X, A3_CY, 0]);
    const outLbl = new MathTex({ latex: 'V_{out}', color: YELLOW });
    await outLbl.waitForRender?.();
    outLbl.scale(0.6).nextTo([OUT_X, A3_CY, 0], RIGHT, 0.1);

    // ── Op-amp labels (A1, A2, A3) ──
    const a1Lbl = new Text({ text: 'A₁', fontSize: 12, color: MUTED, fontUrl: FONT_URL });
    const a2Lbl = new Text({ text: 'A₂', fontSize: 12, color: MUTED, fontUrl: FONT_URL });
    const a3Lbl = new Text({ text: 'A₃', fontSize: 12, color: MUTED, fontUrl: FONT_URL });
    await Promise.all([a1Lbl.loadGlyphs?.(), a2Lbl.loadGlyphs?.(), a3Lbl.loadGlyphs?.()]);

    // ── Stage highlight boxes (animated in after circuit is drawn) ──

    // ═══════════════════════════════════════════════
    //  RHS INFO PANEL — explanation bullets
    // ═══════════════════════════════════════════════

    // ═══════════════════════════════════════════════

    // ═══════════════════════════════════════════════

    const MINI_S = 0.55;

    // ═══════════════════════════════════════════════
    //  SECTION 2: Interactive Gain Explorer
    // ═══════════════════════════════════════════════

    // ── Constants ──
    const RG_MIN = 100, RG_MAX = 100000, R_FIXED = 25000;
    const R_PRIME = 10000; // R' = 10 kΩ (diff amp input resistor)
    const VDM_INPUT = 0.010; // 10 mV differential input
    const ZS_MIN = 10, ZS_MAX = 100000; // source impedance range

    function rgFromSlider(v) {
      return RG_MIN * Math.pow(RG_MAX / RG_MIN, v / 1000);
    }
    function zsFromSlider(v) {
      return ZS_MIN * Math.pow(ZS_MAX / ZS_MIN, v / 1000);
    }
    function computeGain(rg) { return 1 + (2 * R_FIXED) / rg; }
    // Without buffers: source impedance forms voltage divider with R'
    // Signal actually reaching diff amp = Vdm * R' / (R' + Zs)
    function loadingFactor(zs) { return R_PRIME / (R_PRIME + zs); }
    function formatRg(rg) {
      if (rg >= 1000) return (rg / 1000).toFixed(1) + ' k\u03A9';
      return rg.toFixed(0) + ' \u03A9';
    }
    function formatVoltage(v) {
      if (Math.abs(v) >= 1) return v.toFixed(2) + ' V';
      return (v * 1000).toFixed(1) + ' mV';
    }

    const gainXRange = [Math.log10(RG_MIN), Math.log10(RG_MAX)]; // [2, 5]

    const sigXRange = [0, 2 * Math.PI];
    const sigYRange = [-1.3, 1.3];

    function mapPoint(frame, x, y, xr, yr) {
      return [
        frame.x0 + ((x - xr[0]) / (xr[1] - xr[0])) * (frame.x1 - frame.x0),
        frame.y0 + ((y - yr[0]) / (yr[1] - yr[0])) * (frame.y1 - frame.y0)
      ];
    }

    // ── Build static axis objects (rendered once) ──
    const s2StaticObjs = [];

    // -- Gain graph axes --
    s2StaticObjs.push(new Line({ start: [gainFrame.x0, gainFrame.y0, 0], end: [gainFrame.x1, gainFrame.y0, 0], color: MUTED, strokeWidth: 1.5 }));
    s2StaticObjs.push(new Line({ start: [gainFrame.x0, gainFrame.y0, 0], end: [gainFrame.x0, gainFrame.y1, 0], color: MUTED, strokeWidth: 1.5 }));

    for (const [logVal, label] of [[2, '100\u03A9'], [3, '1k\u03A9'], [4, '10k\u03A9'], [5, '100k\u03A9']]) {

      s2StaticObjs.push(new Line({ start: [gainFrame.x0, py[1], 0], end: [gainFrame.x0 - 0.1, py[1], 0], color: MUTED, strokeWidth: 1 }));

    await gainTitle.loadGlyphs?.();
    gainTitle.moveTo([(gainFrame.x0 + gainFrame.x1) / 2, gainFrame.y1 + 0.35, 0]);

    await gainYLbl.loadGlyphs?.();
    gainYLbl.rotate(Math.PI / 2).moveTo([gainFrame.x0 - 0.7, (gainFrame.y0 + gainFrame.y1) / 2, 0]);
    s2StaticObjs.push(gainYLbl);

    // Gain graph legend — top-right inside plot
    {
      const rx = gainFrame.x1 - 0.15; // right-align inside plot
      const topY = gainFrame.y1 - 0.2;
      const sp = 0.28;
      const items = [
        ['Buffered', ACCENT, topY],

    s2StaticObjs.push(new Line({ start: [sigFrame.x0, zeroY, 0], end: [sigFrame.x1, zeroY, 0], color: MUTED2, strokeWidth: 0.8 }));

    // Signal graph title
    const sigTitle = new Text({ text: 'Input / Output Signals', fontSize: 18, color: FG, fontUrl: FONT_URL });
    await sigTitle.loadGlyphs?.();
    sigTitle.moveTo([(sigFrame.x0 + sigFrame.x1) / 2, sigFrame.y1 + 0.35, 0]);
    s2StaticObjs.push(sigTitle);

    // Signal Y-axis label (left side, rotated 90°)
    const sigYLbl = new Text({ text: 'Voltage', fontSize: 18, color: MUTED, fontUrl: FONT_URL });
    await sigYLbl.loadGlyphs?.();
    sigYLbl.rotate(Math.PI / 2).moveTo([sigFrame.x0 - 0.35, (sigFrame.y0 + sigFrame.y1) / 2, 0]);
    s2StaticObjs.push(sigYLbl);

    // Signal legend — top-right inside plot
    {
      const rx = sigFrame.x1 - 0.15;
      const topY = sigFrame.y1 - 0.2;
      const sp = 0.28;
      const items = [
        ['V1', BLUE, topY],
        ['V2', MAG, topY - sp],
        ['Buffered', YELLOW, topY - 2 * sp],
        ['No buffers', RED, topY - 3 * sp],
      ];
      for (const [label, color, y] of items) {
        s2StaticObjs.push(new Circle({ radius: 0.06, color, fillColor: color, fillOpacity: 1, strokeWidth: 0 }).moveTo([rx - 0.9, y, 0]));
        const t = new Text({ text: label, fontSize: 11, color, fontUrl: FONT_URL });
        await t.loadGlyphs?.();
        t.moveTo([rx - 0.4, y, 0]);
        s2StaticObjs.push(t);
      }
    }

    // ── Educational annotations removed — info is in the overlay panel ──

    // All static objects start hidden
    s2StaticObjs.forEach(o => { try { o.setOpacity?.(0); } catch(e){} });
    scene.add(s2Title, ...s2StaticObjs);
    try { s2Title.setOpacity?.(0); } catch(e){}

    // ── DOM refs ──
    const olPanel = document.getElementById('olPanel');
    const rgSlider = document.getElementById('rgSlider');
    const zsSlider = document.getElementById('zsSlider');
    const rgValEl = document.getElementById('rgVal');
    const zsValEl = document.getElementById('zsVal');
    const gainValEl = document.getElementById('gainVal');
    const voutValEl = document.getElementById('voutVal');
    const voutNoBufEl = document.getElementById('voutNoBufVal');
    const lossValEl = document.getElementById('lossVal');
    const gainExplainEl = document.getElementById('gainExplain');

    function updateExplainText(rg, gain, zs, lf) {
      const lossPct = ((1 - lf) * 100);
      if (zs > 5000 && lossPct > 30) {
        gainExplainEl.innerHTML = '<b>High source impedance.</b> Without buffers, the amplifier\'s input resistors (R\u2032) ' +
          'draw current from the sensor. This forms a voltage divider with the source impedance Z<sub>s</sub>, ' +
          'attenuating the signal by ' + Math.round(lossPct) + '%. ' +
          'The buffers prevent this loading because their high input impedance draws negligible current.';
      } else if (lossPct > 10) {
        gainExplainEl.innerHTML = 'Without buffers, R\u2032 and Z<sub>s</sub> form a voltage divider, ' +
          'and the input resistors attenuate the signal by ' +
          Math.round(lossPct) + '%. Buffers isolate the source and limit this current.';
      } else if (gain > 50) {
        gainExplainEl.innerHTML = 'High gain from small R<sub>G</sub>. ' +
          'Buffers amplify only the <em>differential</em> signal; common-mode noise passes through unchanged.';
      } else {
        gainExplainEl.innerHTML = 'Low source Z: loading is minimal because Z<sub>s</sub> \u226A R\u2032, ' +
          'so little voltage is dropped across the source. Increasing Z<sub>s</sub> demonstrates ' +
          'the attenuation of a high-impedance sensor without buffers.';
      }
    }

    // ═══════════════════════════════════════════════
    //  INTERACTIVE CURVES — create/remove per update
    //  Uses small segment counts for speed
    // ═══════════════════════════════════════════════

    const GAIN_SEG = 30;  // segments per gain curve
    const SIG_SEG  = 40;  // segments per signal trace

    // Persistent circuit highlight objects (at mini circuit positions)
    const rgHL = new Rectangle({ width: 0.42*MINI_S, height: 0.95*MINI_S, color: YELLOW, strokeWidth: 2, fillOpacity: 0.20 });
    rgHL.moveTo(mp(NODE1_X, RG_CY));
    const bufHL1 = new Rectangle({ width: 1.5*MINI_S, height: 1.6*MINI_S, color: ACCENT, strokeWidth: 1.5, fillOpacity: 0.08 });
    bufHL1.moveTo(mp(A1_CX, A1_CY));
    const bufHL2 = new Rectangle({ width: 1.5*MINI_S, height: 1.6*MINI_S, color: ACCENT, strokeWidth: 1.5, fillOpacity: 0.08 });
    bufHL2.moveTo(mp(A2_CX, A2_CY));
    // Z_s highlights on the input resistors
    const zsHL1 = new Rectangle({ width: (R_W+0.15)*MINI_S, height: (R_H+0.15)*MINI_S, color: RED, strokeWidth: 2, fillOpacity: 0.18 });
    zsHL1.moveTo(mp(ZS_CX, t1.plusY));
    const zsHL2 = new Rectangle({ width: (R_W+0.15)*MINI_S, height: (R_H+0.15)*MINI_S, color: RED, strokeWidth: 2, fillOpacity: 0.18 });
    zsHL2.moveTo(mp(ZS_CX, t2.plusY));

    // Persistent marker dots (use moveTo — always works in manim-web)
    const mkrDotBuf = new Dot({ point: [0, 0, 0], color: YELLOW, radius: 0.08 });
    const mkrDotNB  = new Dot({ point: [0, 0, 0], color: RED, radius: 0.07 });

    const s2Persistent = [rgHL, bufHL1, bufHL2, zsHL1, zsHL2, mkrDotBuf, mkrDotNB];
    s2Persistent.forEach(o => { try { o.setOpacity?.(0); } catch(e){} });
    scene.add(...s2Persistent);

    // Curve line segments (created/destroyed per update)
    let s2CurveObjs = [];

    // Build all curve line objects for the current slider state
    function buildCurves() {
      const rg = rgFromSlider(parseFloat(rgSlider.value));
      const zs = zsFromSlider(parseFloat(zsSlider.value));
      const gain = computeGain(rg);
      const lf = loadingFactor(zs);
      const vout = gain * VDM_INPUT;
      const voutNoBuf = gain * VDM_INPUT * lf;
      const lossPct = (1 - lf) * 100;

      // Update readouts
      rgValEl.textContent = formatRg(rg);
      zsValEl.textContent = formatRg(zs);
      gainValEl.textContent = gain.toFixed(1);
      voutValEl.textContent = formatVoltage(vout);
      voutNoBufEl.textContent = formatVoltage(voutNoBuf);
      lossValEl.textContent = lossPct.toFixed(1) + '%';
      updateExplainText(rg, gain, zs, lf);

      // Move marker dots
      const mG = Math.min(gain, gainYRange[1]);
      const mGNB = Math.min(gain * lf, gainYRange[1]);
      const mp = mapPoint(gainFrame, Math.log10(rg), mG, gainXRange, gainYRange);
      const mpNB = mapPoint(gainFrame, Math.log10(rg), mGNB, gainXRange, gainYRange);
      mkrDotBuf.moveTo([mp[0], mp[1], 0]);
      mkrDotNB.moveTo([mpNB[0], mpNB[1], 0]);

      const lines = [];

      // Helper: push line segments for a curve
      function traceCurve(n, color, sw, fn) {
        let prev = null;
        for (let i = 0; i <= n; i++) {
          const p = fn(i / n);
          if (prev) {
            lines.push(new Line({
              start: [prev[0], prev[1], 0],
              end: [p[0], p[1], 0],
              color, strokeWidth: sw
            }));
          }
          prev = p;
        }
      }

      // Gain curve (buffered)
      traceCurve(GAIN_SEG, ACCENT, 2.5, (t) => {
        const lr = gainXRange[0] + (gainXRange[1] - gainXRange[0]) * t;
        const g = Math.min(computeGain(Math.pow(10, lr)), gainYRange[1]);
        return mapPoint(gainFrame, lr, g, gainXRange, gainYRange);
      });

      // Gain curve (no buffers)
      traceCurve(GAIN_SEG, RED, 1.8, (t) => {
        const lr = gainXRange[0] + (gainXRange[1] - gainXRange[0]) * t;
        const g = Math.min(computeGain(Math.pow(10, lr)) * lf, gainYRange[1]);
        return mapPoint(gainFrame, lr, g, gainXRange, gainYRange);
      });

      // Vertical + horizontal marker reference lines
      const axY = mapPoint(gainFrame, 0, 0, gainXRange, gainYRange)[1];
      lines.push(new Line({ start: [mp[0], axY, 0], end: [mp[0], mp[1], 0], color: MUTED2, strokeWidth: 1.2 }));
      lines.push(new Line({ start: [gainFrame.x0, mp[1], 0], end: [mp[0], mp[1], 0], color: MUTED2, strokeWidth: 0.8 }));
      // Gap bar between markers
      if (mp[1] - mpNB[1] > 0.06) {
        lines.push(new Line({ start: [mp[0] + 0.12, mpNB[1], 0], end: [mp[0] + 0.12, mp[1], 0], color: RED, strokeWidth: 1.8 }));
      }

      // Signal traces — use real voltages, auto-scale Y axis to fit
      const peakBuf = vout;          // gain × VDM_INPUT (buffered output)
      const peakNoBuf = voutNoBuf;   // gain × VDM_INPUT × loading factor
      const yMax = Math.max(peakBuf, peakNoBuf, VDM_INPUT) * 1.25; // 25% headroom
      const dynYRange = [-yMax, yMax];
      const clamp = v => Math.max(-yMax, Math.min(yMax, v));

      traceCurve(SIG_SEG, BLUE, 1.8, (t) => {
        const th = t * 2 * Math.PI;
        return mapPoint(sigFrame, th, VDM_INPUT * Math.sin(th), sigXRange, dynYRange);
      });
      traceCurve(SIG_SEG, MAG, 1.8, (t) => {
        const th = t * 2 * Math.PI;
        return mapPoint(sigFrame, th, -VDM_INPUT * Math.sin(th), sigXRange, dynYRange);
      });
      traceCurve(SIG_SEG, RED, 2.0, (t) => {
        const th = t * 2 * Math.PI;
        return mapPoint(sigFrame, th, clamp(peakNoBuf * Math.sin(th)), sigXRange, dynYRange);
      });
      traceCurve(SIG_SEG, YELLOW, 2.5, (t) => {
        const th = t * 2 * Math.PI;
        return mapPoint(sigFrame, th, clamp(peakBuf * Math.sin(th)), sigXRange, dynYRange);
      });

      return lines;
    }

    // ── Instant redraw on slider change (no animation, just swap) ──
    function redrawCurves() {
      // Remove old curve lines
      if (s2CurveObjs.length) {
        scene.remove(...s2CurveObjs);
        s2CurveObjs = [];
      }
      // Build and add new ones
      const lines = buildCurves();
      scene.add(...lines);
      s2CurveObjs = lines;
    }

    // ── Slider events with RAF throttle ──
    let s2DrawRaf = null;
    function queueRedraw() {
      if (currentSection !== 'animation') return;
      if (s2DrawRaf) return;
      s2DrawRaf = requestAnimationFrame(() => {
        s2DrawRaf = null;
        redrawCurves();
      });
    }
    rgSlider.addEventListener('input', queueRedraw);
    zsSlider.addEventListener('input', queueRedraw);

    // ── Highlight corresponding circuit components while dragging sliders ──
    let hlTimeout = null;
    function flashHighlight(objs) {
      if (currentSection !== 'animation') return;
      // Show the highlights
      objs.forEach(o => { try { o.setOpacity?.(1); } catch(e){} });
      // Clear any pending fade-out
      if (hlTimeout) clearTimeout(hlTimeout);
      // Fade out after user stops dragging
      hlTimeout = setTimeout(() => {
        objs.forEach(o => { try { o.setOpacity?.(0); } catch(e){} });
        hlTimeout = null;
      }, 800);
    }

    rgSlider.addEventListener('input', () => flashHighlight([rgHL]));
    zsSlider.addEventListener('input', () => flashHighlight([zsHL1, zsHL2, bufHL1, bufHL2]));

    // ═══════════════════════════════════════════════
    //  SECTION SWITCHING
    // ═══════════════════════════════════════════════

    const secIndicator = document.getElementById('sec-indicator');
    const prevBtn = document.getElementById('sec-prev');
    const nextBtn = document.getElementById('sec-next');
    let currentSection = 'circuit';


    function showSection(sec) {
      currentSection = sec;
      if (sec === 'circuit') {
        secIndicator.textContent = 'Section 1 \u00B7 Circuit';
        prevBtn.disabled = true;
        nextBtn.disabled = false;
        // Show section 1 full-size circuit + info
        circuitObjs.forEach(o => { try { o.setOpacity?.(1); } catch(e){} });
        rhsInfo.forEach(o => { try { o.setOpacity?.(1); } catch(e){} });
        try { title.setOpacity?.(1); } catch(e){}
        // Hide section 2: mini circuit, plots, panel
        miniCircuitObjs.forEach(o => { try { o.setOpacity?.(0); } catch(e){} });
        try { s2Title.setOpacity?.(0); } catch(e){}
        s2StaticObjs.forEach(o => { try { o.setOpacity?.(0); } catch(e){} });
        s2Persistent.forEach(o => { try { o.setOpacity?.(0); } catch(e){} });
        if (s2CurveObjs.length) { scene.remove(...s2CurveObjs); s2CurveObjs = []; }
        if (s2DrawRaf) { cancelAnimationFrame(s2DrawRaf); s2DrawRaf = null; }
        olPanel.classList.remove('visible');
        olPanel.setAttribute('aria-hidden', 'true');
      } else {
        secIndicator.textContent = 'Section 2 \u00B7 Gain Explorer';
        prevBtn.disabled = false;
        nextBtn.disabled = true;
        // Skip section 1 animation if still running, then hide full circuit
        skipS1Anim();
        circuitObjs.forEach(o => { try { o.setOpacity?.(0); } catch(e){} });
        rhsInfo.forEach(o => { try { o.setOpacity?.(0); } catch(e){} });
        try { title.setOpacity?.(0); } catch(e){}
        // Show mini circuit copy
        miniCircuitObjs.forEach(o => { try { o.setOpacity?.(1); } catch(e){} });
        // Show section 2 plots, title, panel
        try { s2Title.setOpacity?.(1); } catch(e){}
        s2StaticObjs.forEach(o => { try { o.setOpacity?.(1); } catch(e){} });
        olPanel.classList.add('visible');
        olPanel.setAttribute('aria-hidden', 'false');
        // Show curves instantly
        [mkrDotBuf, mkrDotNB].forEach(o => { try { o.setOpacity?.(1); } catch(e){} });
        redrawCurves();
      }
    }

    prevBtn.addEventListener('click', () => showSection('circuit'));
    nextBtn.addEventListener('click', () => showSection('animation'));

    // ═══════════════════════════════════════════════
    //  ANIMATION SEQUENCE (Section 1)
    //  Order: buffer stage → highlight → diff stage → highlight → bullets
    // ═══════════════════════════════════════════════

    const FAST = 0.5;   // circuit drawing speed
    let s1AnimDone = false;
    let s1AnimSkipped = false;

    // Helper: skip remaining animation — make everything visible instantly
    function skipS1Anim() {
      if (s1AnimDone) return;
      s1AnimSkipped = true;
      s1AnimDone = true;
      circuitObjs.forEach(o => { try { o.setOpacity?.(1); } catch(e){} });
      rhsInfo.forEach(o => { try { o.setOpacity?.(1); } catch(e){} });
      try { title.setOpacity?.(1); } catch(e){}
    }

    // Helper: bail out early if user switched sections
    function s1Bail() { return s1AnimSkipped; }

    // 1. Title
    await scene.play(new Write(title, { duration: 0.7 }));
    if (s1Bail()) { /* skip rest */ } else {

    // ── Buffer stage ──

    // 2. Buffer op-amps + labels
    await scene.play(
      new Create(triA1, { duration: FAST }), new Create(triA2, { duration: FAST }),
      new Write(t1.plus, { duration: FAST }), new Write(t1.minus, { duration: FAST }),
      new Write(t2.plus, { duration: FAST }), new Write(t2.minus, { duration: FAST }),
      new FadeIn(a1Lbl, { duration: FAST }), new FadeIn(a2Lbl, { duration: FAST }),
    );
    } if (!s1Bail()) {

    // 3. Buffer inputs with Z_s
    await scene.play(
      new Create(inW1a, { duration: FAST }), new Create(Zs1, { duration: FAST }),
      new Write(Zs1L, { duration: FAST }), new Create(inW1b, { duration: FAST }),
      new Create(inW2a, { duration: FAST }), new Create(Zs2, { duration: FAST }),
      new Write(Zs2L, { duration: FAST }), new Create(inW2b, { duration: FAST }),
      new Write(vaLbl, { duration: FAST }), new Write(vbLbl, { duration: FAST }),
    );
    } if (!s1Bail()) {

    // 4. Buffer feedback + R_gain
    await scene.play(
      new Create(stub1, { duration: FAST }), new Create(stub2, { duration: FAST }),
      new FadeIn(node1Dot, { duration: FAST }), new FadeIn(node2Dot, { duration: FAST }),
      new Create(fb1Vert, { duration: FAST }), new Create(fb1toR, { duration: FAST }),
      new Create(R1, { duration: FAST }), new Write(R1L, { duration: FAST }),
      new Create(fb1fromR, { duration: FAST }), new Create(fb1down, { duration: FAST }),
      new Create(fb2Vert, { duration: FAST }), new Create(fb2toR, { duration: FAST }),
      new Create(R2, { duration: FAST }), new Write(R2L, { duration: FAST }),
      new Create(fb2fromR, { duration: FAST }), new Create(fb2down, { duration: FAST }),
      new Create(rgWireTop, { duration: FAST }), new Create(Rg, { duration: FAST }),
      new Write(RgL, { duration: FAST }), new Create(rgWireBot, { duration: FAST }),
    );
    } if (!s1Bail()) {

    // 5. Buffer outputs
    await scene.play(
      new Create(outW1, { duration: FAST }), new Create(outW2, { duration: FAST }),
      new FadeIn(tap1Dot, { duration: FAST }), new FadeIn(tap2Dot, { duration: FAST }),
    );
    } if (!s1Bail()) {

    // 6. Buffer stage highlight + label (slow)
    await scene.play(new Create(bufHighlight, { duration: 1.2 }));
    } if (!s1Bail()) {
    await scene.play(new FadeIn(stg1Lbl, { duration: 0.6 }));
    await scene.wait(0.8);
    } if (!s1Bail()) {

    // ── Difference stage ──

    // 7. Diff op-amp + label
    await scene.play(
      new Create(triA3, { duration: FAST }),
      new Write(t3.plus, { duration: FAST }), new Write(t3.minus, { duration: FAST }),
      new FadeIn(a3Lbl, { duration: FAST }),
    );
    } if (!s1Bail()) {

    // 8. Diff input resistors
    await scene.play(
      new Create(diffIn1a, { duration: FAST }), new Create(diffIn1b, { duration: FAST }),
      new Create(R3, { duration: FAST }), new Write(R3L, { duration: FAST }),
      new Create(diffIn1c, { duration: FAST }), new FadeIn(diffNode1, { duration: FAST }),
      new Create(diffIn2a, { duration: FAST }), new Create(diffIn2b, { duration: FAST }),
      new Create(R4, { duration: FAST }), new Write(R4L, { duration: FAST }),
      new Create(diffIn2c, { duration: FAST }), new FadeIn(diffNode2, { duration: FAST }),
    );
    } if (!s1Bail()) {

    // 9. Diff feedback + ground resistors
    await scene.play(
      new Create(fb3up, { duration: FAST }), new Create(fb3toR, { duration: FAST }),
      new Create(Rf, { duration: FAST }), new Write(RfL, { duration: FAST }),
      new Create(fb3fromR, { duration: FAST }), new Create(fb3down, { duration: FAST }),
      new FadeIn(finalTapDot, { duration: FAST }), new FadeIn(fbNode3, { duration: FAST }),
      new FadeIn(plusNode3, { duration: FAST }),
      new Create(gndWireTop, { duration: FAST }), new Create(Rg2, { duration: FAST }),
      new Write(Rg2L, { duration: FAST }), new Create(gndWireBot, { duration: FAST }),
      new Create(gnd1, { duration: FAST }), new Create(gnd2, { duration: FAST }),
      new Create(gnd3, { duration: FAST }),
    );
    } if (!s1Bail()) {

    // 10. Output
    await scene.play(
      new Create(outWire, { duration: FAST }),
      new FadeIn(outPort, { duration: FAST }),
      new Write(outLbl, { duration: FAST }),
    );
    } if (!s1Bail()) {

    // 11. Difference stage highlight + label (slow)
    await scene.play(new Create(diffHighlight, { duration: 1.2 }));
    } if (!s1Bail()) {
    await scene.play(new FadeIn(stg2Lbl, { duration: 0.6 }));
    await scene.wait(0.8);
    } if (!s1Bail()) {

    // 12. RHS info bullets
    for (const obj of rhsInfo) {
      if (s1Bail()) break;
      await scene.play(new FadeIn(obj, { duration: 0.15 }));
    }

    await scene.wait(1);
    }

    s1AnimDone = true;

  </script>
</body>
</html>
