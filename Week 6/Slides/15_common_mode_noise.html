<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 15 — Common-Mode Noise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="slide.css">
  <script src="../../theme.js"></script>
  <script>
    (function () {
      var qp = new URLSearchParams(location.search);
      var qt = qp.get('theme');
      var ss = null;
      try { ss = sessionStorage.getItem('slideTheme'); } catch (e) { /* ignore */ }
      var pick = (qt === 'dark' || qt === 'light') ? qt
               : (ss === 'dark' || ss === 'light') ? ss
               : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
      window.addEventListener('themechange', function (e) {
        try {
          var t = e && e.detail && e.detail.theme;
          if (t) sessionStorage.setItem('slideTheme', t);
        } catch (err) { /* ignore */ }
      });
      if (window.parent !== window) {
        var style = document.createElement('style');
        style.textContent = '#theme-toggle{display:none !important;}';
        document.head.appendChild(style);
      }
    })();
  </script>
  <style>
    /* Stage 3 overlays — hidden until compression transition completes */
    .cm-graph-wrap {
      position: absolute;
      left: 28px;
      right: 330px;
      bottom: 30px;
      height: 260px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 8;
    }
    .cm-graph-wrap.visible { opacity: 1; pointer-events: auto; }
    .cm-graph-wrap canvas { width: 100%; height: 100%; display: block; }

    .ol-panel {
      position: absolute;
      right: 14px;
      bottom: 30px;
      z-index: 9;
      width: 290px;
      padding: 14px 16px 14px;
      border-radius: 12px;
      border: 1px solid var(--slide-border);
      background: var(--slide-surface);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22), 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      display: none;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    [data-theme="light"] .ol-panel {
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.03);
    }
    .ol-panel.visible { display: flex; }

    .ol-title {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--slide-accent);
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
    }

    .ol-row { display: grid; gap: 4px; }
    .ol-row label {
      display: flex;
      justify-content: space-between;
      color: var(--slide-text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }
    .ol-row .v { color: var(--slide-text); font-variant-numeric: tabular-nums; }

    .ol-panel input[type="range"] {
      width: 100%;
      accent-color: var(--slide-accent);
      cursor: pointer;
      height: 18px;
    }

    .cm-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .cm-toggle button {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 6px 0;
      background: transparent;
      color: var(--slide-text-dim);
      border: 1px solid var(--slide-border);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .cm-toggle button:hover { color: var(--slide-text); }
    .cm-toggle button.active {
      background: var(--slide-accent);
      color: var(--slide-bg);
      border-color: var(--slide-accent);
    }

    .ol-readout {
      margin-top: 2px;
      border-top: 1px solid var(--slide-border);
      padding-top: 8px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }
    .ol-readout .k { color: var(--slide-text-dim); }
    .ol-readout .v { color: var(--slide-text); text-align: right; }
  </style>
</head>
<body class="slide">
  <header class="slide-header">
    <span class="slide-num">17 / 22</span>
  </header>

  <div id="stage" class="manim-stage">
    <div class="stage-fallback">Loading manim-web scene…</div>
  </div>

  <div id="cm-graph-wrap" class="cm-graph-wrap">
    <canvas id="cm-graph"></canvas>
  </div>

  <aside id="cm-panel" class="ol-panel cm-panel">
    <div class="ol-title">Mains interference</div>
    <div class="ol-row">
      <label>Noise amplitude <span class="v" data-readout="amp">1.50×</span></label>
      <input type="range" id="cm-amp" min="0" max="2" step="0.01" value="1.5">
    </div>
    <div class="ol-row">
      <label>Line frequency <span class="v" data-readout="freq">50 Hz</span></label>
      <div class="cm-toggle">
        <button type="button" data-freq="50" class="active">50</button>
        <button type="button" data-freq="60">60</button>
      </div>
    </div>
    <div class="ol-readout">
      <span class="k">v_i1 pk-pk</span><span class="v" data-readout="v1pp">—</span>
      <span class="k">v_i2 pk-pk</span><span class="v" data-readout="v2pp">—</span>
      <span class="k">v_i1 − v_i2 pk-pk</span><span class="v" data-readout="vdpp">—</span>
    </div>
  </aside>

  <script type="module">
    import {
      Scene, Rectangle, Polygon, Circle, Line, Text, MathTex, VGroup, Dot,
      Create, Write, FadeIn, FadeOut
    } from 'https://esm.sh/manim-web@0.3.18';

    const FONT_URL = 'https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/fonts/KaTeX_Main-Regular.ttf';
    const IS_LIGHT = document.documentElement.getAttribute('data-theme') === 'light';
    const BG     = IS_LIGHT ? '#f5f5f7' : '#0a0e14';
    const FG     = IS_LIGHT ? '#1a1a1e' : '#ffffff';
    const MUTED  = IS_LIGHT ? '#6a6a72' : '#8892a4';
    const MUTED2 = IS_LIGHT ? '#b0b0b6' : '#505868';
    const ACCENT = IS_LIGHT ? '#3d8b6e' : '#6aaa8e';
    const YELLOW = IS_LIGHT ? '#b8860b' : '#ffcc44';
    const RED    = IS_LIGHT ? '#c74034' : '#e06050';
    const BLUE   = IS_LIGHT ? '#3a68c8' : '#5a8dee';
    const MAG    = IS_LIGHT ? '#a050a0' : '#d070d0';
    const CYAN   = IS_LIGHT ? '#3d8ea0' : '#58c0d8';
    window.addEventListener('themechange', () => location.reload());

    const stage = document.getElementById('stage');
    stage.querySelector('.stage-fallback')?.remove();
    const scene = new Scene(stage, { width: 1280, height: 720, backgroundColor: BG });

    // ── Stage 1: concept panels ─────────────────────────────────────────────
    const LEFT_PANEL_CX = -3.4, RIGHT_PANEL_CX = 3.4, PANEL_CY = 0.1;
    const PANEL_W = 4.5, PANEL_H = 2.8;
    const WIRE_Y_TOP = 0.35, WIRE_Y_BOT = -0.35, WIRE_HALF_LEN = 1.55;
    const WAVE_AMP = 0.13, WAVE_CYCLES = 3;

    // Build a panel: border + header + two wires + two waveforms + summing block + equation
    function buildPanel({ cx, header, phaseBot, color, equationLatex }) {
      const group = new VGroup();

      const border = new Rectangle({
        width: PANEL_W, height: PANEL_H,
        color: MUTED2, strokeWidth: 2, fillOpacity: 0
      });
      border.moveTo([cx, PANEL_CY, 0]);

      const headerText = new Text({ text: header, fontSize: 18, color: FG, fontUrl: FONT_URL });

      // Two wires, stacked
      const wireTop = new Line({
        start: [cx - WIRE_HALF_LEN, PANEL_CY + WIRE_Y_TOP, 0],
        end:   [cx + WIRE_HALF_LEN - 0.30, PANEL_CY + WIRE_Y_TOP, 0],
        color: MUTED, strokeWidth: 2
      });
      const wireBot = new Line({
        start: [cx - WIRE_HALF_LEN, PANEL_CY + WIRE_Y_BOT, 0],
        end:   [cx + WIRE_HALF_LEN - 0.30, PANEL_CY + WIRE_Y_BOT, 0],
        color: MUTED, strokeWidth: 2
      });

      // Waveform polylines
      const mkWave = (y0, phase) => {
        const segs = [];
        const N = 80;
        const xL = cx - WIRE_HALF_LEN, xR = cx + WIRE_HALF_LEN - 0.30;
        for (let i = 1; i <= N; i++) {
          const t0 = (i - 1) / N, t1 = i / N;
          const xa = xL + t0 * (xR - xL), xb = xL + t1 * (xR - xL);
          const ya = y0 + WAVE_AMP * Math.sin(t0 * Math.PI * 2 * WAVE_CYCLES + phase);
          const yb = y0 + WAVE_AMP * Math.sin(t1 * Math.PI * 2 * WAVE_CYCLES + phase);
          segs.push(new Line({ start: [xa, ya, 0], end: [xb, yb, 0], color, strokeWidth: 2 }));
        }
        return new VGroup(...segs);
      };
      const waveTop = mkWave(PANEL_CY + WIRE_Y_TOP, 0);
      const waveBot = mkWave(PANEL_CY + WIRE_Y_BOT, phaseBot); // 0 = in-phase, PI = inverted

      // Summing circle + "−" glyph
      const sumCircle = new Circle({ radius: 0.22, color: FG, strokeWidth: 2, fillOpacity: 0 });
      const sumX = cx + WIRE_HALF_LEN - 0.05;
      sumCircle.moveTo([sumX, PANEL_CY, 0]);
      const sumMinus = new Text({ text: '−', fontSize: 16, color: FG, fontUrl: FONT_URL });

      // Wires from wire ends into the summing node
      const leadTop = new Line({
        start: [sumX - 0.25, PANEL_CY + WIRE_Y_TOP, 0],
        end:   [sumX - 0.05, PANEL_CY + 0.10, 0],
        color: MUTED, strokeWidth: 2
      });
      const leadBot = new Line({
        start: [sumX - 0.25, PANEL_CY + WIRE_Y_BOT, 0],
        end:   [sumX - 0.05, PANEL_CY - 0.10, 0],
        color: MUTED, strokeWidth: 2
      });

      // Output equation label below panel
      const eqn = new MathTex({ latex: equationLatex, color: ACCENT });

      // Header position
      // (positioned after glyph load in sequence below)

      // Store refs on group so we can position text after load
      group._border = border;
      group._headerText = headerText;
      group._wireTop = wireTop; group._wireBot = wireBot;
      group._waveTop = waveTop; group._waveBot = waveBot;
      group._sumCircle = sumCircle; group._sumMinus = sumMinus;
      group._leadTop = leadTop; group._leadBot = leadBot;
      group._eqn = eqn;
      group._cx = cx;

      return group;
    }

    const stage1Title = new Text({
      text: 'Common-mode vs. differential-mode',
      fontSize: 26, color: FG, fontUrl: FONT_URL
    });
    const stage1Caption = new Text({
      text: 'A differential amplifier rejects what is common, amplifies what is different.',
      fontSize: 16, color: MUTED, fontUrl: FONT_URL
    });

    const leftPanel  = buildPanel({
      cx: LEFT_PANEL_CX, header: 'Common-mode',
      phaseBot: 0,          // both waves in phase → common-mode
      color: BLUE,
      equationLatex: 'v_{\\text{out}} = v_1 - v_2 = 0'
    });
    const rightPanel = buildPanel({
      cx: RIGHT_PANEL_CX, header: 'Differential-mode',
      phaseBot: Math.PI,    // wave inverted → differential
      color: RED,
      equationLatex: 'v_{\\text{out}} = v_1 - v_2 = 2v'
    });

    // Load glyphs and position labels
    await stage1Title.loadGlyphs?.();
    stage1Title.moveTo([0, 3.0, 0]);

    await stage1Caption.loadGlyphs?.();
    stage1Caption.moveTo([0, -2.7, 0]);

    for (const p of [leftPanel, rightPanel]) {
      await p._headerText.loadGlyphs?.();
      p._headerText.moveTo([p._cx, PANEL_CY + PANEL_H / 2 - 0.28, 0]);
      await p._sumMinus.loadGlyphs?.();
      p._sumMinus.moveTo([p._cx + WIRE_HALF_LEN - 0.05, PANEL_CY, 0]);
      await p._eqn.waitForRender?.();
      p._eqn.scale(0.55).moveTo([p._cx, PANEL_CY - PANEL_H / 2 - 0.35, 0]);
    }

    // Stage 1 play sequence
    await scene.play(new Write(stage1Title, { duration: 0.6 }));
    await scene.play(
      new Create(leftPanel._border),  new Create(rightPanel._border),
      new Write(leftPanel._headerText), new Write(rightPanel._headerText),
      { duration: 0.5 }
    );
    await scene.play(
      new Create(leftPanel._wireTop),  new Create(leftPanel._wireBot),
      new Create(rightPanel._wireTop), new Create(rightPanel._wireBot),
      new Create(leftPanel._leadTop),  new Create(leftPanel._leadBot),
      new Create(rightPanel._leadTop), new Create(rightPanel._leadBot),
      { duration: 0.4 }
    );
    await scene.play(
      new Create(leftPanel._waveTop,  { duration: 1.1, lagRatio: 0.02 }),
      new Create(leftPanel._waveBot,  { duration: 1.1, lagRatio: 0.02 }),
      new Create(rightPanel._waveTop, { duration: 1.1, lagRatio: 0.02 }),
      new Create(rightPanel._waveBot, { duration: 1.1, lagRatio: 0.02 })
    );
    await scene.play(
      new FadeIn(leftPanel._sumCircle),  new Write(leftPanel._sumMinus),
      new FadeIn(rightPanel._sumCircle), new Write(rightPanel._sumMinus),
      { duration: 0.3 }
    );
    await scene.play(
      new Write(leftPanel._eqn), new Write(rightPanel._eqn),
      { duration: 0.5 }
    );
    await scene.play(new FadeIn(stage1Caption, { duration: 0.4 }));
    await scene.wait(1.5);

    // Fade Stage 1 out entirely
    const stage1All = new VGroup(
      stage1Title, stage1Caption,
      leftPanel._border, leftPanel._headerText,
      leftPanel._wireTop, leftPanel._wireBot,
      leftPanel._waveTop, leftPanel._waveBot,
      leftPanel._sumCircle, leftPanel._sumMinus,
      leftPanel._leadTop, leftPanel._leadBot, leftPanel._eqn,
      rightPanel._border, rightPanel._headerText,
      rightPanel._wireTop, rightPanel._wireBot,
      rightPanel._waveTop, rightPanel._waveBot,
      rightPanel._sumCircle, rightPanel._sumMinus,
      rightPanel._leadTop, rightPanel._leadBot, rightPanel._eqn
    );
    await scene.play(new FadeOut(stage1All, { duration: 0.5 }));

    // ── Stage 2: ECG scenario ────────────────────────────────────────────────
    const SLIDE_TITLE_LEFT_X = -6.2;
    const BED_CX = -2.8, BED_CY = -1.3, BED_W = 4.2, BED_H = 0.4;
    const PATIENT_SHIFT = [-2.8, -1.1, 0];

    const slideTitle = new Text({
      text: 'Mains interference couples equally to both electrodes',
      fontSize: 26, color: FG, fontUrl: FONT_URL
    });
    await slideTitle.loadGlyphs?.();
    slideTitle.moveTo([0, 3.2, 0]);
    if (typeof slideTitle.getLeft === 'function') {
      slideTitle.shift([SLIDE_TITLE_LEFT_X - slideTitle.getLeft()[0], 0, 0]);
    }

    // Bed + legs + pillow
    const bed = new Rectangle({ width: BED_W, height: BED_H, color: MUTED, strokeWidth: 2, fillOpacity: 0.08 });
    bed.moveTo([BED_CX, BED_CY, 0]);
    const bedLegL = new Line({
      start: [BED_CX - BED_W / 2 + 0.15, BED_CY - BED_H / 2, 0],
      end:   [BED_CX - BED_W / 2 + 0.15, BED_CY - BED_H / 2 - 0.55, 0],
      color: MUTED, strokeWidth: 2
    });
    const bedLegR = new Line({
      start: [BED_CX + BED_W / 2 - 0.15, BED_CY - BED_H / 2, 0],
      end:   [BED_CX + BED_W / 2 - 0.15, BED_CY - BED_H / 2 - 0.55, 0],
      color: MUTED, strokeWidth: 2
    });
    const pillow = new Polygon({
      vertices: [
        [BED_CX - BED_W / 2 - 0.05, BED_CY + BED_H / 2, 0],
        [BED_CX - BED_W / 2 + 0.85, BED_CY + BED_H / 2, 0],
        [BED_CX - BED_W / 2 + 0.85, BED_CY + BED_H / 2 + 0.22, 0],
        [BED_CX - BED_W / 2 - 0.05, BED_CY + BED_H / 2 + 0.22, 0]
      ],
      color: MAG, strokeWidth: 1.5, fillOpacity: 0.18
    });

    // Patient silhouette — 25-vertex polygon, reclining side profile
    const PATIENT_LOCAL = [
      [-2.00,  0.40], [-1.78,  0.46], [-1.68,  0.30], [-1.60,  0.25],
      [-1.54,  0.14], [-1.40,  0.12], [-1.20,  0.28], [-0.70,  0.32],
      [-0.20,  0.26], [ 0.30,  0.28], [ 0.75,  0.32], [ 1.20,  0.28],
      [ 1.65,  0.20], [ 1.95,  0.22], [ 2.10,  0.12], [ 2.05,  0.02],
      [ 1.50,  0.00], [ 0.80,  0.00], [ 0.10,  0.00], [-0.60,  0.00],
      [-1.20,  0.00], [-1.55,  0.05], [-1.80,  0.20], [-2.05,  0.32],
      [-2.00,  0.40]
    ];
    const patient = new Polygon({
      vertices: PATIENT_LOCAL.map(([x, y]) => [x + PATIENT_SHIFT[0], y + PATIENT_SHIFT[1], 0]),
      color: FG, strokeWidth: 2, fillOpacity: 0.10
    });

    // Electrodes (local coords shifted onto chest)
    const ELEC1_LOCAL = [-1.00, 0.28];
    const ELEC2_LOCAL = [-0.30, 0.24];
    const elec1Pos = [ELEC1_LOCAL[0] + PATIENT_SHIFT[0], ELEC1_LOCAL[1] + PATIENT_SHIFT[1], 0];
    const elec2Pos = [ELEC2_LOCAL[0] + PATIENT_SHIFT[0], ELEC2_LOCAL[1] + PATIENT_SHIFT[1], 0];
    const elec1 = new Dot({ point: elec1Pos, color: YELLOW, radius: 0.09 });
    const elec2 = new Dot({ point: elec2Pos, color: YELLOW, radius: 0.09 });

    const elecLbl1 = new MathTex({ latex: 'v_{i1}', color: FG });
    const elecLbl2 = new MathTex({ latex: 'v_{i2}', color: FG });
    await elecLbl1.waitForRender?.();
    await elecLbl2.waitForRender?.();
    elecLbl1.scale(0.42).moveTo([elec1Pos[0] - 0.05, elec1Pos[1] + 0.26, 0]);
    elecLbl2.scale(0.42).moveTo([elec2Pos[0] + 0.25, elec2Pos[1] + 0.22, 0]);

    // Amp box — small rounded-feel rectangle to the right of the patient
    const AMP_BOX_CX = 1.60, AMP_BOX_CY = -0.80;
    const ampBox = new Rectangle({
      width: 0.85, height: 0.65, color: FG, strokeWidth: 2, fillOpacity: 0.06
    });
    ampBox.moveTo([AMP_BOX_CX, AMP_BOX_CY, 0]);
    const ampLbl = new Text({ text: 'to amp', fontSize: 12, color: MUTED, fontUrl: FONT_URL });
    await ampLbl.loadGlyphs?.();
    ampLbl.moveTo([AMP_BOX_CX, AMP_BOX_CY, 0]);

    const lead1 = new Line({
      start: elec1Pos,
      end:   [AMP_BOX_CX - 0.42, AMP_BOX_CY + 0.15, 0],
      color: FG, strokeWidth: 2
    });
    const lead2 = new Line({
      start: elec2Pos,
      end:   [AMP_BOX_CX - 0.42, AMP_BOX_CY - 0.15, 0],
      color: FG, strokeWidth: 2
    });

    // Mains cord + label
    const MAINS_X = 4.80;
    const mains = new Line({
      start: [MAINS_X,  2.50, 0],
      end:   [MAINS_X, -1.80, 0],
      color: RED, strokeWidth: 3
    });
    const mainsLbl = new Text({ text: 'Mains 50 Hz', fontSize: 14, color: RED, fontUrl: FONT_URL });
    await mainsLbl.loadGlyphs?.();
    mainsLbl.moveTo([MAINS_X, 2.88, 0]);

    // Capacitive coupling — two dashed paths, same dash count, same stroke, same color
    const couple1 = [];
    const couple2 = [];
    function addDashes(target, xs, ys, xe, ye, n) {
      for (let i = 0; i < n; i++) {
        const t0 = i / n, t1 = (i + 0.55) / n;
        target.push(new Line({
          start: [xs + (xe - xs) * t0, ys + (ye - ys) * t0, 0],
          end:   [xs + (xe - xs) * t1, ys + (ye - ys) * t1, 0],
          color: MAG, strokeWidth: 2
        }));
      }
    }
    addDashes(couple1, MAINS_X, 0.90, elec1Pos[0], elec1Pos[1], 12);
    addDashes(couple2, MAINS_X, 0.30, elec2Pos[0], elec2Pos[1], 12);
    const couple1Group = new VGroup(...couple1);
    const couple2Group = new VGroup(...couple2);

    const capLbl = new Text({
      text: 'C_couple (same on both leads)',
      fontSize: 12, color: MAG, fontUrl: FONT_URL
    });
    await capLbl.loadGlyphs?.();
    capLbl.moveTo([1.0, 0.95, 0]);

    // Bottom caption for Stage 2
    const stage2Caption = new Text({
      text: 'Identical 50 Hz on v_i1 and v_i2  →  common-mode',
      fontSize: 16, color: FG, fontUrl: FONT_URL
    });
    await stage2Caption.loadGlyphs?.();
    stage2Caption.moveTo([0, -2.70, 0]);

    // Stage 2 play sequence
    await scene.play(new Write(slideTitle, { duration: 0.6 }));
    await scene.play(
      new Create(bed), new Create(bedLegL), new Create(bedLegR), new Create(pillow),
      { duration: 0.4 }
    );
    await scene.play(new Create(patient, { duration: 1.2 }));
    await scene.play(new FadeIn(patient, { duration: 0.3 }));
    await scene.play(
      new FadeIn(elec1), new FadeIn(elec2),
      new Create(lead1), new Create(lead2),
      new Create(ampBox), new FadeIn(ampLbl),
      { duration: 0.5 }
    );
    await scene.play(new Write(elecLbl1), new Write(elecLbl2), { duration: 0.3 });
    await scene.play(new Create(mains), new FadeIn(mainsLbl), { duration: 0.4 });
    await scene.play(new FadeIn(couple1Group, { duration: 0.4 }));
    await scene.play(new FadeIn(couple2Group, { duration: 0.4 }));
    await scene.play(new FadeIn(capLbl, { duration: 0.2 }));
    await scene.play(new FadeIn(stage2Caption, { duration: 0.3 }));
    await scene.wait(1.0);

    // ── Compression transition ────────────────────────────────────────────────
    const sceneGroup = new VGroup(
      bed, bedLegL, bedLegR, pillow,
      patient,
      elec1, elec2, elecLbl1, elecLbl2,
      lead1, lead2, ampBox, ampLbl,
      mains, mainsLbl,
      couple1Group, couple2Group, capLbl,
      stage2Caption
    );

    // Scale the whole scenario down and move it into the top ~60% of the canvas,
    // leaving the bottom ~40% clear for the interactive graph + panel.
    const SCENE_GROUP_SCALE  = 0.55;
    const SCENE_GROUP_TARGET = [0, 1.20, 0];

    // Manim-web doesn't expose a Transform-to-target helper for arbitrary groups,
    // so we scale in place, then moveTo. Both calls take effect before the next
    // scene.play; we wrap in a short wait so the visual transition is perceptible.
    sceneGroup.scale(SCENE_GROUP_SCALE);
    sceneGroup.moveTo(SCENE_GROUP_TARGET);

    // Trigger a no-op play so manim-web flushes the new positions to canvas
    await scene.play(new FadeIn(sceneGroup, { duration: 0.01 }));
    await scene.wait(0.3);

    // Reveal Stage 3 overlays (canvas + control panel)
    const cmGraphWrap = document.getElementById('cm-graph-wrap');
    const cmPanel     = document.getElementById('cm-panel');
    cmGraphWrap.classList.add('visible');
    cmPanel.classList.add('visible');

    // ── Stage 3: signal module (Task 6) ──
    // ── Stage 3: canvas render loop (Task 7) ──
    // ── Stage 3: control wiring (Task 8) ──

    await scene.wait(0.1);
  </script>
</body>
</html>
